const _dbgLogs = [];
function _dbg() {
  const args = Array.prototype.slice.call(arguments);
  const msg = args.map(function(a){ return typeof a === 'object' ? JSON.stringify(a) : String(a); }).join(' ');
  _dbgLogs.push(msg);
  const panel = document.getElementById('_dbg_panel');
  if(panel) {
    const ln = document.createElement('div');
    ln.style.cssText = 'font-size:10px;padding:2px 0;border-bottom:1px solid #1F2937;word-break:break-all;color:#10B981;';
    ln.textContent = msg;
    panel.appendChild(ln);
    panel.scrollTop = panel.scrollHeight;
  }
}

// Resolver slot a partir dos resultados reais cadastrados
function resolveMatchSlot(slot, realStandings, realThirds, adminMatchesMap) {
  if(slot.type==='1'||slot.type==='2') {
    const pos = slot.type==='1'?1:2;
    return realStandings?.[slot.group]?.[pos] || (pos+'º do Grupo '+slot.group);
  }
  if(slot.type==='3') {
    // 3º melhor — verificar qual dos grupos possíveis classificou
    const classified = realThirds||[];
    const found = (slot.thirdGroups||[]).map(g=>realStandings?.[g]?.[3]).find(t=>t&&classified.includes(t));
    return found || '3º ('+( slot.thirdGroups||[]).join('/')+')';
  }
  if(slot.type==='W'||slot.type==='L') {
    // Vencedor ou perdedor de um jogo anterior
    const m = adminMatchesMap?.[slot.matchId];
    if(m?.is_finished) {
      if(slot.type==='W') return m.real_score1>m.real_score2?m.team1_name:m.real_score2>m.real_score1?m.team2_name:(m.team1_name+'?');
      if(slot.type==='L') return m.real_score1<m.real_score2?m.team1_name:m.real_score2<m.real_score1?m.team2_name:(m.team1_name+'?');
    }
    const prefix = slot.type==='W'?'Venc.':'Perd.';
    return prefix+' Jogo '+slot.matchId;
  }
  return '?';
}

function canBetGroups() {
  const today = new Date(); today.setHours(0,0,0,0);

}

function daysUntilGroupsDeadline() {
  const today = new Date(); today.setHours(0,0,0,0);
  const cutoff = new Date(GROUPS_DEADLINE + 'T00:00:00');
  return Math.ceil((cutoff - today) / 86400000);
}

function canBet(matchNum) {
  const dateStr = MATCH_DATES[matchNum];
  if(!dateStr) return true;
  const today = new Date();
  today.setHours(0,0,0,0);
  const matchDay = new Date(dateStr + 'T00:00:00');

function canBetPhase(phase) {
  const dateStr = KNOCKOUT_DATES[phase];
  if(!dateStr) return true;
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');

}

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.ceil((d - today) / 86400000);
}

function genMatches(){
  let n=1; const ms=[];
  Object.entries(GROUPS).forEach(([g,ts])=>{
    for(let i=0;i<ts.length;i++) for(let j=i+1;j<ts.length;j++) ms.push({num:n++,group:g,t1:ts[i],t2:ts[j]});
  }); return ms;
}

function calcPts(p1,p2,r1,r2){
  if(p1===r1&&p2===r2) return 10;
  const pw=p1>p2?1:p1<p2?2:0,rw=r1>r2?1:r1<r2?2:0,ok=pw===rw;
  if(ok&&(p1===r1||p2===r2)) return 7;
  if(ok) return 5;
  if(p1===r1||p2===r2) return 2;
  return 0;
}

let STATE = { user:null, profile:null, profiles:[], page:'dashboard', loading:true, toast:null };

function showToast(msg, type=''){
  // Mostrar/atualizar o toast sem re-renderizar a página inteira
  let toast = document.getElementById('_toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = '_toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.className = 'toast' + (type==='err' ? ' err' : '');
  toast.style.display = 'block';
  if(toast._timer) clearTimeout(toast._timer);
  toast._timer = setTimeout(()=>{ toast.style.display='none'; }, 3500);
}

// ── DB helpers ─────────────────────────────────────────────────────────────
async function dbQ(table, filters={}, cols='*'){
  const version = PAGE_VERSION;
  const timeout = new Promise((_,reject) => setTimeout(()=>reject(new Error('timeout')), 8000));
  let q = SB.from(table).select(cols);
  Object.entries(filters).forEach(([k,v])=>{ q=q.eq(k,v); });
  const {data,error} = await Promise.race([q, timeout]);
  if(PAGE_VERSION !== version) return []; // page changed, discard result
  if(error) throw error;
  return data||[];
}

async function dbQBolao(table, extraFilters={}, cols='*'){
  if(!CURRENT_BOLAO) return [];
  return dbQ(table, {bolao_id:CURRENT_BOLAO.id, ...extraFilters}, cols);
}

async function upsertWithReplicate(table, rows, conflictCols=''){
  if(!CURRENT_BOLAO) return;
  const targetBolaos = REPLICATE_ALL ? MY_BOLAOS : [CURRENT_BOLAO];
  for(const bolao of targetBolaos){
    const tagged = rows.map(r=>({...r, bolao_id:bolao.id}));
    const {error} = await SB.from(table).upsert(tagged);
    if(error) console.error(table, error);
  }
}
async function dbUpsert(table, rows){
  const {error} = await SB.from(table).upsert(Array.isArray(rows)?rows:[rows]);
  if(error) throw error;
}
async function dbDelete(table, filters={}){
  let q = SB.from(table).delete();
  Object.entries(filters).forEach(([k,v])=>{ q=q.eq(k,v); });
  const {error} = await q;
  if(error) throw error;
}

async function loadProfile(u){
  STATE.user=u;
  console.log('[loadProfile] Carregando perfil para:', u.email);
  const [pp,all] = await Promise.all([dbQ('profiles',{id:u.id}), dbQ('profiles',{},'id,display_name,is_admin')]);
  STATE.profile = pp[0]||null;
  STATE.profiles = all||[];

  // Garantir que o perfil existe e nunca é admin por padrão
  if(!STATE.profile){
    console.warn('[loadProfile] Perfil não encontrado — criando...');
    const username = u.email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g,'_');
    await dbUpsert('profiles',{id:u.id, username, display_name:username, is_admin:false});
    const [pp2] = await Promise.all([dbQ('profiles',{id:u.id})]);
    STATE.profile = pp2[0]||{id:u.id, username, display_name:username, is_admin:false};
    console.log('[loadProfile] Perfil criado:', STATE.profile);
  }

  // Garantir que is_admin é false para qualquer usuário não-admin
  if(STATE.profile && STATE.profile.is_admin && u.email !== 'nene.marley@gmail.com'){
    console.warn('[loadProfile] Usuário não-admin com is_admin=true! Corrigindo...');
    STATE.profile.is_admin = false;
  }

  await loadMyBolaos(u.id);
  console.log('[loadProfile] Bolões carregados:', MY_BOLAOS.length, MY_BOLAOS.map(b=>b.name));

  // Verificar convite pendente (via URL ?code=XXXX ou localStorage)
  const urlCode = new URLSearchParams(window.location.search).get('code');
  const pendingCode = urlCode || localStorage.getItem('pending_invite');
  console.log('[loadProfile] Código pendente:', pendingCode);

  if(pendingCode){
    localStorage.removeItem('pending_invite');
    // Limpar URL sem recarregar
    if(urlCode) window.history.replaceState({},'',window.location.pathname);
    try {
      console.log('[loadProfile] Buscando bolão com código:', pendingCode);
      const groups = await dbQ('bolao_groups',{invite_code:pendingCode.toUpperCase()});
      console.log('[loadProfile] Bolão encontrado:', groups);
      if(groups&&groups.length>0){
        const group=groups[0];
        const existing=await dbQ('bolao_members',{bolao_id:group.id,user_id:u.id});
        console.log('[loadProfile] Já é membro?', existing?.length>0);
        if(!existing||existing.length===0){
          const {error:insertErr} = await SB.from('bolao_members').insert({bolao_id:group.id,user_id:u.id,replicate_preds:true});
          if(insertErr){
            console.error('[loadProfile] Erro ao vincular ao bolão:', insertErr);
            showToast('Erro ao entrar no bolão: '+insertErr.message,'err');
          } else {
            console.log('[loadProfile] ✅ Vinculado ao bolão:', group.name);
            await loadMyBolaos(u.id);
            CURRENT_BOLAO=MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
            showToast('✅ Entrou no bolão "'+group.name+'"! Bem-vindo!');
          }
        } else {
          // Já é membro — apenas selecionar esse bolão
          await loadMyBolaos(u.id);
          CURRENT_BOLAO=MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
          showToast('Você já está no bolão "'+group.name+'"!');
        }
      } else {
        console.warn('[loadProfile] Código de convite não encontrado:', pendingCode);
        showToast('Código de convite inválido: '+pendingCode,'err');
      }
    } catch(e){
      console.error('[loadProfile] Erro no convite:', e);
      showToast('Erro ao processar convite: '+e.message,'err');
    }
  }

  if(MY_BOLAOS.length>0 && !CURRENT_BOLAO) CURRENT_BOLAO=MY_BOLAOS[0];
  console.log('[loadProfile] Bolão atual:', CURRENT_BOLAO?.name, '| Total bolões:', MY_BOLAOS.length);
  setState({user:u, loading:false, page: MY_BOLAOS.length===0?'bolaos':'dashboard'});
}

async function loadMyBolaos(uid){
  try {
    const members = await dbQ('bolao_members',{user_id:uid},'bolao_id,replicate_preds');
    console.log('[loadMyBolaos] Membros encontrados:', members?.length, members?.map(m=>m.bolao_id));
    if(!members||members.length===0){ MY_BOLAOS=[]; CURRENT_BOLAO=null; return; }
    const ids = members.map(m=>m.bolao_id);
    const groups = await dbQ('bolao_groups',{},'id,name,invite_code,created_by,description');
    MY_BOLAOS = groups.filter(g=>ids.includes(g.id)).map(g=>({
      ...g, replicate: members.find(m=>m.bolao_id===g.id)?.replicate_preds??true
    }));
    console.log('[loadMyBolaos] Bolões do usuário:', MY_BOLAOS.map(b=>b.name));
    if(!CURRENT_BOLAO && MY_BOLAOS.length>0) CURRENT_BOLAO = MY_BOLAOS[0];
  } catch(e){
    console.error('[loadMyBolaos] Erro:', e);
    MY_BOLAOS=[]; CURRENT_BOLAO=null;
  }
}

// ── Render engine ──────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e[k]=v;
    else if(k==='style') Object.assign(e.style,v);
    else if(k==='disabled') e.disabled=!!v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function render(){
  const app = document.getElementById('app');

  if(STATE.loading){ app.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'}))); return; }
  if(!STATE.user||!STATE.profile){ app.appendChild(renderAuth()); return; }
  app.appendChild(renderApp());
}

    if(semPalpiteHoje.length>0){

      const corBanner=temHoje?'rgba(239,68,68,.08)':'rgba(245,158,11,.08)';
      const corBorder=temHoje?'rgba(239,68,68,.3)':'rgba(245,158,11,.3)';
      const corTxt=temHoje?'#FCA5A5':'#FCD34D';
      const msgBanner=temHoje
        ? '🚫 '+semPalpiteHoje.length+' jogo(s) hoje sem palpite!'
        : '⚠️ '+semPalpiteHoje.length+' jogo(s) amanhã sem palpite — palpite agora!';
      wrap.appendChild(el('div',{
        style:{background:corBanner,borderBottom:'1px solid '+corBorder,
               padding:'5px 16px',textAlign:'center',fontSize:'.74rem',color:corTxt,fontWeight:'600',cursor:'pointer'},
        onclick:()=>setState({page:'matches'})
      },msgBanner+' → Ir para 1ª Fase'));
    }
  }
  // Header
  const hdr = el('div',{class:'hdr'});
  const hdrIn = el('div',{class:'hdr-in'});
  hdrIn.appendChild(el('div',{class:'logo'},'⚽ BOLÃO ',el('span',{},'COPA 2026')));
  const ui = el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'.82rem'}});
  const nameWrap = el('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',lineHeight:'1.2'}});
  nameWrap.appendChild(el('span',{},STATE.profile.display_name));
  if(CURRENT_BOLAO) nameWrap.appendChild(el('span',{style:{fontSize:'.62rem',color:'var(--gold)',fontWeight:'600'}},'📍 '+CURRENT_BOLAO.name));
  ui.appendChild(nameWrap);
  if(STATE.profile.is_admin) ui.appendChild(el('span',{class:'badge'},'ADMIN'));
  ui.appendChild(el('button',{class:'btn btn-o btn-sm',onclick:logout},'Sair'));
  hdrIn.appendChild(ui);
  hdr.appendChild(hdrIn);
  wrap.appendChild(hdr);

  // Nav
  const nav = el('div',{class:'nav'});
  const navIn = el('div',{class:'nav-in'});
  const navItems = [
    {key:'bolaos',label:'🎯 Meus Bolões'},
    {key:'dashboard',label:'🏆 Ranking'},
    {key:'matches',label:'⚽ 1ª Fase'},
    {key:'standings',label:'📊 Grupos'},
    {key:'knockout',label:'🔥 Eliminat.'},
    {key:'ko_matches',label:'⚔️ Jogos Elim.'},
    {key:'mine',label:'📋 Meus Pts'},
    ...(STATE.profile.is_admin?[{key:'admin',label:'🔧 Admin'}]:[]),
  ];
  navItems.forEach(n=>{
    const isAct = STATE.page===n.key;
    const btn = el('button',{class:`nb${isAct?' act':''}`,onclick:()=>setState({page:n.key})},n.label);
    navIn.appendChild(btn);
    if(isAct) {
      // Scroll active item into center after render
      setTimeout(()=>{
        const nav = navIn.parentElement;
        if(nav) {
          const btnLeft = btn.offsetLeft;
          const btnWidth = btn.offsetWidth;
          const navWidth = nav.offsetWidth;
          nav.scrollLeft = btnLeft - (navWidth/2) + (btnWidth/2);
        }
      }, 50);
    }
  });
  nav.appendChild(navIn);
  wrap.appendChild(nav);

  // Main content
  const main = el('div',{class:'main'});
  const page = STATE.page;
  if(page==='bolaos') renderBolaos(main);
  else if(page==='dashboard') renderDashboard(main);
  else if(page==='matches') renderMatches(main);
  else if(page==='standings') renderStandings(main);
  else if(page==='knockout') renderKnockout(main);
  else if(page==='ko_matches') renderKoMatches(main);
  else if(page==='mine') renderMine(main);
  else if(page==='admin'&&STATE.profile.is_admin) renderAdmin(main);
  wrap.appendChild(main);
  return wrap;
}


function renderGroupSelector(main, onSelect) {
  if(MY_BOLAOS.length === 0) {
    const warn = el('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid #EF4444',borderRadius:'8px',padding:'.875rem',marginBottom:'1rem',fontSize:'.82rem',color:'#FCA5A5'}},
      '⚠️ Você não está em nenhum bolão ainda. Vá em 🎯 Meus Bolões para criar ou entrar em um.');
    main.appendChild(warn);
    return false;
  }
  if(MY_BOLAOS.length === 1 && CURRENT_BOLAO) return true; // só 1 bolão, sem seletor

  const bar = el('div',{class:'group-selector'});
  bar.appendChild(el('span',{style:{fontSize:'.78rem',color:'var(--muted)',fontWeight:'600'}},'BOLÃO:'));
  MY_BOLAOS.forEach(b => {
    const isAct = CURRENT_BOLAO?.id===b.id;
    const pill = el('button',{
      class:'group-pill'+(isAct?' active':''),
      onclick:()=>{ CURRENT_BOLAO=b; onSelect(); }
    }, b.name);
    if(isAct){ pill.style.background='var(--gold)'; pill.style.color='#0A0F1E'; pill.style.borderColor='var(--gold)'; pill.style.fontWeight='700'; }
    bar.appendChild(pill);
  });
  main.appendChild(bar);
  return true;
}

function renderReplicateBar(main, onToggle) {
  if(MY_BOLAOS.length <= 1) return;
  const member = MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO?.id);
  const checked = member?.replicate ?? true;
  const bar = el('div',{class:'replicate-bar'});
  const cb = el('input',{type:'checkbox'}); cb.checked = checked;
  cb.onchange = async () => {
    REPLICATE_ALL = cb.checked;
    // Save preference
    await SB.from('bolao_members').upsert({bolao_id:CURRENT_BOLAO.id, user_id:STATE.profile.id, replicate_preds:cb.checked});
    if(MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO.id)) MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO.id).replicate=cb.checked;
    if(onToggle) onToggle(cb.checked);
  };
  const lbl = el('label',{},cb, '✨ Replicar meus palpites para todos os meus bolões');
  bar.appendChild(lbl);
  if(!checked) bar.appendChild(el('span',{style:{color:'var(--gold)',fontSize:'.75rem',marginLeft:'auto'}},'Palpitando só em: '+CURRENT_BOLAO?.name));
  main.appendChild(bar);
}


// ── Bolões Page ────────────────────────────────────────────────────────────
function renderBolaos(main) {
  main.innerHTML='';
  main.appendChild(el('div',{class:'ch'},'🎯 Meus Bolões'));

  // ── Bolões existentes ──
  if(MY_BOLAOS.length > 0) {
    MY_BOLAOS.forEach(b => {
      const isCreator = b.created_by === STATE.profile.id;
      const shareLink = `${window.location.origin}${window.location.pathname}?code=${b.invite_code}`;
      const card = el('div',{class:`bolao-card${CURRENT_BOLAO?.id===b.id?' active':''}`});

      const hdr = el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.875rem'}});
      const nameWrap = el('div');

      const badges = el('div',{style:{display:'flex',gap:'6px',marginTop:'4px',flexWrap:'wrap'}});

      if(CURRENT_BOLAO?.id===b.id) badges.appendChild(el('span',{class:'bolao-badge',style:{background:'rgba(16,185,129,.2)',color:'#6EE7B7',border:'1px solid #10B981'}},'✓ Ativo'));
      nameWrap.appendChild(badges);
      hdr.appendChild(nameWrap);
      card.appendChild(hdr);

      // ── Link de convite ── (destaque principal)
      const inviteBox = el('div',{style:{background:'var(--dk3)',border:'1px solid rgba(255,215,0,.25)',borderRadius:'10px',padding:'1rem',marginBottom:'.875rem'}});
      inviteBox.appendChild(el('div',{style:{fontSize:'.7rem',color:'var(--muted)',marginBottom:'.5rem',fontWeight:'600',letterSpacing:'.05em'}},'🔗 LINK DE CONVITE — compartilhe no WhatsApp'));
      
      // Link display
      const linkDisplay = el('div',{style:{background:'var(--dk)',borderRadius:'6px',padding:'8px 10px',fontSize:'.75rem',color:'var(--muted)',wordBreak:'break-all',marginBottom:'.75rem',fontFamily:'monospace'}},shareLink);
      inviteBox.appendChild(linkDisplay);

      // Action buttons
      const btnRow = el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}});
      
      const copyBtn = el('button',{class:'btn btn-p btn-sm',onclick:()=>{
        navigator.clipboard.writeText(shareLink).then(()=>showToast('✅ Link copiado! Cole no WhatsApp 📱'));
      }},'📋 Copiar Link');

      const shareBtn = el('button',{class:'btn btn-o btn-sm',onclick:()=>{
        if(navigator.share){
          navigator.share({title:`Bolão ${b.name} — Copa 2026`,text:`Entre no nosso bolão da Copa 2026! Use o código ${b.invite_code} ou acesse:`,url:shareLink});
        } else {
          navigator.clipboard.writeText(shareLink).then(()=>showToast('✅ Link copiado!'));
        }
      }},'📱 Compartilhar');

      btnRow.appendChild(copyBtn);
      btnRow.appendChild(shareBtn);
      inviteBox.appendChild(btnRow);

      // Código separado abaixo
      const codeRow = el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'.75rem'}});
      codeRow.appendChild(el('span',{style:{fontSize:'.7rem',color:'var(--muted)'}},'Ou só o código:'));
      const codeEl = el('span',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:'1.4rem',color:'var(--gold)',letterSpacing:'4px',cursor:'pointer'},onclick:()=>{
        navigator.clipboard.writeText(b.invite_code).then(()=>showToast('✅ Código '+b.invite_code+' copiado!'));
      }},b.invite_code+' 📋');
      codeRow.appendChild(codeEl);
      inviteBox.appendChild(codeRow);
      card.appendChild(inviteBox);

      // Participantes + botão ativar
      const footer = el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
      const membersEl = el('div',{style:{fontSize:'.78rem',color:'var(--muted)'}},'👥 carregando...');
      loadBolaoMembers(b.id).then(members => { membersEl.textContent=`👥 ${members.length} participante${members.length!==1?'s':''}`; });
      footer.appendChild(membersEl);

      const footerBtns = el('div',{style:{display:'flex',gap:'6px'}});
      if(CURRENT_BOLAO?.id!==b.id){
        const activateBtn = el('button',{class:'btn btn-s btn-sm',onclick:()=>{ CURRENT_BOLAO=b; setState({page:'dashboard'}); }},'✓ Ativar e ir ao Ranking');
        footerBtns.appendChild(activateBtn);
      }
      if(!isCreator){
        const leaveBtn = el('button',{class:'btn btn-d btn-sm',onclick:async()=>{
          if(!confirm('Sair do bolão "'+b.name+'"?')) return;
          await SB.from('bolao_members').delete().eq('bolao_id',b.id).eq('user_id',STATE.profile.id);
          await loadMyBolaos(STATE.profile.id);
          if(CURRENT_BOLAO?.id===b.id) CURRENT_BOLAO=MY_BOLAOS[0]||null;
          renderBolaos(main); showToast('Você saiu do bolão.');
        }},'Sair');
        footerBtns.appendChild(leaveBtn);
      }
      if(isCreator){
        const delBtn = el('button',{class:'btn btn-d btn-sm',onclick:async()=>{
          if(!confirm('⚠️ Excluir o bolão "'+b.name+'"? Isso remove todos os palpites dos participantes. Esta ação não pode ser desfeita!')) return;
          if(!confirm('Tem certeza? Todos os dados do bolão serão perdidos.')) return;
          try {
            // Delete all predictions for this bolao
            await SB.from('match_predictions').delete().eq('bolao_id',b.id);
            await SB.from('group_predictions').delete().eq('bolao_id',b.id);
            await SB.from('knockout_predictions').delete().eq('bolao_id',b.id);
            await SB.from('scorer_predictions').delete().eq('bolao_id',b.id);
            await SB.from('bolao_members').delete().eq('bolao_id',b.id);
            await SB.from('bolao_groups').delete().eq('id',b.id);
            await loadMyBolaos(STATE.profile.id);
            if(CURRENT_BOLAO?.id===b.id) CURRENT_BOLAO=MY_BOLAOS[0]||null;
            renderBolaos(main);
            showToast('✅ Bolão "'+b.name+'" excluído.');
          } catch(e){ showToast('Erro: '+e.message,'err'); }
        }},'🗑 Excluir Bolão');
        footerBtns.appendChild(delBtn);
      }
      footer.appendChild(footerBtns);
      card.appendChild(footer);
      main.appendChild(card);
    });
  } else {
    const empty = el('div',{style:{textAlign:'center',padding:'1.5rem',color:'var(--muted)',fontSize:'.875rem',background:'var(--card)',borderRadius:'12px',border:'1px solid var(--bdr)',marginBottom:'1rem'}});
    empty.appendChild(el('div',{style:{fontSize:'2rem',marginBottom:'.5rem'}},'🎯'));
    empty.appendChild(el('div',{style:{fontWeight:'600',marginBottom:'.25rem',color:'var(--txt)'}},'Nenhum bolão ainda'));
    empty.appendChild(document.createTextNode('Crie um bolão abaixo ou entre com um código de convite'));
    main.appendChild(empty);
  }

  // ── Criar novo bolão ──
  const createCard = el('div',{class:'card'});
  createCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.875rem',fontSize:'1.1rem'}},'➕ Criar Novo Bolão'));
  
  const nameI = el('input',{class:'fi',placeholder:'Nome do bolão (ex: Galera da Rua, Bolão Trabalho...)',style:{marginBottom:'.75rem'}});
  const descI = el('input',{class:'fi',placeholder:'Descrição opcional (ex: Bolão do pessoal do escritório)',style:{marginBottom:'.875rem'}});
  
  const createBtn = el('button',{class:'btn btn-p',style:{width:'100%'},onclick:async()=>{
    const nome = nameI.value.trim();
    if(!nome){ showToast('Digite o nome do bolão','err'); return; }
    createBtn.disabled=true; createBtn.textContent='Criando...';
    try {
      const code = Array.from({length:6},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
      const {data:bg, error:be} = await SB.from('bolao_groups').insert({
        name:nome, description:descI.value.trim()||null,
        invite_code:code, created_by:STATE.profile.id
      }).select().single();
      if(be) throw be;
      await SB.from('bolao_members').insert({bolao_id:bg.id, user_id:STATE.profile.id, replicate_preds:true});
      await loadMyBolaos(STATE.profile.id);
      CURRENT_BOLAO = MY_BOLAOS.find(b=>b.id===bg.id)||MY_BOLAOS[0];
      nameI.value=''; descI.value='';
      renderBolaos(main);
      showToast('✅ Bolão "'+nome+'" criado!');
    } catch(e){ showToast(e.message,'err'); createBtn.disabled=false; createBtn.textContent='Criar Bolão'; }
  }},'🎯 Criar Bolão');
  
  createCard.appendChild(nameI);
  createCard.appendChild(descI);
  createCard.appendChild(createBtn);
  main.appendChild(createCard);

  // ── Entrar com código ──
  const joinCard = el('div',{class:'card',style:{marginBottom:'2rem'}});
  joinCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.5rem',fontSize:'1.1rem'}},'🔑 Entrar com Código de Convite'));
  joinCard.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'.875rem'}},'Recebeu um código de 6 letras? Digite aqui:'));
  
  const codeI = el('input',{class:'code-input',placeholder:'ABC123',maxlength:'6'});
  codeI.oninput=()=>{ codeI.value=codeI.value.toUpperCase().replace(/[^A-Z0-9]/g,''); };
  
  const joinBtn = el('button',{class:'btn btn-p',style:{width:'100%',marginTop:'.75rem'},onclick:async()=>{
    const code = codeI.value.trim().toUpperCase();
    if(code.length!==6){ showToast('O código tem 6 caracteres','err'); return; }
    joinBtn.disabled=true; joinBtn.textContent='Buscando...';
    console.log('[joinBolao] Tentando entrar com código:', code);
    try {
      const groups = await dbQ('bolao_groups',{invite_code:code});
      console.log('[joinBolao] Bolão encontrado:', groups);
      if(!groups||groups.length===0) throw new Error('Código não encontrado. Verifique e tente novamente.');
      const group = groups[0];
      const existing = await dbQ('bolao_members',{bolao_id:group.id,user_id:STATE.profile.id});
      if(existing&&existing.length>0){
        showToast('Você já está no bolão "'+group.name+'"!');
        await loadMyBolaos(STATE.profile.id);
        CURRENT_BOLAO=MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
        joinBtn.disabled=false; joinBtn.textContent='Entrar no Bolão';
        renderBolaos(main); return;
      }
      console.log('[joinBolao] Inserindo em bolao_members...');
      const {error:insertErr} = await SB.from('bolao_members').insert({bolao_id:group.id, user_id:STATE.profile.id, replicate_preds:true});
      if(insertErr){
        console.error('[joinBolao] Erro:', insertErr);
        throw new Error('Erro ao entrar no bolão: '+insertErr.message);
      }
      console.log('[joinBolao] ✅ Vinculado com sucesso!');
      await loadMyBolaos(STATE.profile.id);
      CURRENT_BOLAO = MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
      codeI.value='';
      renderBolaos(main);
      showToast('✅ Entrou no bolão "'+group.name+'"! Bem-vindo!');
    } catch(e){
      console.error('[joinBolao] Erro:', e);
      showToast(e.message,'err');
    }
    joinBtn.disabled=false; joinBtn.textContent='Entrar no Bolão';
  }},'Entrar no Bolão');
  
  joinCard.appendChild(codeI);
  joinCard.appendChild(joinBtn);
  main.appendChild(joinCard);
}

async function loadBolaoMembers(bolaoId) {
  try {
    const members = await dbQ('bolao_members',{bolao_id:bolaoId},'user_id');
    return members||[];
  } catch { return []; }
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(main){
  const v = PAGE_VERSION;
  if(MY_BOLAOS.length>1) renderGroupSelector(main, ()=>renderDashboard(main));
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  const bolaoId = CURRENT_BOLAO?.id;
  const mFilter = bolaoId?{bolao_id:bolaoId}:{};
  Promise.all([
    dbQ('match_predictions',mFilter,'user_id,points'),
    dbQ('group_predictions',mFilter,'user_id,points'),
    dbQ('knockout_predictions',mFilter,'user_id,points'),
    dbQ('scorer_predictions',mFilter,'user_id,points'),
    bolaoId ? dbQ('bolao_members',{bolao_id:bolaoId},'user_id') : Promise.resolve([]),
  ]).then(([mp,gp,kp,sp,members])=>{
    if(PAGE_VERSION !== v) return;
    main.innerHTML='';

    // Filtrar só os membros do bolão atual
    const memberIds = new Set((members||[]).map(m=>m.user_id));
    const bolaoProfiles = bolaoId
      ? STATE.profiles.filter(p=>memberIds.has(p.id))
      : STATE.profiles;

    const totals={};
    bolaoProfiles.forEach(p=>{ totals[p.id]={m:0,g:0,k:0,s:0,prof:p}; });
    (mp||[]).forEach(r=>{ if(totals[r.user_id]) totals[r.user_id].m+=(r.points||0); });
    (gp||[]).forEach(r=>{ if(totals[r.user_id]) totals[r.user_id].g+=(r.points||0); });
    (kp||[]).forEach(r=>{ if(totals[r.user_id]) totals[r.user_id].k+=(r.points||0); });
    (sp||[]).forEach(r=>{ if(totals[r.user_id]) totals[r.user_id].s+=(r.points||0); });
    const rows=Object.values(totals).map(t=>({...t,total:t.m+t.g+t.k+t.s})).sort((a,b)=>b.total-a.total);

    const stats=el('div',{class:'stats'});
    [{v:bolaoProfiles.length,l:'Participantes'},{v:MATCHES.length,l:'Jogos 1ª Fase'},{v:12,l:'Grupos'},{v:48,l:'Seleções'}]
      .forEach(s=>stats.appendChild(el('div',{class:'sv'},el('div',{class:'svv'},''+s.v),el('div',{class:'svl'},s.l))));
    main.appendChild(stats);

    const card=el('div',{class:'card'});
    card.appendChild(el('div',{class:'ch'},'🏆 Ranking Geral'));
    const t=el('table',{class:'rkt'});
    t.appendChild(el('thead',{},el('tr',{},
      ...['#','Participante','Jogos','Grupos','Fases','Artilheiro','Total'].map(h=>el('th',{},h))
    )));
    const em=['🥇','🥈','🥉'],rc=['r1','r2','r3'];
    const tbody=el('tbody');
    rows.forEach((r,i)=>{
      const tr=el('tr');
      tr.appendChild(el('td',{class:rc[i]||''},em[i]||`${i+1}º`));
      const nameTd=el('td');
      const nameSpan=el('span',{style:{fontWeight:r.prof.id===STATE.profile.id?'700':'400',color:r.prof.id===STATE.profile.id?'var(--gold)':'inherit'}},r.prof.display_name);
      nameTd.appendChild(nameSpan);
      if(r.prof.is_admin) nameTd.appendChild(el('span',{class:'badge'},'ADMIN'));
      tr.appendChild(nameTd);
      [r.m,r.g,r.k,r.s].forEach(v=>tr.appendChild(el('td',{},''+v)));
      const totalTd=el('td'); totalTd.appendChild(el('span',{class:'pbadge'},''+r.total)); tr.appendChild(totalTd);
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);
    const tw=el('div',{class:'rkt-wrap'}); tw.appendChild(t); card.appendChild(tw);
    main.appendChild(card);
  });
}

function makeMatchCtrl(initVal, onChange) {
  let val = initVal===null||initVal===undefined ? null : initVal;
  const wrap = el('div',{style:{display:'flex',alignItems:'center',gap:'2px'}});
  const mn = el('button',{class:'score-btn'},'-');
  const dsp = el('span',{class:'score-val',style:{color:val===null?'var(--muted)':'var(--txt)'}},val===null?'—':''+val);
  const pl = el('button',{class:'score-btn'},'+');
  mn.onclick=()=>{ 
    if(val===null){val=0;}
    else if(val>0){val--;}
    dsp.textContent=val; dsp.style.color='var(--txt)';
    onChange(val); matchDirty=true; updateSaveBar(); 
  };
  pl.onclick=()=>{ 
    if(val===null){val=0;}
    else if(val<9){val++;}
    dsp.textContent=val; dsp.style.color='var(--txt)';
    onChange(val); matchDirty=true; updateSaveBar(); 
  };
  wrap.appendChild(mn); wrap.appendChild(dsp); wrap.appendChild(pl);
  return wrap;
}

async function saveMatches(){
  const rows=[];

      const r=realScores[m.num];

    const realThirdsKo = (rk||[]).find(r=>r.phase==='best_thirds');

  });

// Sincroniza koPreds com o pool atual baseado nos palpites de grupos
// Remove times do koPreds que saíram do pool (por mudança de grupo)
function syncKoPredsWithGrpPreds(){
  // Recalcular pool do round32 com grpPreds atual
  const userStandings={};
  Object.entries(GROUPS).forEach(([g])=>{
    if(!userStandings[g]) userStandings[g]={};
    [1,2,3,4].forEach(pos=>{
      if(grpPreds[g]?.[pos]?.team) userStandings[g][pos]=grpPreds[g][pos].team;
    });
  });
  koUserGrpStandings=userStandings;

  // Pool de 3ºs válidos: apenas os times que estão atualmente como 3º de algum grupo
  const valid3rds = Object.entries(GROUPS).map(([g])=>grpPreds[g]?.[3]?.team).filter(Boolean);

  // Limpar _thirds de times que não são mais 3ºs de nenhum grupo
  if(grpPreds['_thirds']) {
    grpPreds['_thirds'] = grpPreds['_thirds'].filter(t=>valid3rds.includes(t));
  }

  // Pool do round32: top2 de cada grupo + _thirds válidos
  const pool32=[];
  Object.values(userStandings).forEach(pos=>{
    if(pos[1]) pool32.push(pos[1]);
    if(pos[2]) pool32.push(pos[2]);
  });
  (grpPreds['_thirds']||[]).forEach(t=>{ if(!pool32.includes(t)) pool32.push(t); });

  // Limpar round32 de times que saíram do pool
  if(koPreds['round32']) {
    koPreds['round32'] = koPreds['round32'].filter(x=>pool32.includes(x.team));
  }
  // Cascata: limpar fases seguintes
  const nextMap={
    round32:['round16','quarter','semi','final','champion','runner_up','third'],
    round16:['quarter','semi','final','champion','runner_up','third'],
    quarter:['semi','final','champion','runner_up','third'],
    semi:['final','champion','runner_up','third'],
    final:['champion','runner_up']
  };
  ['round32','round16','quarter','semi','final'].forEach(phase=>{
    if(!koPreds[phase]) return;
    const avail=koPreds[phase].map(x=>x.team);
    (nextMap[phase]||[]).forEach(np=>{
      if(koPreds[np]) koPreds[np]=koPreds[np].filter(x=>avail.includes(x.team));
    });
  });
}

          }
          grpPreds[g][pos]={team:sel.value,pts:newPts};
          // Se mudou o 3º colocado, remover o time antigo dos _thirds automaticamente
          if(pos===3 && oldTeam && oldTeam!==sel.value && grpPreds['_thirds']) {
            const i=grpPreds['_thirds'].indexOf(oldTeam);
            if(i>=0) grpPreds['_thirds'].splice(i,1);
          }
          // Se mudou 1º ou 2º e o novo time estava nos _thirds, removê-lo também
          if(pos<=2 && sel.value && grpPreds['_thirds']) {
            const i=grpPreds['_thirds'].indexOf(sel.value);
            if(i>=0) grpPreds['_thirds'].splice(i,1);
          }
          // FIX 1+3: sincronizar koPreds com o novo pool (grupos mudaram)
          syncKoPredsWithGrpPreds();
          grpDirty=true; updateGrpSaveBar();
          buildStandingsUI(main);
        };
        pr.appendChild(sel);

        // Badge de pontuação só para 1º e 2º
        if(pos<=2 && curr && pts!==undefined){
          pr.appendChild(el('span',{class:`pp ${pts===10?'p10':pts===5?'p5':'p0'}`,style:{whiteSpace:'nowrap'}},pts+'p'));
        }
        sc.appendChild(pr);
      });

      grid.appendChild(sc);
    });
    main.appendChild(grid);
  }

  // ── ABA 2: MELHORES 3ºS ─────────────────────────────────────────────────
  if(window._grpSubTab==='thirds'){
    const thirdsCount=selectedThirdsClean.length;
    main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.78rem',marginBottom:'.75rem'}},'Selecione até 8 dos 12 terceiros colocados que passarão como melhores 3ºs · Acertar = 5pts cada'));
    main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.72rem',marginBottom:'.75rem',fontStyle:'italic'}},'Os times exibidos são os 3ºs que você palpitou na aba Classificados. Preencha primeiro todos os grupos.'));
    main.appendChild(el('div',{style:{fontSize:'.82rem',fontWeight:'600',color:thirdsCount===8?'var(--ok)':'var(--gold)',marginBottom:'1rem'}},
      thirdsCount+'/8 selecionados'+(thirdsCount===8?' ✓':'')));

    // Pool: apenas os 3ºs palpitados pelo usuário (posição 3 de cada grupo)
    const poolWrap=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}});
    let missingGroups=[];

    Object.entries(GROUPS).forEach(([g,teams])=>{
      const third3=grpPreds[g]?.[3]?.team||null;
      const isReal=realThirdsReal.includes(third3);
      const isSel=third3&&selectedThirdsClean.includes(third3);
      const blocked=!isSel && thirdsCount>=8;

      if(!third3){
        missingGroups.push(g);
        // Mostrar placeholder cinza
        const ph=el('button',{
          class:'btn btn-sm btn-o',
          disabled:true,
          style:{opacity:'0.3',cursor:'not-allowed'}
        },'G'+g+': — sem palpite');
        poolWrap.appendChild(ph);
        return;
      }

      let cls='btn-o';
      if(isSel && isReal) cls='btn-s';
      else if(isSel && realThirdsReal.length>0 && !isReal) cls='btn-d';
      else if(isSel) cls='btn-p';

      const label=(FLAGS[third3]||'🏳')+' '+third3+(isSel&&isReal?' · 5p':'');

      const b=el('button',{
        class:`btn btn-sm ${cls}`,
        disabled:blocked,
        style:blocked?{opacity:'0.3',cursor:'not-allowed'}:{},
        onclick:()=>{
          if(!grpOpen){ showToast('Prazo encerrado!','err'); return; }
          if(!grpPreds['_thirds']) grpPreds['_thirds']=[];
          const idx=grpPreds['_thirds'].indexOf(third3);
          if(idx>=0){
            grpPreds['_thirds'].splice(idx,1);
          } else {
            if(grpPreds['_thirds'].length>=8){ showToast('Máximo 8!','err'); return; }
            grpPreds['_thirds'].push(third3);
          }
          syncKoPredsWithGrpPreds();
          grpDirty=true; updateGrpSaveBar(); buildStandingsUI(main);
        }
      },label);
      poolWrap.appendChild(b);
    });

    main.appendChild(poolWrap);

    if(missingGroups.length>0){
      main.appendChild(el('div',{style:{fontSize:'.72rem',color:'var(--muted)',marginTop:'1rem',fontStyle:'italic'}},
        '⚠️ Falta palpitar o 3º colocado dos grupos: '+missingGroups.join(', ')+' — vá em Classificados por Grupo'));
    }
  }

  updateGrpSaveBar();
}

async function saveStandings(){
  const rows=[];
  Object.entries(GROUPS).forEach(([g])=>{
    [1,2,3,4].forEach(pos=>{
      const p=grpPreds[g]?.[pos];
      if(p?.team){
        let pts=0;
        // Só 1º e 2º pontuam
        if(pos<=2){
          if(grpReal[g]?.[pos]===p.team) pts=10;
          else if([grpReal[g]?.[1],grpReal[g]?.[2]].includes(p.team)) pts=5;
        }
        rows.push({user_id:STATE.profile.id,group_id:g,position:pos,team_name:p.team,points:pts});
      }
    });
  });
  // Salvar os 8 melhores terceiros palpitados (group_id='_thirds', position=índice 1..8)
  const thirds = grpPreds['_thirds']||[];
  const realThirds = grpReal['_thirds_real']||[];
  thirds.forEach((team, idx)=>{

// ── Knockout ───────────────────────────────────────────────────────────────
let koPreds={}, koReal={}, koScorer='', koDirty=false, koRealThirds=[], koUserThirds=[], koUserGrpStandings={};
// Get teams available for a phase based on previous phase selections
function getAvailableTeams(phase, currentPreds, realStandings, userThirds) {
  // REGRA: filtro SEMPRE pelos palpites do usuário, NUNCA pelos resultados reais do admin
  // realStandings é passado apenas para resolveSlot (exibição) — não influencia o pool aqui

  if(phase === 'round32') {
    // Pool = palpites do usuário: 1º e 2º de cada grupo + 8 melhores 3ºs escolhidos por ele
    const standings = koUserGrpStandings || {};
    const classified = [];
    Object.entries(standings).forEach(([g, pos]) => {
      if(pos[1]) classified.push(pos[1]);
      if(pos[2]) classified.push(pos[2]);
    });
    (userThirds||[]).forEach(t => { if(!classified.includes(t)) classified.push(t); });
    // Mostra o que o usuário preencheu — sem fallback para dados do admin
    return classified.length >= 2 ? classified : ALL_TEAMS;
  }

  if(phase === 'round16') {
    const prev = currentPreds['round32'];
    if(prev && prev.length > 0) return prev.map(x=>x.team);
    return []; // fase anterior vazia → sem pool
  }

  // Quartas, Semi, Final, 3º: cascata estrita dos palpites anteriores
  const prevPhase = {quarter:'round16', semi:'quarter', final:'semi', third:'semi'};
  const prev = prevPhase[phase];
  if(prev && currentPreds[prev] && currentPreds[prev].length > 0) {
    return currentPreds[prev].map(x=>x.team);
  }
  return [];
}

function renderKnockout(main){
  const v = PAGE_VERSION;
  main.appendChild(el('div',{class:'ch'},'🔥 Fases Eliminatórias'));
  if(!CURRENT_BOLAO){

    w.appendChild(el('button',{class:'btn btn-p',onclick:()=>setState({page:'bolaos'})},'Ir para Meus Bolões'));
    main.appendChild(w); return;
  }
  if(MY_BOLAOS.length>1) renderGroupSelector(main, ()=>renderKnockout(main));
  renderReplicateBar(main, ()=>renderKnockout(main));
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  Promise.all([
    CURRENT_BOLAO ? dbQ('knockout_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'phase,team_name,points') : Promise.resolve([]),
    dbQ('real_knockouts',{},'phase,team_ids'),
    dbQ('scorer_predictions',{user_id:STATE.profile.id},'player_name,points'),
    CURRENT_BOLAO ? dbQ('group_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id,group_id:'_thirds'},'group_id,team_name,points') : Promise.resolve([]),
    dbQ('real_group_standings',{},'group_id,position,team_name'),
    CURRENT_BOLAO ? dbQ('group_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'group_id,position,team_name') : Promise.resolve([]),
  ]).then(([kp,rk,sp,thirdPreds,rgs,userGrpPreds])=>{
    if(PAGE_VERSION !== v) return;
    main.innerHTML='';
    main.appendChild(el('div',{class:'ch'},'🔥 Fases Eliminatórias'));
    if(MY_BOLAOS.length>1) renderGroupSelector(main, ()=>renderKnockout(main));
    renderReplicateBar(main, ()=>buildKoUI(main));
    koPreds={};
    (kp||[]).forEach(p=>{ if(!koPreds[p.phase])koPreds[p.phase]=[]; koPreds[p.phase].push({team:p.team_name,pts:p.points}); });
    PHASES.forEach(ph=>{ if(koPreds[ph.key]&&koPreds[ph.key].length>ph.count) koPreds[ph.key]=koPreds[ph.key].slice(0,ph.count); });
    koReal={};
    (rk||[]).forEach(r=>{ koReal[r.phase]=r; });
    koScorer=(sp||[])[0]?.player_name||'';
    koRealThirds = (koReal['best_thirds']?.team_ids||[]);
    koUserThirds = (thirdPreds||[]).map(p=>p.team_name).filter(Boolean);
    // Real standings para mostrar resultados reais
    grpReal={};
    (rgs||[]).forEach(r=>{ if(!grpReal[r.group_id])grpReal[r.group_id]={}; grpReal[r.group_id][r.position]=r.team_name; });
    // Palpites do usuário nos grupos (1º e 2º) para montar pool do round32
    const userGrpStandings={};
    (userGrpPreds||[]).forEach(p=>{
      if(p.group_id==='_thirds') return;
      if(!userGrpStandings[p.group_id]) userGrpStandings[p.group_id]={};
      userGrpStandings[p.group_id][p.position]=p.team_name;
    });
    // Usar palpites do usuário como pool se definidos, senão usar resultados reais
    // REGRA: usar SEMPRE os palpites do usuário — nunca grpReal (resultados reais do admin)
    // FIX 4: se grpPreds está dirty (usuário mudou grupos sem salvar), usar grpPreds atual
    if(grpDirty && Object.keys(grpPreds).length>0) {
      const liveStandings={};
      Object.entries(GROUPS).forEach(([g])=>{
        if(!liveStandings[g]) liveStandings[g]={};
        [1,2,3,4].forEach(pos=>{ if(grpPreds[g]?.[pos]?.team) liveStandings[g][pos]=grpPreds[g][pos].team; });
      });
      koUserGrpStandings = liveStandings;
    } else {
      koUserGrpStandings = userGrpStandings;
    }
    koDirty=false;
    buildKoUI(main);
  });
}

        const isReal3=rp3?.team_ids?.includes(team);
        let cls='btn-o';
        if(isSel3&&isReal3) cls='btn-s';
        else if(isSel3&&rp3&&!isReal3) cls='btn-d';
        else if(isSel3) cls='btn-p';
        const blocked3=!isSel3&&isFull3;
        const b3=el('button',{
          class:`btn btn-sm ${cls}`,
          disabled:blocked3,
          style:blocked3?{opacity:'0.35',cursor:'not-allowed'}:{},
          onclick:()=>{
            koPreds['third']=isSel3?[]:[{team,pts:isReal3?10:0}];
            koDirty=true; buildKoUI(main);
          }
        },(FLAGS[team]||'')+' '+team+(isSel3&&isReal3?' ·10p':''));
        btns3.appendChild(b3);
      });
      card3.appendChild(btns3);
      main.appendChild(card3);
    }
  }

  // ── Artilheiro ──
  const scard=el('div',{class:'card',style:{marginBottom:'4rem'}});
  scard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.6rem'}},'⚽ Artilheiro'));
  const si=el('input',{class:'fi',placeholder:'Ex: Mbappé, Vinicius Jr...',value:koScorer});
  si.oninput=()=>{ koScorer=si.value; koDirty=true; };
  scard.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome do artilheiro da Copa'),si));
  if(koReal['top_scorer']){
    const realScorer=koReal['top_scorer'].team_ids?.[0]||'-';
    const scorerRow=el('div',{style:{fontSize:'.8rem',color:'var(--muted)',marginTop:'.4rem'}});
    scorerRow.appendChild(document.createTextNode('Artilheiro real: '+realScorer));
    if(koScorer){
      const sPts=koScorer.trim().toLowerCase()===realScorer.trim().toLowerCase()?10:0;
      scorerRow.appendChild(el('span',{class:'pp '+(sPts>0?'p10':'p0'),style:{marginLeft:'8px'}},sPts+'pts'));
    }
    scard.appendChild(scorerRow);
  }
  main.appendChild(scard);

  // Save bar
  let sb=document.getElementById('savebar');
  if(!sb){ sb=el('div',{class:'sbar',id:'savebar'}); document.body.appendChild(sb); }
  sb.innerHTML=''; sb.style.display='flex';
  const inn=el('div',{class:'sbar-in'});
  inn.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.82rem'}},koDirty?'Alterações não salvas':''));
  inn.appendChild(el('button',{class:'btn btn-p',onclick:saveKo},'💾 Salvar'));
  sb.appendChild(inn);
}

async function saveKo(){
  try{
    // Auto-calcular vice (finalista que não é campeão)
    const finalPicks = (koPreds['final']||[]).map(x=>x.team);
    const champPick  = (koPreds['champion']||[])[0]?.team;
    const viceTeam   = finalPicks.find(t=>t!==champPick);
    if(viceTeam){
      const realVice = koReal['runner_up']?.team_ids?.[0];
      koPreds['runner_up']=[{team:viceTeam, pts:realVice&&viceTeam===realVice?10:0}];
    }
    const rows=[];
    Object.entries(koPreds).forEach(([phase,teams])=>{
      const rp=koReal[phase];
      teams.forEach(({team})=>{
        let pts=0;
        if(rp?.team_ids?.includes(team)) pts=phase==='champion'?20:10;
        rows.push({user_id:STATE.profile.id,phase,team_name:team,points:pts});
      });
    });
    const targetBolaos2=REPLICATE_ALL?MY_BOLAOS:[CURRENT_BOLAO];
    for(const bolao of targetBolaos2){
      await SB.from('knockout_predictions').delete().eq('user_id',STATE.profile.id).eq('bolao_id',bolao.id);
      if(rows.length>0) await SB.from('knockout_predictions').insert(rows.map(r=>({...r,bolao_id:bolao.id})));
      if(koScorer.trim()){
        const rp=koReal['top_scorer'];
        const pts=rp?.team_ids?.[0]?.toLowerCase()===koScorer.toLowerCase()?10:0;
        await SB.from('scorer_predictions').upsert({user_id:STATE.profile.id,player_name:koScorer,points:pts,bolao_id:bolao.id});
      }
    }
    koDirty=false; showToast('✅ Palpites salvos!'+(REPLICATE_ALL&&MY_BOLAOS.length>1?' (em todos os bolões)':''));
    const sb=document.getElementById('savebar'); if(sb) sb.innerHTML='';
  }catch(e){ showToast(e.message,'err'); }
}

// ── Ko Matches (Jogos Eliminatórios) ───────────────────────────────────────
let koMatchPreds={}, koMatchReal={}, koMatchDirty=false, koMatchPhase='round32', koMatchRealSt={};
const KO_PHASE_LABELS = {round32:'Rodada de 32',round16:'Oitavas de Final',quarter:'Quartas de Final',semi:'Semifinal',final:'Final',third:'3º Lugar'};

function resolveSlot(slot, realStandings) {
  if(slot.type==='1'||slot.type==='2') {
    const pos = slot.type==='1'?1:2;
    return realStandings?.[slot.group]?.[pos] || (slot.type+'º do Grupo '+slot.group);
  }
  // tipo 3: melhor terceiro — admin define via real_knockouts 'best_thirds'
  return '3º ('+slot.thirdGroups.join('/')+')';
}

function renderKoMatches(main){
  const v = PAGE_VERSION;
  main.appendChild(el('div',{class:'ch'},'⚔️ Jogos Eliminatórios'));
  if(!CURRENT_BOLAO){
    const w=el('div',{style:{background:'rgba(255,215,0,.08)',border:'1px solid rgba(255,215,0,.3)',borderRadius:'8px',padding:'1.25rem',textAlign:'center'}});
    w.appendChild(el('div',{style:{fontSize:'1.5rem',marginBottom:'.5rem'}},'🎯'));
    w.appendChild(el('div',{style:{fontWeight:'600',marginBottom:'.5rem'}},'Selecione um bolão primeiro'));
    w.appendChild(el('button',{class:'btn btn-p',onclick:()=>setState({page:'bolaos'})},'Ir para Meus Bolões'));
    main.appendChild(w); return;
  }
  if(MY_BOLAOS.length>1) renderGroupSelector(main, ()=>renderKoMatches(main));
  renderReplicateBar(main, ()=>renderKoMatches(main));
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  Promise.all([
    CURRENT_BOLAO ? dbQ('match_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'match_number,predicted_score1,predicted_score2,points') : Promise.resolve([]),
    dbQ('group_matches',{},'match_number,team1_name,team2_name,real_score1,real_score2,is_finished,group_id'),
    dbQ('real_group_standings',{},'group_id,position,team_name'),
    dbQ('real_knockouts',{},'phase,team_ids'),
  ]).then(([mp,rm,rs,rk])=>{
    if(PAGE_VERSION!==v) return;
    main.innerHTML='';
    main.appendChild(el('div',{class:'ch'},'⚔️ Jogos Eliminatórios'));
    if(MY_BOLAOS.length>1) renderGroupSelector(main, ()=>renderKoMatches(main));
    renderReplicateBar(main, ()=>buildKoMatchesUI(main, realSt));
    koMatchPreds={};
    (mp||[]).forEach(p=>{ koMatchPreds[p.match_number]={s1:p.predicted_score1,s2:p.predicted_score2,pts:p.points}; });
    koMatchReal={};
    (rm||[]).forEach(m=>{ if(m.group_id && m.group_id.startsWith('KO_')) koMatchReal[m.match_number]=m; });
    // Real standings para resolver slots
    const realSt={};
    (rs||[]).forEach(r=>{ if(!realSt[r.group_id])realSt[r.group_id]={}; realSt[r.group_id][r.position]=r.team_name; });
    // Real knockouts para saber 8 melhores 3ºs
    koReal={};
    (rk||[]).forEach(r=>{ koReal[r.phase]=r; });
    koMatchDirty=false;
    koMatchRealSt=realSt||{};
    buildKoMatchesUI(main, koMatchRealSt);
  });
}

function buildKoMatchesUI(main, realSt){
  if(!realSt) realSt=koMatchRealSt||{};
  koMatchRealSt=realSt;
  main.innerHTML='';

  // Tabs de fase
  const tabs=el('div',{class:'tabs',style:{marginBottom:'1rem'}});
  Object.entries(KO_PHASE_LABELS).forEach(([k,l])=>{
    tabs.appendChild(el('button',{class:`tb${koMatchPhase===k?' act':''}`,onclick:()=>{koMatchPhase=k;buildKoMatchesUI(main,koMatchRealSt);}},l));
  });
  main.appendChild(tabs);

  // Verificar jogos desta fase (group_id='KO_round32' etc)
  const phaseKey = 'KO_'+koMatchPhase;
  const phaseMatches = Object.values(koMatchReal).filter(m=>m.group_id===phaseKey);

  if(phaseMatches.length===0){
    // Mostrar chaveamento previsto para qualquer fase
    const bracket = PHASE_BRACKETS[phaseKey];
    const adminMatchesMap = {};
    Object.values(koMatchReal).forEach(m=>{ adminMatchesMap[m.match_number]=m; });
    const realThirds = (koReal&&koReal['best_thirds']?.team_ids)||[];

    const empty=el('div',{style:{padding:'1rem 0',color:'var(--muted)'}});
    empty.appendChild(el('div',{style:{fontWeight:'600',color:'var(--txt)',marginBottom:'.4rem',fontSize:'.9rem'}},'📋 Confrontos previstos — '+KO_PHASE_LABELS[koMatchPhase]));
    empty.appendChild(el('div',{style:{fontSize:'.75rem',marginBottom:'1rem'}},'Os palpites de placar ficam disponíveis quando o Admin confirmar os jogos.'));

    if(bracket && bracket.length>0){
      const bkt=el('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
      bracket.forEach(m=>{
        const t1=String(resolveMatchSlot(m.slot1,realSt,realThirds,adminMatchesMap)||'?');
        const t2=String(resolveMatchSlot(m.slot2,realSt,realThirds,adminMatchesMap)||'?');
        const row=el('div',{style:{background:'var(--card)',border:'1px solid var(--bdr)',borderRadius:'8px',padding:'.6rem .875rem',display:'flex',alignItems:'center',gap:'8px',fontSize:'.82rem'}});
        row.appendChild(el('span',{style:{color:'var(--muted)',minWidth:'28px',fontSize:'.7rem'}},'#'+String(m.id)));
        row.appendChild(el('span',{style:{flex:'1',fontWeight:'600'}},t1));
        row.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700'}},'×'));
        row.appendChild(el('span',{style:{flex:'1',fontWeight:'600',textAlign:'right'}},t2));
        bkt.appendChild(row);
      });
      empty.appendChild(bkt);
    } else {
      empty.appendChild(el('div',{style:{fontSize:'.85rem',fontStyle:'italic'}},'Chaveamento desta fase não mapeado ainda.'));
    }
    main.appendChild(empty);
    return;
  }

  // Mostrar jogos com palpite de placar
  main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.82rem',marginBottom:'1rem'}},'Placar exato=10pts · Resultado+1 gol=7pts · Só resultado=5pts · 1 gol certo=2pts'));
  phaseMatches.sort((a,b)=>a.match_number-b.match_number).forEach(m=>{
    const p=koMatchPreds[m.match_number]||{};
    const hasResult = m.is_finished && m.real_score1!==undefined;
    const canBetNow = canBetKoMatch(m.match_number); // bloqueia no dia do jogo
    const locked = !canBetNow; // bloqueado por data OU resultado finalizado
    const hasPred = p.s1!==undefined;
    const pts = hasResult && hasPred ? calcPts(p.s1,p.s2||0,m.real_score1,m.real_score2) : 0;
    const ptsCls = pts===10?'p10':pts===7?'p7':pts===5?'p5':pts===2?'p2':'p0';
    const daysLeft = daysUntilKoMatch(m.match_number);

    const mc=el('div',{class:'mc'+(locked?' fin':''),style:{display:'block',padding:'.875rem',marginBottom:'8px'}});

    // Times
    const tr2=el('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'.4rem'}});
    tr2.appendChild(el('span',{style:{fontSize:'.95rem'}},FLAGS[m.team1_name]||'🏳'));
    tr2.appendChild(el('span',{style:{fontSize:'.78rem',fontWeight:'600',flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.team1_name));
    tr2.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.7rem',fontWeight:'700',flexShrink:'0'}},' × '));
    tr2.appendChild(el('span',{style:{fontSize:'.78rem',fontWeight:'600',flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}},m.team2_name));
    tr2.appendChild(el('span',{style:{fontSize:'.95rem'}},FLAGS[m.team2_name]||'🏳'));
    mc.appendChild(tr2);

    // Placar — bloquear no dia do jogo (por data) ou se já finalizado
    const v1=hasPred?p.s1:null, v2=hasPred?p.s2:null;
    const scoreRow=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'4px',marginBottom:'.3rem'}});
    if(locked){
      // Jogo bloqueado por data ou finalizado — modo leitura
      const showS1 = hasPred ? p.s1 : '—';
      const showS2 = hasPred ? p.s2 : '—';
      const roRow=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',fontSize:'.9rem',color:'var(--muted)',margin:'.3rem 0'}});
      roRow.appendChild(el('span',{style:{fontSize:'.7rem'}},'Meu palpite:'));
      roRow.appendChild(el('span',{style:{fontWeight:'700',color:'var(--txt)'}},showS1+' × '+showS2));
      if(!hasPred) roRow.appendChild(el('span',{style:{fontSize:'.7rem',color:'#EF4444'}},' (sem palpite)'));
      mc.appendChild(roRow);
    } else {
      // Jogo ainda aberto — aviso se amanhã
      if(daysLeft===1){
        mc.appendChild(el('div',{style:{fontSize:'.7rem',color:'#F59E0B',textAlign:'center',marginBottom:'4px'}},'⚠️ Último dia para palpitar!'));
      }
      scoreRow.appendChild(makeMatchCtrl(v1,v=>{ koMatchPreds[m.match_number]={...(koMatchPreds[m.match_number]||{}),s1:v,s2:koMatchPreds[m.match_number]?.s2??0}; koMatchDirty=true; updateKoMatchSaveBar(); }));
      scoreRow.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700',fontSize:'.9rem',margin:'0 3px'}},'×'));
      scoreRow.appendChild(makeMatchCtrl(v2,v=>{ koMatchPreds[m.match_number]={...(koMatchPreds[m.match_number]||{}),s2:v,s1:koMatchPreds[m.match_number]?.s1??0}; koMatchDirty=true; updateKoMatchSaveBar(); }));
      mc.appendChild(scoreRow);
    }

    if(hasResult){
      const rr=el('div',{style:{textAlign:'center',fontSize:'.7rem',color:'var(--muted)',marginBottom:'.2rem'}});
      rr.appendChild(document.createTextNode('Resultado real: '));
      rr.appendChild(el('span',{style:{color:'var(--gold)',fontWeight:'700',fontFamily:"'Bebas Neue',cursive",fontSize:'.9rem'}},m.real_score1+' — '+m.real_score2));
      if(hasPred) rr.appendChild(el('span',{class:'pp '+ptsCls,style:{marginLeft:'4px',fontSize:'.65rem'}},pts+'pts'));
      mc.appendChild(rr);
    }
    main.appendChild(mc);
  });
  updateKoMatchSaveBar();
}

  let sb=document.getElementById('savebar');
  if(!sb){ sb=el('div',{class:'sbar',id:'savebar'}); document.body.appendChild(sb); }
  sb.innerHTML='';
  if(!koMatchDirty){ sb.style.display='none'; return; }
  sb.style.display='flex';
  const inn=el('div',{class:'sbar-in'});
  inn.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.82rem'}},'Alterações não salvas'));
  inn.appendChild(el('button',{class:'btn btn-p',onclick:saveKoMatches},'💾 Salvar Palpites'));
  sb.appendChild(inn);
}

function normalizeTeamName(name) {
  if(!name) return null;
  if(ALL_TEAMS.includes(name)) return name;
  if(TEAM_NAME_MAP[name]) return TEAM_NAME_MAP[name];
  // Case-insensitive fallback
  const lower = name.toLowerCase();
  return ALL_TEAMS.find(t=>t.toLowerCase()===lower) || null;
}

async function applyAIResults(data, log) {
  // 1. Salvar resultados dos jogos da fase de grupos
  if(data.matches && data.matches.length>0) {
    for(const m of data.matches) {
      if(!m.finished) continue;
      // Normalizar nomes (Claude pode retornar em inglês ou variações)
      const t1 = normalizeTeamName(m.team1);
      const t2 = normalizeTeamName(m.team2);
      if(!t1){ log('⚠️ Time não reconhecido: "'+m.team1+'" — ignorado', '#F59E0B'); continue; }
      if(!t2){ log('⚠️ Time não reconhecido: "'+m.team2+'" — ignorado', '#F59E0B'); continue; }
      const matchEntry = Object.values(adminMatches).find(am=>
        (am.team1_name===t1 && am.team2_name===t2) ||
        (am.team1_name===t2 && am.team2_name===t1)
      );
      if(!matchEntry){ log('⚠️ Jogo não encontrado: '+t1+' × '+t2, '#F59E0B'); continue; }
      const s1 = matchEntry.team1_name===t1 ? m.score1 : m.score2;
      const s2 = matchEntry.team1_name===t1 ? m.score2 : m.score1;
      await dbUpsert('group_matches',{match_number:matchEntry.match_number,real_score1:s1,real_score2:s2,is_finished:true,team1_name:matchEntry.team1_name,team2_name:matchEntry.team2_name,group_id:matchEntry.group_id});
      const preds = await dbQ('match_predictions',{match_number:matchEntry.match_number});
      if(preds.length>0) await dbUpsert('match_predictions',preds.map(p=>({...p,points:calcPts(p.predicted_score1,p.predicted_score2,s1,s2)})));
      adminMatches[matchEntry.match_number]={...matchEntry,real_score1:s1,real_score2:s2,is_finished:true};
      log('✅ '+matchEntry.team1_name+' '+s1+'-'+s2+' '+matchEntry.team2_name, '#10B981');
    }
  }

  // 2. Salvar classificação dos grupos
  if(data.standings && Object.keys(data.standings).length>0) {
    const standRows=[];
    Object.entries(data.standings).forEach(([g,pos])=>{
      Object.entries(pos).forEach(([p,t])=>{
        const norm = normalizeTeamName(t);
        if(norm) standRows.push({group_id:g,position:parseInt(p),team_name:norm});
        else if(t) log('⚠️ Time não reconhecido na classificação: "'+t+'"', '#F59E0B');
      });
    });
    if(standRows.length>0) {
      await dbUpsert('real_group_standings',standRows);
      // Recalcular pontos de group_predictions
      for(const row of standRows) {
        const preds = await dbQ('group_predictions',{group_id:row.group_id,position:row.position});
        if(preds.length>0) {
          const allReal = standRows.filter(r=>r.group_id===row.group_id);
          const rm={}; allReal.forEach(r=>rm[r.position]=r.team_name);
          const realThirdsAI2 = data.best_thirds||[];
          await dbUpsert('group_predictions',preds.map(p=>{
            let pts=0;
            if(p.position<=3){
              const rp=(()=>{if(rm[1]===p.team_name)return 1;if(rm[2]===p.team_name)return 2;if(realThirdsAI2.map(t=>normalizeTeamName(t)||t).includes(p.team_name))return 3;return null;})();
              if(rp!==null) pts=calcGrpPts(p.position,rp);
            }
            return {...p,points:pts};
          }));
        }
      }
      log('✅ Classificação de '+Object.keys(data.standings).length+' grupos atualizada', '#10B981');
    }
  }

  // 3. Salvar 8 melhores 3ºs
  if(data.best_thirds && data.best_thirds.length>0) {
    const normThirds = data.best_thirds.map(t=>normalizeTeamName(t)).filter(Boolean);
    await dbUpsert('real_knockouts',{phase:'best_thirds',team_ids:normThirds});
    const preds = await dbQ('group_predictions',{group_id:'_thirds',position:3});
    if(preds.length>0) await dbUpsert('group_predictions',preds.map(p=>({...p,points:data.best_thirds.includes(p.team_name)?5:0})));
    log('✅ 8 melhores 3ºs definidos', '#10B981');
  }

  // 4. Salvar classificados das fases eliminatórias
  if(data.knockout_classified) {
    for(const [phase, teams] of Object.entries(data.knockout_classified)) {
      if(!teams||teams.length===0) continue;
      const normTeams = teams.map(t=>normalizeTeamName(t)).filter(Boolean);
      await dbUpsert('real_knockouts',{phase,team_ids:normTeams});
      const pts = phase==='champion'?20:10;
      const preds = await dbQ('knockout_predictions',{phase});
      if(preds.length>0) await dbUpsert('knockout_predictions',preds.map(p=>({...p,points:normTeams.includes(p.team_name)?pts:0})));
      log('✅ '+phase+': '+normTeams.length+' times classificados', '#10B981');
    }
  }
}


// Cascata admin: ao mudar qualquer fase, limpa as posteriores e recalcula pontos
async function cascadeAdminKo(fromPhase){
  const order = ['round32','round16','quarter','semi','final','champion','runner_up','third'];
  const pts_map = {champion:20};
  const startIdx = order.indexOf(fromPhase);
  if(startIdx<0) return;
  // Fases posteriores a partir da fase que mudou
  for(let i=startIdx+1; i<order.length; i++){
    const ph = order[i];
    if(!adminKo[ph]?.team_ids?.length) continue;
    // Pool da fase anterior
    const prevPh = order[i-1];
    const prevPool = adminKo[prevPh]?.team_ids||[];
    // Filtrar times que saíram do pool
    const filtered = adminKo[ph].team_ids.filter(t=>prevPool.includes(t));
    if(filtered.length !== adminKo[ph].team_ids.length){
      await dbUpsert('real_knockouts',{phase:ph,team_ids:filtered});
      adminKo[ph].team_ids = filtered;
      // Recalcular pontos dos knockout_predictions desta fase
      const pts = pts_map[ph]||10;
      const preds = await dbQ('knockout_predictions',{phase:ph});
      if(preds.length>0) await dbUpsert('knockout_predictions',
        preds.map(p=>({...p,points:filtered.includes(p.team_name)?pts:0})));
    }
  }
}

// Sincroniza real_knockouts quando a classificação real de um grupo muda
async function syncAdminKoWithStandings(changedGroup){
  // Reconstruir pool real dos 32 classificados
  const realPool=[];
  Object.values(adminStandings).forEach(pos=>{
    if(pos[1]) realPool.push(pos[1]);
    if(pos[2]) realPool.push(pos[2]);
  });
  (adminKo['best_thirds']?.team_ids||[]).forEach(t=>{ if(!realPool.includes(t)) realPool.push(t); });

  // Se round32 real está definido, limpar times que saíram do pool
  if(adminKo['round32']?.team_ids?.length>0){
    const newR32=adminKo['round32'].team_ids.filter(t=>realPool.includes(t));
    if(newR32.length!==adminKo['round32'].team_ids.length){
      await dbUpsert('real_knockouts',{phase:'round32',team_ids:newR32});
      adminKo['round32'].team_ids=newR32;
      // Cascata: limpar fases seguintes
      const phases=['round16','quarter','semi','final','champion','runner_up','third'];
      for(const ph of phases){
        if(!adminKo[ph]?.team_ids?.length) continue;
        const prevPool = ph==='round16'?newR32:(adminKo[phases[phases.indexOf(ph)-1]]?.team_ids||[]);
        const filtered=adminKo[ph].team_ids.filter(t=>prevPool.includes(t));
        if(filtered.length!==adminKo[ph].team_ids.length){
          await dbUpsert('real_knockouts',{phase:ph,team_ids:filtered});
          if(!adminKo[ph]) adminKo[ph]={phase:ph,team_ids:[]};
          adminKo[ph].team_ids=filtered;
          // Recalcular pontos dos knockout_predictions desta fase
          const pts=ph==='champion'?20:10;
          const preds=await dbQ('knockout_predictions',{phase:ph});
          if(preds.length>0) await dbUpsert('knockout_predictions',preds.map(p=>({...p,points:filtered.includes(p.team_name)?pts:0})));
        }
      }
    }
  }
}

async function saveAllAdminScores(){
  const scores=window._adminScores||{};
  const entries=Object.entries(scores).filter(([,v])=>v.s1!==undefined&&v.s2!==undefined&&v.s1!==null&&v.s2!==null);
  if(entries.length===0){ showToast('Nenhum placar para salvar','err'); return; }
  let saved=0;
  for(const [numStr,v] of entries){
    const num=parseInt(numStr);
    const m=adminMatches[num]||MATCHES.find(x=>x.num===num);
    if(!m) continue;
    try{
      const t1=m.team1_name||m.t1; const t2=m.team2_name||m.t2; const grp=m.group_id||m.group;
      await dbUpsert('group_matches',{match_number:num,real_score1:v.s1,real_score2:v.s2,is_finished:true,team1_name:t1,team2_name:t2,group_id:grp});
      const preds=await dbQ('match_predictions',{match_number:num});
      if(preds.length>0) await dbUpsert('match_predictions',preds.map(p=>({...p,points:calcPts(p.predicted_score1,p.predicted_score2,v.s1,v.s2)})));

  window._adminScores={};
  adminSaveDirty=false;
  showToast('✅ '+saved+' resultado(s) salvos!');
  updateAdminSaveBar();
  buildAdminUI(document.getElementById('main')||document.querySelector('.main'));
}

            await dbUpsert('real_knockouts',{phase:ph.key,team_ids:next});
            const pts=ph.key==='champion'?20:10;
            const preds=await dbQ('knockout_predictions',{phase:ph.key});
            if(preds.length>0) await dbUpsert('knockout_predictions',preds.map(p=>({...p,points:next.includes(p.team_name)?pts:0})));
            if(!adminKo[ph.key])adminKo[ph.key]={phase:ph.key,team_ids:[]};
            adminKo[ph.key].team_ids=next;
            // Cascata: limpar fases posteriores
            await cascadeAdminKo(ph.key);
            showToast('✅ Atualizado!'); buildAdminUI(main);
          }catch(e){ showToast(e.message,'err'); }
        }},`${FLAGS[team]||''} ${team}`);
        btns.appendChild(b);
      });
      card.appendChild(btns); main.appendChild(card);
    });
  }

  if(adminTab==='scorer'){
    const card=el('div',{class:'card'});
    card.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.6rem'}},'⚽ Definir Artilheiro Real'));
    const inp=el('input',{class:'fi',placeholder:'Nome do artilheiro',value:adminKo['top_scorer']?.team_ids?.[0]||''});
    const savB=el('button',{class:'btn btn-s',style:{marginTop:'8px'},onclick:async()=>{
      try{
        const name=inp.value.trim(); if(!name) return;
        await dbUpsert('real_knockouts',{phase:'top_scorer',team_ids:[name]});
        const preds=await dbQ('scorer_predictions');
        if(preds.length>0) await dbUpsert('scorer_predictions',preds.map(p=>({...p,points:p.player_name?.toLowerCase()===name.toLowerCase()?10:0})));
        showToast('✅ Artilheiro salvo!');
      }catch(e){ showToast(e.message,'err'); }
    }},'Salvar');
    card.appendChild(inp); card.appendChild(savB); main.appendChild(card);
  }

  if(adminTab==='test'){
    // Botão para recalcular TODOS os palpites de grupos com nova lógica
    const recalcCard=el('div',{class:'card',style:{marginBottom:'1rem'}});
    recalcCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.3rem'}},'🔄 RECALCULAR PONTUAÇÕES COM NOVA LÓGICA'));
    recalcCard.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'.75rem'}},'Aplica a nova tabela de pontuação (3º exato=7pts, distância=5/2pts) em todos os palpites de grupos existentes no banco.'));
    const recalcBtn=el('button',{class:'btn btn-p',onclick:async()=>{
      if(!confirm('Recalcular TODOS os palpites de grupos de TODOS os usuários com a nova lógica?')) return;
      recalcBtn.textContent='⏳ Recalculando...'; recalcBtn.disabled=true;
      let updated=0;
      try {
        // Buscar todos os palpites de grupos
        const allGrpPreds = await dbQ('group_predictions',{},'user_id,group_id,position,team_name,points,bolao_id');
        const allReal = await dbQ('real_group_standings',{},'group_id,position,team_name');
        const allKo = await dbQ('real_knockouts',{},'phase,team_ids');
        
        // Montar standings reais
        const realSt={};
        allReal.forEach(r=>{ if(!realSt[r.group_id])realSt[r.group_id]={}; realSt[r.group_id][r.position]=r.team_name; });
        const realThirds=(allKo.find(k=>k.phase==='best_thirds')?.team_ids)||[];
        
        if(Object.keys(realSt).length===0){ showToast('⚠️ Defina primeiro a classificação real dos grupos','err'); recalcBtn.disabled=false; recalcBtn.textContent='Recalcular'; return; }
        
        // Recalcular cada palpite
        const rows=allGrpPreds.map(p=>{
          let pts=p.points||0;
          if(p.group_id==='_thirds'){
            // Melhor 3º
            const grpOfTeam=Object.entries(GROUPS).find(([g,ts])=>ts.includes(p.team_name))?.[0];
            const rs=realSt[grpOfTeam]||{};
            const rp=(()=>{if(rs[1]===p.team_name)return 1;if(rs[2]===p.team_name)return 2;if(realThirds.includes(p.team_name))return 3;return null;})();
            pts = rp===3?7:rp===2||rp===1?5:0;
          } else if(p.position<=3){
            const rs=realSt[p.group_id]||{};
            const rp=(()=>{if(rs[1]===p.team_name)return 1;if(rs[2]===p.team_name)return 2;if(realThirds.includes(p.team_name))return 3;return null;})();
            pts = rp!==null ? calcGrpPts(p.position, rp) : 0;
          }
          return {...p, points:pts};
        });
        
        if(rows.length>0){
          await dbUpsert('group_predictions', rows);
          updated=rows.length;
        }
        showToast('✅ '+updated+' palpites recalculados com nova lógica!');
        recalcBtn.textContent='✅ Concluído';
      } catch(e){
        showToast(e.message,'err');
        recalcBtn.disabled=false; recalcBtn.textContent='Recalcular';
      }
    }},'🔄 Recalcular todos os palpites de grupos');
    recalcCard.appendChild(recalcBtn);
    main.appendChild(recalcCard);
    renderTestPage(main);
  }
}
