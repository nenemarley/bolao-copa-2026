// ── Ko Matches (Jogos Eliminatórios) ───────────────────────────────────────
let koMatchPreds={}, koMatchReal={}, koMatchDirty=false, koMatchDirtySet=new Set(), koMatchPhase='round32', koMatchRealSt={}, koMatchMainEl=null;

function resolveSlot(slot, realStandings) {
  if(slot.type==='1'||slot.type==='2') {
    const pos = slot.type==='1'?1:2;
    return realStandings?.[slot.group]?.[pos] || (slot.type+'º do Grupo '+slot.group);
  }
  // tipo 3: melhor terceiro — cruzar grupos possíveis com best_thirds definidos pelo admin
  const thirds = koMatchRealSt?.bestThirds || {};
  // Procurar qual dos grupos possíveis tem um 3º classificado
  const resolved = slot.thirdGroups.map(g => thirds[g]).filter(Boolean);
  if(resolved.length === 1) return resolved[0]; // exatamente 1 match → nome do time
  if(resolved.length > 1) return resolved[0];   // múltiplos (não deveria) → pega o primeiro
  return '3º('+slot.thirdGroups.join('/')+')';  // ainda não definido
}

// ── Jogos Eliminatórios ────────────────────────────────────────────────────
// Padrão idêntico à 1ª fase: preds em memória, save direto, setState para recarregar

const KO_PHASE_LABELS = {
  round32:'Rodada de 32', round16:'Oitavas de Final',
  quarter:'Quartas de Final', semi:'Semifinal',
  fin:'Final', third:'3º Lugar'
};
const KO_PHASE_KEYS = ['round32','round16','quarter','semi','fin','third'];
const KO_PHASE_RANGES = {
  round32:[73,88], round16:[89,96], quarter:[97,100],
  semi:[101,102], fin:[104,104], third:[103,103]
};

function renderKoMatches(main){
  const v = PAGE_VERSION;
  main.innerHTML='';
  main.appendChild(el('div',{class:'ch'},'⚔️ Jogos Eliminatórios'));
  if(!CURRENT_BOLAO){
    main.appendChild(el('div',{style:{textAlign:'center',padding:'2rem',color:'var(--muted)'}},'Selecione um bolão primeiro'));
    return;
  }
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));

  Promise.all([
    dbQ('match_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'match_number,predicted_score1,predicted_score2,points'),
    dbQ('group_matches',{},'match_number,team1_name,team2_name,real_score1,real_score2,is_finished,group_id'),
    dbQ('real_knockouts',{},'phase,team_ids'),
  ]).then(([mp,rm,rk])=>{
    if(PAGE_VERSION!==v) return;
    // Carregar configs
    const srRow=(rk||[]).find(r=>r.phase==='second_round_date');
    if(srRow?.team_ids?.[0]) SECOND_ROUND_DATE=srRow.team_ids[0];
    const mlRow=(rk||[]).find(r=>r.phase==='matches_lock_start');
    if(mlRow?.team_ids?.[0]) MATCHES_LOCK_START=mlRow.team_ids[0];

    // Palpites em memória (só jogos KO >= 73)
    koMatchPreds={};
    (mp||[]).forEach(p=>{
      if(p.match_number>=73)
        koMatchPreds[p.match_number]={s1:p.predicted_score1,s2:p.predicted_score2,pts:p.points};
    });

    // Resultados reais
    koMatchReal={};
    (rm||[]).forEach(m=>{
      if(m.match_number>=73) koMatchReal[m.match_number]=m;
    });

    // Resolver best_thirds: mapear grupo → 3º colocado
    // best_thirds é lista de nomes; precisamos saber de qual grupo cada time é 3º
    // Fonte: real_group_standings (position=3) OU adminStandings
    const bestThirdsRow=(rk||[]).find(r=>r.phase==='best_thirds');
    koMatchRealSt={ bestThirds:{} };
    if(bestThirdsRow?.team_ids?.length) {
      dbQ('real_group_standings',{},'group_id,position,team_name').then(gs=>{
        const thirds={};
        (gs||[]).forEach(r=>{ if(r.position===3) thirds[r.group_id]=r.team_name; });
        // Só manter os que estão na lista best_thirds
        const bestList = bestThirdsRow.team_ids;
        Object.keys(thirds).forEach(g=>{ if(!bestList.includes(thirds[g])) delete thirds[g]; });
        koMatchRealSt.bestThirds = thirds;
        buildKoMatchesUI(main);
      }).catch(()=>{ buildKoMatchesUI(main); });
    } else {
      buildKoMatchesUI(main);
    }

    koMatchDirty=false; koMatchDirtySet=new Set();
    // buildKoMatchesUI é chamado dentro do callback de best_thirds acima
  }).catch(e=>{
    main.innerHTML='';
    main.appendChild(el('div',{style:{color:'var(--err)',padding:'1rem'}},'Erro ao carregar: '+e.message));
  });
}

function buildKoMatchesUI(main){
  koMatchMainEl=main;
  main.innerHTML='';
  main.appendChild(el('div',{class:'ch'},'⚔️ Jogos Eliminatórios'));

  // Tabs de fase
  const tabs=el('div',{class:'tabs',style:{marginBottom:'1rem'}});
  KO_PHASE_KEYS.forEach(k=>{
    tabs.appendChild(el('button',{
      class:`tb${koMatchPhase===k?' act':''}`,
      style:{whiteSpace:'nowrap',flexShrink:'0'},
      onclick:()=>{ koMatchPhase=k; buildKoMatchesUI(main); }
    },KO_PHASE_LABELS[k]));
  });
  main.appendChild(tabs);

  main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.82rem',marginBottom:'1rem'}},
    'Placar exato=10pts · Resultado+1 gol=7pts · Só resultado=5pts · 1 gol certo=2pts'));

  // Jogos da fase — declarar antes para usar no hasAnyTeams
  const [mn,mx]=KO_PHASE_RANGES[koMatchPhase]||[73,104];
  const phaseMatches=[];
  for(let n=mn;n<=mx;n++){
    const m=koMatchReal[n];
    if(m) phaseMatches.push(m);
    else phaseMatches.push({match_number:n,team1_name:null,team2_name:null,is_finished:false,real_score1:null,real_score2:null,_placeholder:true});
  }

  const hasAnyTeams = phaseMatches.some(m=>m.team1_name && m.team2_name);

  // Placar padrão
  if(!window._koMatchDef) window._koMatchDef={s1:null,s2:null};
  const defBar=el('div',{style:{background:'var(--dk3)',border:'1px solid var(--bdr)',borderRadius:'10px',padding:'.75rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}});
  defBar.appendChild(el('span',{style:{fontSize:'.75rem',color:'var(--gold)',fontWeight:'600'}},'🎯 Placar padrão:'));
  const _koDefDirty = ()=>{}; // placar padrão não marca dirty
  defBar.appendChild(makeMatchCtrl(window._koMatchDef.s1, v=>{ window._koMatchDef.s1=v; }, !hasAnyTeams, _koDefDirty));
  defBar.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700'}},'×'));
  defBar.appendChild(makeMatchCtrl(window._koMatchDef.s2, v=>{ window._koMatchDef.s2=v; }, !hasAnyTeams, _koDefDirty));
  const applyBtn=el('button',{class:'btn btn-p btn-sm',style:{marginLeft:'auto',opacity:hasAnyTeams?'1':'0.4'},disabled:!hasAnyTeams,onclick:async()=>{
    const ds1=window._koMatchDef.s1, ds2=window._koMatchDef.s2;
    if(ds1===null||ds2===null){showToast('Defina o placar padrão primeiro','err');return;}
    const [mn,mx]=KO_PHASE_RANGES[koMatchPhase]||[73,104];
    let count=0;
    for(let n=mn;n<=mx;n++){
      if(koMatchReal[n] && canBetKoMatch(n)){
        koMatchPreds[n]={s1:ds1,s2:ds2,pts:0};
        count++;
      }
    }
    if(count===0){showToast('Nenhum jogo disponível nesta fase','err');return;}
    koMatchDirty=true;
    // Marcar todos como dirty para que o save os inclua
    for(let n=mn;n<=mx;n++){ if(koMatchReal[n] && canBetKoMatch(n)) koMatchDirtySet.add(n); }
    await saveKoMatches();
  }},'Aplicar a todos');
  defBar.appendChild(applyBtn);
  main.appendChild(defBar);

  // Sempre mostrar — mesmo sem times, mostrar chaveamento com labels

  // Botão limpar resultados da fase (participante vê mas só admin pode usar)
  // não incluir aqui — só admin limpa

  phaseMatches.forEach(m=>{
    const p=koMatchPreds[m.match_number]||{};
    // Considerar 0 como "sem palpite" se o jogo ainda não tem times definidos ou se foi zerado
    const hasTeams = !!(m.team1_name && m.team2_name);
    // v1/v2: null = não palpitou ainda (mostra —)
    // Se predicted_score1=0 e não tem times, tratar como não palpitado
    const v1 = (!hasTeams && p.s1===0) ? null : (p.s1??null);
    const v2 = (!hasTeams && p.s2===0) ? null : (p.s2??null);
    const canBetNow=canBetKoMatch(m.match_number) && hasTeams;
    const hasResult=m.is_finished;
    const pts=p.pts||0;
    const ptsCls=pts===10?'p10':pts===7?'p7':pts===5?'p5':pts===2?'p2':'p0';

    // Resolver nome dos times — usar label do chaveamento se null
    function koMatchLabel(matchNum, slot) {
      // Buscar no bracket qual é o label deste slot
      const allBrackets = [...ROUND32_BRACKET,...ROUND16_BRACKET,...QUARTER_BRACKET,...SEMI_BRACKET,...FINAL_BRACKET,...THIRD_BRACKET];
      const bm = allBrackets.find(b=>b.id===matchNum);
      if(!bm) return slot===1?'Time A':'Time B';
      const s = slot===1 ? bm.slot1 : bm.slot2;
      if(s.type==='1') return '1º Grupo '+s.group;
      if(s.type==='2') return '2º Grupo '+s.group;
      if(s.type==='3') return '3º (vaga '+s.slotKey+')';
      if(s.type==='W') return 'V. Jogo '+(s.matchId-72);
      if(s.type==='L') return 'Perd. Semi '+(s.matchId-100);
      return '?';
    }

    const t1 = m.team1_name || koMatchLabel(m.match_number, 1);
    const t2 = m.team2_name || koMatchLabel(m.match_number, 2);
    const t1Known = !!m.team1_name;
    const t2Known = !!m.team2_name;

    const mc=el('div',{style:{background:'var(--dk3)',borderRadius:'12px',padding:'1rem',marginBottom:'10px',
      border: canBetNow ? '1px solid var(--bdr)' : '1px solid rgba(245,158,11,.2)'}});

    // Data do jogo — acima dos times
    const dateStr = KO_MATCH_DATES[m.match_number];
    if(dateStr){
      const d = new Date(dateStr+'T00:00:00');
      const formatted = d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
      mc.appendChild(el('div',{style:{textAlign:'center',fontSize:'.62rem',color:'var(--muted)',fontWeight:'600',marginBottom:'.3rem'}},formatted));
    }

    // Nome dos times — muted se ainda não definido
    const nameRow=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.6rem'}});
    nameRow.appendChild(el('span',{style:{fontWeight:t1Known?'600':'400',fontSize:t1Known?'.9rem':'.75rem',color:t1Known?'var(--text)':'var(--muted)'}},
      t1Known?(FLAGS[t1]||'')+' '+t1 : t1));
    nameRow.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.8rem'}},'×'));
    nameRow.appendChild(el('span',{style:{fontWeight:t2Known?'600':'400',fontSize:t2Known?'.9rem':'.75rem',color:t2Known?'var(--text)':'var(--muted)',textAlign:'right'}},
      t2Known?t2+' '+(FLAGS[t2]||'') : t2));
    mc.appendChild(nameRow);

    // Controles de placar — só se os times estiverem definidos
    const scoreRow=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginBottom:'.5rem'}});
    const _koDirty = (matchNum)=>()=>{ koMatchDirty=true; koMatchDirtySet.add(matchNum); updateKoMatchSaveBar(); };
    const _matchDirty = _koDirty(m.match_number);
    const locked = !t1Known || !t2Known; // bloquear se times não definidos
    scoreRow.appendChild(makeMatchCtrl(v1, v=>{
      const cur=koMatchPreds[m.match_number]||{};
      const newS2=cur.s2??0;
      const newPts=m.is_finished?calcPts(v,newS2,m.real_score1,m.real_score2):0;
      koMatchPreds[m.match_number]={...cur,s1:v,s2:newS2,pts:newPts};
      const badge=mc.querySelector('.pts-badge');
      if(badge&&m.is_finished){badge.textContent=newPts+'pts';badge.className='pp pts-badge '+(newPts===10?'p10':newPts===7?'p7':newPts===5?'p5':newPts===2?'p2':'p0');}
    }, !canBetNow||locked, _matchDirty));
    scoreRow.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700'}},'×'));
    scoreRow.appendChild(makeMatchCtrl(v2, v=>{
      const cur=koMatchPreds[m.match_number]||{};
      const newS1=cur.s1??0;
      const newPts=m.is_finished?calcPts(newS1,v,m.real_score1,m.real_score2):0;
      koMatchPreds[m.match_number]={...cur,s2:v,s1:newS1,pts:newPts};
      const badge=mc.querySelector('.pts-badge');
      if(badge&&m.is_finished){badge.textContent=newPts+'pts';badge.className='pp pts-badge '+(newPts===10?'p10':newPts===7?'p7':newPts===5?'p5':newPts===2?'p2':'p0');}
    }, !canBetNow||locked, _matchDirty));
    mc.appendChild(scoreRow);

    // Resultado real
    if(hasResult){
      const rr=el('div',{style:{textAlign:'center',fontSize:'.7rem',color:'var(--muted)'}});
      rr.appendChild(document.createTextNode('Resultado real: '));
      rr.appendChild(el('span',{style:{color:'var(--gold)',fontWeight:'700',fontSize:'.9rem'}},m.real_score1+' — '+m.real_score2));
      if(v1!==null&&v2!==null)
        rr.appendChild(el('span',{class:'pp pts-badge '+ptsCls,style:{marginLeft:'4px',fontSize:'.65rem'}},pts+'pts'));
      mc.appendChild(rr);
    }

    main.appendChild(mc);
  });

  updateKoMatchSaveBar();
}

function updateKoMatchSaveBar(){
  if(STATE.page!=='ko_matches') return;
  const sbm=document.getElementById('savebar-matches');
  if(sbm) sbm.style.display='none';
  let sb=document.getElementById('savebar-ko');
  if(!sb){ sb=el('div',{class:'sbar',id:'savebar-ko'}); document.body.appendChild(sb); }
  sb.innerHTML='';
  if(!koMatchDirty){ sb.style.display='none'; return; }
  sb.style.display='flex';
  const inn=el('div',{class:'sbar-in'});
  inn.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.82rem'}},'Alterações não salvas'));
  inn.appendChild(el('button',{class:'btn btn-p',onclick:saveKoMatches},'💾 Salvar Palpites'));
  sb.appendChild(inn);
}

async function saveKoMatches(){
  // Buscar resultados reais frescos
  try{
    const fresh=await dbQ('group_matches',{},'match_number,real_score1,real_score2,is_finished,group_id');
    (fresh||[]).forEach(m=>{ if(m.match_number>=73) koMatchReal[m.match_number]=m; });
  }catch(e){}

  // Salvar só os jogos alterados nesta sessão (koMatchDirtySet), ou todos se chamado por 'Aplicar a todos'
  const toSave = koMatchDirtySet.size > 0 ? koMatchDirtySet : new Set(Object.keys(koMatchPreds).map(Number));
  const rows=[];
  toSave.forEach(n=>{
    n=parseInt(n);
    if(n<73) return;
    if(!canBetKoMatch(n)) return;
    const p=koMatchPreds[n];
    if(!p||p.s1===undefined||p.s1===null||p.s2===undefined||p.s2===null) return;
    const r=koMatchReal[n];
    const pts=r?.is_finished?calcPts(p.s1,p.s2,r.real_score1,r.real_score2):(p.pts||0);
    koMatchPreds[n].pts=pts;
    rows.push({user_id:STATE.profile.id,match_number:n,predicted_score1:p.s1,predicted_score2:p.s2,points:pts});
  });

  if(!CURRENT_BOLAO){showToast('Sem bolão selecionado','err');return;}
  if(rows.length===0){showToast('Nenhum palpite para salvar — defina os placares primeiro','err');return;}

  try{
    await upsertWithReplicate('match_predictions',rows);
    koMatchDirty=false; koMatchDirtySet=new Set();

  'USA':'Estados Unidos','United States':'Estados Unidos','EUA':'Estados Unidos',
  'Mexico':'México','South Africa':'África do Sul','Korea Republic':'Coreia do Sul',
  'South Korea':'Coreia do Sul','Czech Republic':'República Tcheca','Czechia':'República Tcheca',
  'Canada':'Canadá','Bosnia':'Bósnia','Bosnia and Herzegovina':'Bósnia','Bosnia Herzegovina':'Bósnia',
  'Qatar':'Catar','Switzerland':'Suíça','Brazil':'Brasil','Morocco':'Marrocos',
  'Haiti':'Haiti','Scotland':'Escócia','Paraguay':'Paraguai','Australia':'Austrália',
  'Turkey':'Turquia','Turkiye':'Turquia','Germany':'Alemanha','Curacao':'Curaçao',
  "Côte d'Ivoire":'Costa do Marfim','Ivory Coast':'Costa do Marfim','Ecuador':'Equador',
  'Netherlands':'Holanda','Holland':'Holanda','Japan':'Japão','Sweden':'Suécia',
  'Tunisia':'Tunísia','Belgium':'Bélgica','Egypt':'Egito','Iran':'Irã','New Zealand':'Nova Zelândia',
  'Spain':'Espanha','Cape Verde':'Cabo Verde','Saudi Arabia':'Arábia Saudita','Uruguay':'Uruguai',
  'France':'França','Senegal':'Senegal','Iraq':'Iraque','Norway':'Noruega',
  'Argentina':'Argentina','Algeria':'Argélia','Austria':'Áustria','Jordan':'Jordânia',
  'Portugal':'Portugal','DR Congo':'RD Congo','Congo DR':'RD Congo','Uzbekistan':'Uzbequistão',
  'Colombia':'Colômbia','England':'Inglaterra','Croatia':'Croácia','Ghana':'Gana','Panama':'Panamá',
};

function normalizeTeamName(name) {
  if(!name) return null;
  if(ALL_TEAMS.includes(name)) return name;
  if(TEAM_NAME_MAP[name]) return TEAM_NAME_MAP[name];
  // Case-insensitive fallback
  const lower = name.toLowerCase();
  return ALL_TEAMS.find(t=>t.toLowerCase()===lower) || null;
}

async function applyAIResults(data, log) {
  // 1. Salvar resultados dos jogos da fase de grupos
  if(data.matches && data.matches.length>0) {
    // Construir mapa de jogos: buscar do banco OU usar MATCHES constante
    let matchMap = {}; // key: "team1|team2" → match_number, group_id
    // Primeiro tentar do adminMatches (carregado previamente)
    Object.values(adminMatches).forEach(am=>{
      matchMap[(am.team1_name+'|'+am.team2_name).toLowerCase()] = am;
      matchMap[(am.team2_name+'|'+am.team1_name).toLowerCase()] = {...am, _reversed:true};
    });
    // Se adminMatches vazio, usar MATCHES constante
    if(Object.keys(matchMap).length===0) {
      MATCHES.forEach(m=>{
        const entry = {match_number:m.num, team1_name:m.t1, team2_name:m.t2, group_id:m.group};
        matchMap[(m.t1+'|'+m.t2).toLowerCase()] = entry;
        matchMap[(m.t2+'|'+m.t1).toLowerCase()] = {...entry, _reversed:true};
      });
      log('ℹ️ Usando mapa de jogos da constante MATCHES', '#60A5FA');
    }

    const matchRows = [];
    for(const m of data.matches) {
      if(!m.finished) continue;
      const t1 = normalizeTeamName(m.team1)||m.team1;
      const t2 = normalizeTeamName(m.team2)||m.team2;
      const key = (t1+'|'+t2).toLowerCase();
      const entry = matchMap[key];
      if(!entry){ log('⚠️ Jogo não encontrado: '+t1+' × '+t2, '#F59E0B'); continue; }
      const s1 = entry._reversed ? m.score2 : m.score1;
      const s2 = entry._reversed ? m.score1 : m.score2;
      matchRows.push({match_number:entry.match_number, real_score1:s1, real_score2:s2, is_finished:true, team1_name:entry.team1_name, team2_name:entry.team2_name, group_id:entry.group_id});
      adminMatches[entry.match_number] = {...entry, real_score1:s1, real_score2:s2, is_finished:true};
    }
    if(matchRows.length>0) {
      await dbUpsert('group_matches', matchRows);
      // Recalcular pontos de match_predictions em batch
      const allPreds = await dbQ('match_predictions',{});
      const updatedPreds = [];
      for(const row of matchRows) {
        const preds = allPreds.filter(p=>p.match_number===row.match_number);
        preds.forEach(p=>updatedPreds.push({...p, points:calcPts(p.predicted_score1,p.predicted_score2,row.real_score1,row.real_score2)}));
      }
      if(updatedPreds.length>0) await dbUpsert('match_predictions', updatedPreds);
      log('✅ '+matchRows.length+' jogos salvos!', '#10B981');
    }
  }

  // 2. Salvar classificação dos grupos
  if(data.standings && Object.keys(data.standings).length>0) {
    const standRows=[];
    Object.entries(data.standings).forEach(([g,pos])=>{
      Object.entries(pos).forEach(([p,t])=>{
        const norm = normalizeTeamName(t);
        if(norm) standRows.push({group_id:g,position:parseInt(p),team_name:norm});
        else if(t) log('⚠️ Time não reconhecido na classificação: "'+t+'"', '#F59E0B');
      });
    });
    if(standRows.length>0) {
      await dbUpsert('real_group_standings',standRows);
      // Recalcular pontos de group_predictions
      for(const row of standRows) {
        const preds = await dbQ('group_predictions',{group_id:row.group_id,position:row.position});
        if(preds.length>0) {
          const allReal = standRows.filter(r=>r.group_id===row.group_id);
          const rm={}; allReal.forEach(r=>rm[r.position]=r.team_name);
          const realThirdsAI2 = data.best_thirds||[];
          await dbUpsert('group_predictions',preds.map(p=>{
            let pts=0;
            if(p.position<=3){
              const rp=(()=>{if(rm[1]===p.team_name)return 1;if(rm[2]===p.team_name)return 2;if(realThirdsAI2.map(t=>normalizeTeamName(t)||t).includes(p.team_name))return 3;return null;})();
              if(rp!==null) pts=calcGrpPts(p.position,rp);
            }
            return {...p,points:pts};
          }));
        }
      }
      log('✅ Classificação de '+Object.keys(data.standings).length+' grupos atualizada', '#10B981');
    }
  }

  // 3. Salvar 8 melhores 3ºs
  if(data.best_thirds && data.best_thirds.length>0) {
    const normThirds = data.best_thirds.map(t=>normalizeTeamName(t)).filter(Boolean);
    await dbUpsert('real_knockouts',{phase:'best_thirds',team_ids:normThirds});
    await recalcGroupPts('_thirds', null, {}, normThirds);
    log('✅ 8 melhores 3ºs definidos', '#10B981');
  }

  // 4. Salvar classificados das fases eliminatórias
  if(data.knockout_classified) {
    const koClass = data.knockout_classified;
    // Normalizar todos os times
    const norm = obj => {
      if(Array.isArray(obj)) return obj.map(t=>normalizeTeamName(t)).filter(Boolean);
      return obj;
    };
    // Derivar champion e runner_up a partir de final e semi se não fornecidos
    const finalTeams = norm(koClass.final||[]);
    const semiTeams  = norm(koClass.semi||[]);
    if(finalTeams.length===1 && !koClass.champion) {
      koClass.champion  = [finalTeams[0]];
      koClass.runner_up = [semiTeams.find(t=>t!==finalTeams[0])].filter(Boolean);
    }
    for(const [phase, teams] of Object.entries(koClass)) {
      if(!teams||teams.length===0) continue;
      const normTeams = norm(teams);
      // final no banco salva o campeão; o participante usa 'final' para os 2 finalistas
      // mas para cálculo de pontos usamos champion(50pts) e runner_up(30pts)
      await dbUpsert('real_knockouts',{phase,team_ids:normTeams});
      const pts = (phase==='final'||phase==='champion')?50:(phase==='runner_up')?30:phase==='third'?15:10;
      const preds = await dbQ('knockout_predictions',{phase});
      if(preds.length>0) await dbUpsert('knockout_predictions',preds.map(p=>({...p,points:normTeams.includes(p.team_name)?pts:0})));
      log('✅ '+phase+': '+normTeams.join(', '), '#10B981');
    }
  }

  // 5. Salvar jogos eliminatórios (ko_matches) — IDs reais do bracket (73-104)
  if(data.ko_matches && data.ko_matches.length>0) {
    const koRows = [];
    for(const m of data.ko_matches) {
      if(!m.finished) continue;
      const t1 = normalizeTeamName(m.team1)||m.team1;
      const t2 = normalizeTeamName(m.team2)||m.team2;
      // Determinar group_id a partir do número do jogo
      let gid = 'KO_round32';
      if(m.num>=89&&m.num<=96) gid='KO_round16';
      else if(m.num>=97&&m.num<=100) gid='KO_quarter';
      else if(m.num>=101&&m.num<=102) gid='KO_semi';
      else if(m.num===103) gid='KO_third';
      else if(m.num===104) gid='KO_final';
      koRows.push({match_number:m.num,team1_name:t1,team2_name:t2,group_id:gid,real_score1:m.score1,real_score2:m.score2,is_finished:true});
      adminMatches[m.num]={match_number:m.num,team1_name:t1,team2_name:t2,group_id:gid,real_score1:m.score1,real_score2:m.score2,is_finished:true};
    }
    if(koRows.length>0){
      await dbUpsert('group_matches', koRows);
      // Recalcular palpites de jogos eliminatórios
      const koPreds = await dbQ('match_predictions',{});
      const koPredsElim = koPreds.filter(p=>p.match_number>=73);
      if(koPredsElim.length>0){
        const updated = [];
        for(const row of koRows){
          const preds = koPredsElim.filter(p=>p.match_number===row.match_number);
          preds.forEach(p=>updated.push({...p,points:calcPts(p.predicted_score1,p.predicted_score2,row.real_score1,row.real_score2)}));
        }
        if(updated.length>0) await dbUpsert('match_predictions', updated);
      }
      log('✅ '+koRows.length+' jogos eliminatórios salvos (IDs '+koRows[0].match_number+'-'+koRows[koRows.length-1].match_number+')', '#10B981');
    }
  }
}


// ── Recálculo centralizado de pontos (todos os bolões) ────────────────────

// Recalcula pontos de match_predictions para um jogo (todos os bolões)
async function recalcMatchPts(matchNumber, realS1, realS2) {
  const preds = await dbQ('match_predictions',{match_number:matchNumber});
  for(const p of preds){
    const pts = (realS1===null||realS1===undefined) ? 0 : calcPts(p.predicted_score1,p.predicted_score2,realS1,realS2);
    if(p.points!==pts)
      await SB.from('match_predictions').update({points:pts}).eq('user_id',p.user_id).eq('match_number',matchNumber).eq('bolao_id',p.bolao_id);
  }
}

// Recalcula pontos de group_predictions para um grupo/posição (todos os bolões)
async function recalcGroupPts(groupId, position, realStandings, realThirds) {
  const filter = position ? {group_id:groupId,position:position} : {group_id:groupId};
  const preds = await dbQ('group_predictions', filter);
  for(const p of preds){
    let pts = 0;
    if(groupId==='_thirds'){
      pts = (realThirds||[]).includes(p.team_name) ? 5 : 0;
    } else {
      const rm = realStandings[groupId]||{};
      const rp = rm[1]===p.team_name?1:rm[2]===p.team_name?2:(realThirds||[]).includes(p.team_name)?3:null;
      pts = (p.position<=3&&rp!==null) ? calcGrpPts(p.position,rp) : 0;
    }
    if(p.points!==pts)
      await SB.from('group_predictions').update({points:pts})
        .eq('user_id',p.user_id).eq('group_id',p.group_id).eq('position',p.position).eq('bolao_id',p.bolao_id);
  }
}

// Recalcula pontos de knockout_predictions para uma fase (todos os bolões)
async function recalcKnockoutPts(phase, realTeamIds) {
  const preds = await dbQ('knockout_predictions',{phase:phase});
  const pts_map = {final:50,champion:50,runner_up:30,third:15};
  const basePts = pts_map[phase]||10;
  for(const p of preds){
    const newPts = (realTeamIds||[]).includes(p.team_name) ? basePts : 0;
    if(p.points!==newPts)
      await SB.from('knockout_predictions').update({points:newPts})
        .eq('user_id',p.user_id).eq('phase',phase).eq('team_name',p.team_name).eq('bolao_id',p.bolao_id);
  }
}

// Cascata admin: ao mudar qualquer fase, limpa as posteriores e recalcula pontos
async function cascadeAdminKo(fromPhase){
  // Cascata: limpa fases posteriores do real_knockouts quando uma fase muda
  const order = ['round32','round16','quarter','semi','final','third'];
  const startIdx = order.indexOf(fromPhase);
  if(startIdx<0) return;
  for(let i=startIdx+1; i<order.length; i++){
    const ph = order[i];
    if(!adminKo[ph]?.team_ids?.length) continue;
    const prevPh = order[i-1];
    const prevPool = adminKo[prevPh]?.team_ids||[];
    const filtered = adminKo[ph].team_ids.filter(t=>prevPool.includes(t));
    if(filtered.length !== adminKo[ph].team_ids.length){
      await dbUpsert('real_knockouts',{phase:ph,team_ids:filtered});
      adminKo[ph].team_ids = filtered;
    }
  }
}

// Propaga os times selecionados pelo admin para group_matches (jogos 73-104)
// para que a aba "Jogos Elim." mostre os mesmos confrontos das Eliminatórias
async function propagateKoMatchTeams(){
  try{
    // Construir mapa de vencedores por jogo, propagando pelo bracket
    const mw = {}; // matchId → {t1, t2, winner}

    // R32
    const _pThirdGroups=(adminKo['best_thirds']?.team_ids||[]);
    const _pValidThirds=_pThirdGroups;
    const _pThirdAssign=buildThirdAssignment(_pThirdGroups, adminStandings);
    ROUND32_BRACKET.forEach(m=>{
      const i1=resolveSlotInfo(m.slot1,adminStandings,_pValidThirds,_pThirdAssign,m.id);
      const i2=resolveSlotInfo(m.slot2,adminStandings,_pValidThirds,_pThirdAssign,m.id);
      const t1=i1.team||null, t2=i2.team||null;
      const r32sel=adminKo['round32']?.team_ids||[];
      mw[m.id]={t1,t2,winner:r32sel.find(t=>t===t1||t===t2)||null};
    });

    // Oitavas → Quartas → Semi → Final/3º
    const chain=[
      {bracket:ROUND16_BRACKET, phase:'round16'},
      {bracket:QUARTER_BRACKET, phase:'quarter'},
      {bracket:SEMI_BRACKET,    phase:'semi'},
    ];
    chain.forEach(({bracket,phase})=>{
      bracket.forEach(m=>{
        const t1=mw[m.slot1.matchId]?.winner||null;
        const t2=mw[m.slot2.matchId]?.winner||null;
        const sel=adminKo[phase]?.team_ids||[];
        mw[m.id]={t1,t2,winner:sel.find(t=>t===t1||t===t2)||null};
      });
    });
    // Final
    FINAL_BRACKET.forEach(m=>{
      const t1=mw[m.slot1.matchId]?.winner||null;
      const t2=mw[m.slot2.matchId]?.winner||null;
      mw[m.id]={t1,t2,winner:null};
    });
    // 3º lugar
    THIRD_BRACKET.forEach(m=>{
      const s1=mw[m.slot1.matchId], s2=mw[m.slot2.matchId];
      const semiSel1=adminKo['semi']?.team_ids||[];
      const t1=s1?( semiSel1.includes(s1.t1)?s1.t2:s1.t1 ):null;
      const t2=s2?( semiSel1.includes(s2.t1)?s2.t2:s2.t1 ):null;
      mw[m.id]={t1,t2,winner:null};
    });

    // Montar upserts para group_matches 73-104
    const allBrackets=[...ROUND32_BRACKET,...ROUND16_BRACKET,...QUARTER_BRACKET,...SEMI_BRACKET,...FINAL_BRACKET,...THIRD_BRACKET];
    const upserts=[];
    allBrackets.forEach(m=>{
      const {t1,t2}=mw[m.id]||{};
      if(t1&&t2){
        upserts.push({
          match_number: m.id,
          team1_name: t1,
          team2_name: t2,
        });
      }
    });

    if(upserts.length>0){
      // Para cada jogo: tentar UPDATE (só team names). Se não existir, INSERT com campos mínimos.
      for(const u of upserts){
        const {error:ue} = await SB.from('group_matches')
          .update({team1_name:u.team1_name, team2_name:u.team2_name})
          .eq('match_number', u.match_number);
        if(ue){
          // Registro não existe — criar com campos mínimos
          await SB.from('group_matches').insert({
            match_number: u.match_number,
            team1_name: u.team1_name,
            team2_name: u.team2_name,
            group_id: 'KO',
            is_finished: false,
            real_score1: null,
            real_score2: null,
          }).select();
        }
      }
    }
  }catch(e){
    console.warn('[propagateKoMatchTeams] erro:', e.message);
  }
}

// Sincroniza real_knockouts quando a classificação real de um grupo muda
async function syncAdminKoWithStandings(changedGroup){
  // Reconstruir pool real dos 32 classificados
  const realPool=[];
  Object.values(adminStandings).forEach(pos=>{
    if(pos[1]) realPool.push(pos[1]);
    if(pos[2]) realPool.push(pos[2]);
  });
  (adminKo['best_thirds']?.team_ids||[]).forEach(t=>{ if(!realPool.includes(t)) realPool.push(t); });

  // Se round32 real está definido, limpar times que saíram do pool
  if(adminKo['round32']?.team_ids?.length>0){
    const newR32=adminKo['round32'].team_ids.filter(t=>realPool.includes(t));
    if(newR32.length!==adminKo['round32'].team_ids.length){
      await dbUpsert('real_knockouts',{phase:'round32',team_ids:newR32});
      adminKo['round32'].team_ids=newR32;
      // Cascata: limpar fases seguintes
      const phases=['round16','quarter','semi','final','third'];
      for(const ph of phases){
        if(!adminKo[ph]?.team_ids?.length) continue;
        const prevPool = ph==='round16'?newR32:(adminKo[phases[phases.indexOf(ph)-1]]?.team_ids||[]);
        const filtered=adminKo[ph].team_ids.filter(t=>prevPool.includes(t));
        if(filtered.length!==adminKo[ph].team_ids.length){
          await dbUpsert('real_knockouts',{phase:ph,team_ids:filtered});
          if(!adminKo[ph]) adminKo[ph]={phase:ph,team_ids:[]};
          adminKo[ph].team_ids=filtered;
          // pontos serão recalculados pelo botão "Salvar e Recalcular" na aba Eliminatórias
        }
      }
    }
  }
}

async function saveAllAdminScores(){
  const scores=window._adminScores||{};
  const entries=Object.entries(scores).filter(([,v])=>v.s1!==undefined&&v.s2!==undefined&&v.s1!==null&&v.s2!==null);
  if(entries.length===0){ showToast('Nenhum placar para salvar','err'); return; }
  const btn=document.querySelector('#admin-savebar .btn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Salvando...'; }
  let saved=0, errs=[];
  for(const [numStr,v] of entries){
    const num=parseInt(numStr);
    const m=adminMatches[num]||MATCHES.find(x=>x.num===num);
    if(!m) continue;
    try{
      const t1=m.team1_name||m.t1; const t2=m.team2_name||m.t2; const grp=m.group_id||m.group;
      // Salvar placar real
      const {error:e1}=await SB.from('group_matches').upsert({match_number:num,real_score1:v.s1,real_score2:v.s2,is_finished:true,team1_name:t1,team2_name:t2,group_id:grp});
      if(e1){ errs.push('J'+num+': '+e1.message); continue; }
      // Recalcular pontos de todos os participantes
      const preds = await dbQ('match_predictions',{match_number:num});
      for(const p of preds){
        const pts=calcPts(p.predicted_score1,p.predicted_score2,v.s1,v.s2);
        if(p.points!==pts){
          const {error:e2}=await SB.from('match_predictions').update({points:pts}).eq('user_id',p.user_id).eq('match_number',num).eq('bolao_id',p.bolao_id);
          if(e2) errs.push('pts J'+num+' u:'+p.user_id.slice(-4)+': '+e2.message);
        }
      }
      // Atualizar só em memória (sem reconstruir DOM)
      adminMatches[num]={...(adminMatches[num]||{}),match_number:num,team1_name:t1,team2_name:t2,group_id:grp,real_score1:v.s1,real_score2:v.s2,is_finished:true};
      saved++;
    }catch(e){ errs.push('J'+num+': '+e.message); }
  }
  window._adminScores={};
  adminSaveDirty=false;
  if(errs.length>0){
    showToast('⚠️ '+saved+' salvos, erros: '+errs.join(' | '),'err');
  } else {
    showToast('✅ '+saved+' resultado(s) salvos!');
  }
  updateAdminSaveBar();
  // Reconstruir só o conteúdo da aba atual do admin SEM chamar setState
  if(window._adminMain){
    window._adminMain.innerHTML='';
    buildAdminUI(window._adminMain);
  }
}

          const t1=i1.team||null, t2=i2.team||null;
          const r32sel=adminKo['round32']?.team_ids||[];
          adminMatchWinners[m.id]={winner:r32sel.find(t=>t===t1||t===t2)||null,t1,t2};

        // Oitavas
        ROUND16_BRACKET.forEach(m=>{
          const t1=adminMatchWinners[m.slot1.matchId]?.winner||null;

          const sel=adminKo['round16']?.team_ids||[];
          adminMatchWinners[m.id]={winner:sel.find(t=>t===t1||t===t2)||null,t1,t2};

        // Quartas
        QUARTER_BRACKET.forEach(m=>{
          const t1=adminMatchWinners[m.slot1.matchId]?.winner||null;
          const t2=adminMatchWinners[m.slot2.matchId]?.winner||null;
          const sel=adminKo['quarter']?.team_ids||[];
          adminMatchWinners[m.id]={winner:sel.find(t=>t===t1||t===t2)||null,t1,t2};
        });
        // Semi
        SEMI_BRACKET.forEach(m=>{
          const t1=adminMatchWinners[m.slot1.matchId]?.winner||null;
          const t2=adminMatchWinners[m.slot2.matchId]?.winner||null;

          adminMatchWinners[m.id]={winner:sel.find(t=>t===t1||t===t2)||null,t1,t2};

          const t1=adminMatchWinners[m.slot1.matchId]?.winner||null;
          const t2=adminMatchWinners[m.slot2.matchId]?.winner||null;
          adminMatchWinners[m.id]={winner:null,t1,t2};
        });
        // 3º lugar: perdedores das semis

          const ssel=adminKo['semi']?.team_ids||[];
          const t1=s1?(ssel.includes(s1.t1)?s1.t2:s1.t1):null;
          const t2=s2?(ssel.includes(s2.t1)?s2.t2:s2.t1):null;

        // Label de chaveamento

          if(matchId>=73&&matchId<=88)  return 'VJ'+(matchId-72);
          if(matchId>=89&&matchId<=96)  return 'VO'+(matchId-88);
          if(matchId>=97&&matchId<=100) return 'VQ'+(matchId-96);
          if(matchId>=101&&matchId<=102)return 'VS'+(matchId-100);
          return 'J'+matchId;

        function thirdLabel(matchId) {
          if(matchId>=101&&matchId<=102) return 'PS'+(matchId-100); // Perdedor Semi
          return 'P'+matchId;

        const bracketToRender = ph.key==='final'?FINAL_BRACKET : ph.key==='third'?THIRD_BRACKET : adminBracket;

        const bLen = bracketToRender.length;

    const saveKoBtn=el('button',{

  if(adminTab==='config'){

    const nuclearCard=el('div',{class:'card',style:{marginBottom:'1rem',border:'1px solid var(--err)'}});
    nuclearCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--err)',marginBottom:'.5rem'}},'🗑️ Limpar Resultados e Pontuações'));
    nuclearCard.appendChild(el('div',{style:{fontSize:'.75rem',color:'var(--muted)',marginBottom:'.75rem'}},'Zera os resultados reais, os palpites de jogos eliminatórios e as pontuações de todos os usuários em todos os bolões. Os palpites da 1ª fase e grupos são preservados.'));
    const nuclearBtn=el('button',{class:'btn',style:{background:'var(--err)',color:'#fff',width:'100%',fontWeight:'700'},onclick:async()=>{
      if(!confirm('⚠️ ATENÇÃO: Isso vai zerar TODOS os resultados e pontos de TODOS os usuários em TODOS os bolões. Tem certeza?')) return;
      if(!confirm('Confirme novamente: apagar TUDO?')) return;
      nuclearBtn.textContent='⏳ Limpando...'; nuclearBtn.disabled=true;
      try{
        // Uma única chamada RPC — função PostgreSQL SECURITY DEFINER que bypassa RLS
        const {error} = await SB.rpc('admin_reset_all_points');
        if(error) throw new Error(error.message);

        // Limpar real_knockouts por fase
        const phases=['round32','round16','quarter','semi','final','third','best_thirds','top_scorer','matches_lock_start'];
        for(const ph of phases){
          await dbUpsert('real_knockouts',{phase:ph,team_ids:[]});
          if(adminKo[ph]) adminKo[ph].team_ids=[];
        }
        Object.keys(adminStandings).forEach(g=>{ adminStandings[g]={}; });
        adminMatches={};

        // ── Verificação pós-reset ────────────────────────────────────────
        const checks = await Promise.all([
          SB.from('match_predictions').select('points',{count:'exact'}).gt('points',0).limit(1),
          SB.from('group_predictions').select('points',{count:'exact'}).gt('points',0).limit(1),
          SB.from('knockout_predictions').select('points',{count:'exact'}).gt('points',0).limit(1),
          SB.from('scorer_predictions').select('points',{count:'exact'}).gt('points',0).limit(1),
          SB.from('real_group_standings').select('id',{count:'exact'}).limit(1),
          SB.from('group_matches').select('match_number',{count:'exact'}).eq('is_finished',true).limit(1),
        ]);
        const labels=['match_predictions','group_predictions','knockout_predictions','scorer_predictions','real_group_standings','group_matches(finished)'];
        const dirty=checks.map((r,i)=>({t:labels[i],n:(r.data||[]).length})).filter(r=>r.n>0);

          }

          // KO pts
          const kpAll=await SB.from('knockout_predictions').select('*').eq('user_id',uid).eq('bolao_id',CURRENT_BOLAO.id);
          for(const p of (kpAll.data||[])){
            const tn=p.team_name.toLowerCase();
            const acertou=(p.phase==='final'||p.phase==='champion')?realChamp.includes(tn)
              :p.phase==='runner_up'?realVice.includes(tn)
              :p.phase==='third'?realThird.includes(tn)
              :(koMap[p.phase]||[]).map(t=>t.toLowerCase()).includes(tn);
            const correctPts=acertou?(p.phase==='final'||p.phase==='champion'?50:p.phase==='runner_up'?30:p.phase==='third'?15:10):0;
            if(p.points!==correctPts){
              const {error:kErr}=await SB.from('knockout_predictions')
                .update({points:correctPts}).eq('user_id',uid).eq('phase',p.phase).eq('team_name',p.team_name).eq('bolao_id',CURRENT_BOLAO.id);
              console.log('[Fix] KO '+p.phase+':'+p.team_name+' '+p.points+'→'+correctPts+'pts:', kErr?.message||'OK');
              if(!kErr) fixes++; else errors.push('KO: '+kErr.message);
            }
          }
        }

        if(errors.length>0){
          showToast('⚠️ '+fixes+' OK, '+errors.length+' erros de RLS. Execute o SQL no Supabase!','err');
          // Mostrar SQL para executar manualmente
          const sqlModal=el('div',{style:{position:'fixed',top:'10%',left:'5%',right:'5%',bottom:'10%',background:'var(--dk2)',borderRadius:'12px',zIndex:'99999',display:'flex',flexDirection:'column',padding:'1rem',overflow:'hidden'}});
          sqlModal.appendChild(el('div',{style:{color:'var(--gold)',fontWeight:'700',marginBottom:'8px'}},'📋 Execute este SQL no Supabase → SQL Editor:'));
          const sqlText=`-- Cole no Supabase SQL Editor e clique Run
UPDATE scorer_predictions SET player_name=trim(player_name), points=30
WHERE lower(trim(player_name))='${realScorer.toLowerCase()}' AND points!=30;

DELETE FROM scorer_predictions a USING scorer_predictions b
WHERE a.user_id=b.user_id AND a.ctid<b.ctid;

UPDATE knockout_predictions SET points=50
WHERE phase IN ('final','champion') AND lower(team_name) IN (${realChamp.map(t=>"'"+t+"'").join(',')}) AND points!=50;

UPDATE knockout_predictions SET points=30
WHERE phase='runner_up' AND lower(team_name) IN (${realVice.map(t=>"'"+t+"'").join(',')}) AND points!=30;

UPDATE knockout_predictions SET points=15
WHERE phase='third' AND lower(team_name) IN (${realThird.map(t=>"'"+t+"'").join(',')}) AND points!=15;`;
          const ta=el('textarea',{style:{flex:'1',background:'var(--dk3)',color:'var(--gold)',border:'none',borderRadius:'8px',padding:'8px',fontFamily:'monospace',fontSize:'.75rem',resize:'none'}});
          ta.value=sqlText;
          sqlModal.appendChild(ta);
          const row=el('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}});
          row.appendChild(el('button',{class:'btn btn-p',style:{flex:'1'},onclick:()=>{ navigator.clipboard.writeText(sqlText); showToast('✅ SQL copiado!'); }},'📋 Copiar SQL'));
          row.appendChild(el('button',{class:'btn btn-o',onclick:()=>sqlModal.remove()},'Fechar'));
          sqlModal.appendChild(row);
          document.body.appendChild(sqlModal);
        } else {
          showToast('✅ '+fixes+' problemas corrigidos com sucesso!');
        }
      }catch(e){ showToast('Erro: '+e.message,'err'); console.error(e); }
      fixBtn.disabled=false; fixBtn.textContent='🔧 Corrigir Problemas Detectados';
    }},'🔧 Corrigir Problemas Detectados');
    cfgCard.appendChild(fixBtn);

    const recalcBtn=el('button',{class:'btn btn-p',style:{width:'100%',padding:'.7rem',fontWeight:'700'},onclick:async()=>{

          // Grupos

          for(const p of (gP.data||[])){ const rp=(()=>{ const g=realSt[p.group_id]||{}; if(g[1]===p.team_name)return 1; if(g[2]===p.team_name)return 2; return null; })(); const pts=calcGrpPts(p.position,rp); await SB.from('group_predictions').update({points:pts}).eq('user_id',uid).eq('group_id',p.group_id).eq('position',p.position); total++; }
          
          // 3ºs
          const tP=await SB.from('group_predictions').select('*').eq('user_id',uid).eq('group_id','_thirds').eq('bolao_id',CURRENT_BOLAO?.id);
          for(const p of (tP.data||[])){ const pts=realThirds.includes(p.team_name)?5:0; await SB.from('group_predictions').update({points:pts}).eq('user_id',uid).eq('group_id','_thirds').eq('team_name',p.team_name); total++; }
          
          // KO — incluir todas as fases possíveis
          const kP=await SB.from('knockout_predictions').select('*').eq('user_id',uid).eq('bolao_id',CURRENT_BOLAO.id);
          console.log('[Recalcular] uid='+uid+' KO rows:', (kP.data||[]).map(p=>p.phase+':'+p.team_name));
          for(const p of (kP.data||[])){

            const realTeams = (koMap[p.phase]||[]).concat(

            const acertou = realTeams.includes(p.team_name);
            const pts = acertou ? (p.phase==='final'||p.phase==='champion'?50:p.phase==='runner_up'?30:p.phase==='third'?15:10) : 0;
            console.log('[Recalcular] '+p.phase+':'+p.team_name+' realTeams:'+JSON.stringify(realTeams)+' pts:'+pts);
            const {error:kErr} = await SB.from('knockout_predictions').update({points:pts})
              .eq('user_id',uid).eq('phase',p.phase).eq('team_name',p.team_name).eq('bolao_id',CURRENT_BOLAO.id);
            if(kErr) console.error('[Recalcular] KO update error:', kErr);
            else console.log('[Recalcular] KO updated: '+p.phase+':'+p.team_name+' -> '+pts+'pts');
            total++;
          }
          
          // Artilheiro
          const sP=await SB.from('scorer_predictions').select('*').eq('user_id',uid).eq('bolao_id',CURRENT_BOLAO?.id);
          console.log('[Recalcular] uid='+uid+' scorer:', (sP.data||[]).map(p=>p.player_name+'='+p.points));
          for(const p of (sP.data||[])){
            const pts=realScName&&p.player_name?.trim().toLowerCase()===realScName.trim().toLowerCase()?30:0;

            if(sErr) console.error('[Recalcular] scorer update error:', sErr);
            total++;
          }
        }
        showToast('✅ Recalculado! '+total+' atualizações em '+userIds.length+' participantes. Veja console para detalhes.');
      }catch(e){ showToast('Erro: '+e.message,'err'); console.error(e); }
      recalcBtn.disabled=false; recalcBtn.textContent='🔄 Recalcular Tudo Agora';
    }},'🔄 Recalcular Tudo Agora');
    cfgCard.appendChild(recalcBtn);

    const membersCard = el('div',{class:'card'});

      }catch(e){ showToast(e.message,'err'); }
      savB.textContent='Salvar'; savB.disabled=false;
    }},'Salvar');
    card.appendChild(inp); card.appendChild(savB); main.appendChild(card);
  }

  if(adminTab==='test'){

    recalcCard.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'.75rem'}},'Aplica a nova tabela de pontuação (3º exato=7pts, distância=5/2pts) em todos os palpites de grupos existentes no banco.'));

      if(!confirm('Recalcular TODOS os palpites de grupos de TODOS os usuários com a nova lógica?')) return;
      recalcBtn.textContent='⏳ Recalculando...'; recalcBtn.disabled=true;
      let updated=0;
      try {
        // Buscar todos os palpites de grupos
        const allGrpPreds = await dbQ('group_predictions',{},'user_id,group_id,position,team_name,points,bolao_id');
        const allReal = await dbQ('real_group_standings',{},'group_id,position,team_name');
        const allKo = await dbQ('real_knockouts',{},'phase,team_ids');
        
        // Montar standings reais
        const realSt={};
        allReal.forEach(r=>{ if(!realSt[r.group_id])realSt[r.group_id]={}; realSt[r.group_id][r.position]=r.team_name; });
        const realThirds=(allKo.find(k=>k.phase==='best_thirds')?.team_ids)||[];
        
        if(Object.keys(realSt).length===0){ showToast('⚠️ Defina primeiro a classificação real dos grupos','err'); recalcBtn.disabled=false; recalcBtn.textContent='Recalcular'; return; }
        
        // Recalcular cada palpite
        const rows=allGrpPreds.map(p=>{
          let pts=p.points||0;
          if(p.group_id==='_thirds'){
            // Melhor 3º
            const grpOfTeam=Object.entries(GROUPS).find(([g,ts])=>ts.includes(p.team_name))?.[0];
            const rs=realSt[grpOfTeam]||{};
            const rp=(()=>{if(rs[1]===p.team_name)return 1;if(rs[2]===p.team_name)return 2;if(realThirds.includes(p.team_name))return 3;return null;})();
            pts = calcGrpPts(p.position, rp);
          } else if(p.position<=3){
            const rs=realSt[p.group_id]||{};
            const rp=(()=>{if(rs[1]===p.team_name)return 1;if(rs[2]===p.team_name)return 2;if(realThirds.includes(p.team_name))return 3;return null;})();
            pts = rp!==null ? calcGrpPts(p.position, rp) : 0;
          }
          return {...p, points:pts};
        });
        
        if(rows.length>0){
          await dbUpsert('group_predictions', rows);
          updated=rows.length;
        }
        showToast('✅ '+updated+' palpites recalculados com nova lógica!');
        recalcBtn.textContent='✅ Concluído';
      } catch(e){
        showToast(e.message,'err');
        recalcBtn.disabled=false; recalcBtn.textContent='Recalcular';
      }
    }},'🔄 Recalcular todos os palpites de grupos');
    recalcCard.appendChild(recalcBtn);
    main.appendChild(recalcCard);
    renderTestPage(main);
  }
}

  try {
    main.innerHTML='';
    main.appendChild(el('div',{class:'ch'},'🧪 Página de Teste — Somente Admin'));

  // Warning banner
  const warn = el('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid #EF4444',borderRadius:'8px',padding:'.875rem',marginBottom:'1rem',fontSize:'.82rem',lineHeight:'1.6'}});
  warn.appendChild(el('strong',{style:{color:'#FCA5A5'}},'⚠️ Atenção: '));
  warn.appendChild(document.createTextNode('Esta página cria 5 usuários de teste, insere palpites aleatórios e resultados simulados para validar as pontuações. Ao final, use "Limpar Tudo" para remover os dados de teste.'));
  main.appendChild(warn);

  // Buttons
  const btnRow = el('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem',flexWrap:'wrap'}});
  const btnRun = el('button',{class:'btn btn-p',style:{flex:'1'},onclick:()=>runTest(main)}, testRunning?'⏳ Executando...':'▶ Executar Teste Completo');
  const btnClean = el('button',{class:'btn btn-d',style:{flex:'1'},onclick:()=>cleanupTest(main)}, '🗑 Limpar Tudo');
  const btnRefresh = el('button',{class:'btn btn-o',style:{flex:'1'},onclick:()=>renderTestPage(main)}, '↻ Atualizar');
  if(testRunning) btnRun.disabled = true;
  btnRow.appendChild(btnRun);
  btnRow.appendChild(btnClean);
  btnRow.appendChild(btnRefresh);
  main.appendChild(btnRow);

  // Log
  const logCard = el('div',{class:'card',style:{marginBottom:'1rem'}});
  logCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.5rem',fontSize:'1rem'}},'📋 Log de Execução'));
  const logBox = el('div',{id:'testlog',style:{background:'var(--dk3)',borderRadius:'8px',padding:'.875rem',height:'240px',overflowY:'auto',fontFamily:'monospace',fontSize:'.72rem',lineHeight:'1.7'}});
  if(testLog.length===0) logBox.appendChild(el('span',{style:{color:'var(--muted)'}},'Aguardando execução...'));
  else logBox.innerHTML = testLog.join('<br>');
  logCard.appendChild(logBox);

  // Botão copiar log
  if(testLog.length>0){
    const copyBtn = el('button',{class:'btn btn-o',style:{width:'100%',marginTop:'8px',fontSize:'.78rem'},onclick:()=>{
      const text = testLog.map(l=>l.replace(/<[^>]+>/g,'')).join('\n');
      navigator.clipboard.writeText(text).then(()=>{
        copyBtn.textContent='✅ Copiado!';
        setTimeout(()=>copyBtn.textContent='📋 Copiar log',1500);
      }).catch(()=>{ copyBtn.textContent='Erro ao copiar'; });
    }},'📋 Copiar log');
    logCard.appendChild(copyBtn);
  }

  main.appendChild(logCard);

  // Validation results table
  if(testDone && window._testResults) {
    const allOk = window._testResults.every(r=>r.ok);
    const resCard = el('div',{class:'card'});
    resCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:allOk?'var(--ok)':'var(--err)',marginBottom:'.75rem',fontSize:'1.1rem'}},
      allOk?'✅ TODOS OS TESTES PASSARAM!':'❌ ATENÇÃO: FALHAS ENCONTRADAS'));

    const tbl = el('table',{class:'rkt'});
    const thead = el('thead');
    thead.appendChild(el('tr',{},
      ...['Usuário','Jogos','Grupos','Fases','Art.','Total','Status'].map(h=>el('th',{},h))
    ));
    tbl.appendChild(thead);
    const tbody = el('tbody');
    window._testResults.forEach(r => {
      const tr = el('tr');
      const cols = [
        {v:r.name, ok:true},
        {v:`${r.expM}/${r.actM}`, ok:r.expM===r.actM},
        {v:`${r.expG}/${r.actG}`, ok:r.expG===r.actG},
        {v:`${r.expK}/${r.actK}`, ok:r.expK===r.actK},
        {v:`${r.expS}/${r.actS}`, ok:r.expS===r.actS},
        {v:`${r.expT}/${r.actT}`, ok:r.expT===r.actT},
        {v:r.ok?'✅ OK':'❌ FALHOU', ok:r.ok},
      ];
      cols.forEach(col => {
        const td = el('td',{style:{color:col.ok?'inherit':'var(--err)',fontWeight:col.ok?'':'700'}},col.v+'');
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);

    const wrap = el('div',{style:{overflowX:'auto'}});
    wrap.appendChild(tbl);
    resCard.appendChild(wrap);
    resCard.appendChild(el('p',{style:{marginTop:'.75rem',fontSize:'.75rem',color:'var(--muted)'}},'Esp = Esperado (calculado localmente) · Obt = Obtido (banco de dados)'));
    main.appendChild(resCard);
  }
  } catch(e) {
    const errDiv = el('div',{style:{color:'var(--err)',padding:'1rem',background:'rgba(239,68,68,.1)',borderRadius:'8px',marginTop:'1rem'}});
    errDiv.appendChild(document.createTextNode('Erro ao carregar: '+e.message));
    main.appendChild(errDiv);
    console.error('renderTestPage:',e);
  }
}

function tlog(msg, type='') {
  const colors = {ok:'#10B981',err:'#EF4444',warn:'#FFD700',info:'#93C5FD',bold:'#E2E8F0'};
  const color = colors[type]||'#E2E8F0';
  testLog.push(`<span style="color:${color}">${msg}</span>`);
  const box = document.getElementById('testlog');
  if(box){ box.innerHTML = testLog.join('<br>'); box.scrollTop = box.scrollHeight; }
}

async function runTest(main) {
  if(testRunning) return;
  testRunning = true; testDone = false; testLog = []; testUserIds = []; window._testResults = null;
  renderTestPage(main);

  tlog('═══════════════════════════════════════', 'info');
  tlog('🧪 INICIANDO TESTE COMPLETO', 'bold');
  tlog('═══════════════════════════════════════', 'info');

  // Guardar sessão admin (tokens + user para restaurar depois)
  const {data:{session:adminSess}} = await SB.auth.getSession();
  const adminEmail = adminSess?.user?.email;
  const adminRefreshToken = adminSess?.refresh_token;
  tlog('  → Admin capturado: '+adminEmail, 'info');
  
  // Criar bolão de teste se não existir
  tlog('\n🎯 Criando bolão de teste...', 'bold');
  let testBolao = null;
  try {
    const existing = await dbQ('bolao_groups',{invite_code:'TESTE1'});
    if(existing && existing.length>0) {
      testBolao = existing[0];
      tlog('  ℹ️ Bolão de teste já existe: '+testBolao.name, 'info');
    } else {
      const {data:bg, error:be} = await SB.from('bolao_groups').insert({
        name:'Bolão Teste Automático', invite_code:'TESTE1', created_by:STATE.profile.id
      }).select().single();
      if(be) throw be;
      await SB.from('bolao_members').insert({bolao_id:bg.id, user_id:STATE.profile.id, replicate_preds:true});
      testBolao = bg;
      tlog('  ✅ Bolão de teste criado', 'ok');
    }
    // Set as current bolão
    await loadMyBolaos(STATE.profile.id);
    CURRENT_BOLAO = MY_BOLAOS.find(b=>b.id===testBolao.id)||MY_BOLAOS[0];
  } catch(e) {
    tlog('  ❌ Erro ao criar bolão: '+e.message, 'err');
  }

  // STEP 1: Criar usuários usando cliente separado (não afeta sessão principal)
  tlog('\n📋 PASSO 1: Criando usuários de teste...', 'bold');
  const signedUsers = [];
  for(const u of TEST_USERS_DATA) {
    try {
      // Usar SB_TEST para não afetar sessão do admin no SB principal
      await SB_TEST.auth.signUp({email:u.email, password:u.pw});
      const {data, error} = await SB_TEST.auth.signInWithPassword({email:u.email, password:u.pw});
      if(error) throw error;
      const uid = data.user.id;
      // Criar profile usando o token do usuário de teste via SB_TEST
      await SB_TEST.from('profiles').upsert({id:uid, username:u.username, display_name:u.name, is_admin:false});
      signedUsers.push({...u, id:uid, _session:data.session});
      testUserIds.push(uid);
      tlog('  ✅ '+u.name+' criado (id: '+uid.substring(0,8)+'...)', 'ok');
    } catch(e) {
      tlog('  ❌ '+u.name+': '+e.message, 'err');
    }
  }
  tlog('  → '+signedUsers.length+'/5 usuários criados', 'info');

  // Vincular todos os usuários ao bolão (sessão admin já está ativa no SB principal)
  if(testBolao) {
    tlog('  → Vinculando ao bolão...', 'info');
    let vinculados = 0;
    for(const u of signedUsers) {
      const {error:memberErr} = await SB.from('bolao_members')
        .upsert({bolao_id:testBolao.id, user_id:u.id, replicate_preds:true});
      if(memberErr){
        tlog('  ❌ Erro ao vincular '+u.name+': '+memberErr.message, 'err');
      } else {
        vinculados++;
        tlog('  ✅ '+u.name+' vinculado ao bolão', 'ok');
      }
    }
    tlog('  → '+vinculados+'/'+signedUsers.length+' usuários vinculados', vinculados===signedUsers.length?'ok':'warn');
  }

  tlog('  → Total: '+signedUsers.length+'/5 usuários prontos', 'info');

  // STEP 2: Palpites de jogos
  tlog('\n⚽ PASSO 2: Palpites dos jogos...', 'bold');
  const userPreds = {};
  for(const u of signedUsers) {
    userPreds[u.id] = {matches:{}, groups:{}, knockout:{}, scorer:''};
    const rows = [];
    MATCHES.forEach(m => {
      const s1=Math.floor((u.name.length*m.num*3)%5), s2=Math.floor((u.name.length*m.num*7)%5);
      rows.push({user_id:u.id, match_number:m.num, predicted_score1:s1, predicted_score2:s2, points:0, bolao_id:testBolao?.id});
      userPreds[u.id].matches[m.num]={s1,s2};
    });
    // Usar SB_TEST com token do usuário para respeitar RLS (user só pode inserir seu próprio user_id)
    const testSess = u._session;
    let matchErr = null;
    if(testSess) {
      await SB_TEST.auth.setSession({access_token:testSess.access_token, refresh_token:testSess.refresh_token});
      const {error} = await SB_TEST.from('match_predictions').upsert(rows);
      matchErr = error;
    } else {
      const {error} = await SB.from('match_predictions').upsert(rows);
      matchErr = error;
    }
    if(matchErr) tlog(`  ❌ ${u.name}: ${matchErr.message}`, 'err');
    else tlog(`  ✅ ${u.name}: 72 jogos`, 'ok');
  }

  // STEP 3: Palpites de grupos
  tlog('\n📊 PASSO 3: Palpites de grupos...', 'bold');
  for(const u of signedUsers) {
    const rows = [];
    Object.entries(GROUPS).forEach(([g,teams],gi) => {
      const offset = signedUsers.indexOf(u);
      [1,2,3,4].forEach((pos,i) => {
        const team = teams[(i+offset)%4];
        rows.push({user_id:u.id, group_id:g, position:pos, team_name:team, points:0, bolao_id:testBolao?.id});
        if(!userPreds[u.id].groups[g]) userPreds[u.id].groups[g]={};
        userPreds[u.id].groups[g][pos]=team;
      });
    });
    let grpErr = null;
    const testSessGrp = u._session;
    if(testSessGrp){
      await SB_TEST.auth.setSession({access_token:testSessGrp.access_token, refresh_token:testSessGrp.refresh_token});
      const {error} = await SB_TEST.from('group_predictions').upsert(rows);
      grpErr = error;
    } else {
      const {error} = await SB.from('group_predictions').upsert(rows);
      grpErr = error;
    }
    if(grpErr) tlog(`  ❌ ${u.name}: ${grpErr.message}`, 'err');
    else tlog(`  ✅ ${u.name}: 48 posições de grupo`, 'ok');
  }

  // STEP 4: Palpites eliminatórias — seguindo a mesma lógica cascata do participante
  tlog('\n🔥 PASSO 4: Palpites das fases...', 'bold');
  const scorerOptions = ['Mbappé','Vinicius Jr','Haaland','Lewandowski','Salah'];

  // Carregar resultados reais do banco para usar como base dos palpites e recálculo
  const realKoDb = await dbQ('real_knockouts',{},'phase,team_ids');
  const realStDb = await dbQ('real_group_standings',{},'group_id,position,team_name');
  const realMatchDb = await SB.from('group_matches').select('*');

  // Montar estruturas de lookup
  const realKoMap = {}; // phase -> team_ids[]
  realKoDb.forEach(r=>{ realKoMap[r.phase]=r.team_ids||[]; });
  const realStMap = {}; // group_id -> {1:team, 2:team, ...}
  realStDb.forEach(r=>{ if(!realStMap[r.group_id])realStMap[r.group_id]={}; realStMap[r.group_id][r.position]=r.team_name; });
  const realMatchMap = {}; // match_number -> {real_score1, real_score2}
  (realMatchDb.data||[]).forEach(m=>{ realMatchMap[m.match_number]={s1:m.real_score1??0, s2:m.real_score2??0}; });
  const realThirds = realKoMap['best_thirds']||[];

  // Pool de times disponíveis por fase (baseado nos resultados reais)
  const realPool = {
    round32: realKoMap['round32']||[],
    round16: realKoMap['round16']||[],
    quarter: realKoMap['quarter']||[],
    semi:    realKoMap['semi']||[],
    final:   realKoMap['final']||[], // 1 time: o campeão real
    third:   realKoMap['third']||[], // 1 time: o 3º real
  };
  // 8 melhores 3ºs reais
  const realThirdsPool = realThirds;

  // Validar que o banco tem dados reais antes de continuar
  const hasRealData = Object.keys(realKoMap).length>0 && Object.keys(realStMap).length>0 && Object.keys(realMatchMap).length>0;
  if(!hasRealData) {
    tlog('  ❌ ERRO: Banco sem resultados reais! Aplique o JSON de resultados antes de rodar o teste.', 'err');
    tlog('  → Fases KO: '+Object.keys(realKoMap).length+' | Grupos: '+Object.keys(realStMap).length+' | Jogos: '+Object.keys(realMatchMap).length, 'warn');
    testRunning=false; renderTestPage(main); return;
  }
  tlog('  ✅ Resultados reais carregados: '+Object.keys(realKoMap).length+' fases, '+Object.keys(realStMap).length+' grupos, '+Object.keys(realMatchMap).length+' jogos', 'ok');

  // Palpites de 8 melhores 3ºs — cada usuário escolhe 8 com offset para gerar variedade
  // Todos os 3ºs disponíveis (3ºs de todos os grupos, 12 no total)
  const allThirds = Object.entries(GROUPS).map(([g,teams])=>teams[2]); // 3º de cada grupo
  for(const [ui, u] of signedUsers.entries()) {
    const thirdsRows = [];
    // Usuário 0: acerta todos (pega os 8 reais exatos)
    // Usuários 1-4: rotacionam o pool com offset, acertando parcialmente
    let pool3;
    if(realThirdsPool.length>=8 && ui===0) {
      pool3 = realThirdsPool.slice(0,8); // acerta todos
    } else {
      // Mistura: alguns do pool real, alguns de fora (offset cria variedade)
      const rotated = allThirds.slice(ui*2).concat(allThirds).slice(0,8);
      pool3 = rotated;
    }
    pool3.forEach((team,idx)=>{
      thirdsRows.push({user_id:u.id, group_id:'_thirds', position:idx+1, team_name:team, points:0, bolao_id:testBolao?.id});
    });
    userPreds[u.id].thirds = pool3;
    if(u._session){
      await SB_TEST.auth.setSession({access_token:u._session.access_token,refresh_token:u._session.refresh_token});
      await SB_TEST.from('group_predictions').upsert(thirdsRows);
    } else {
      await SB.from('group_predictions').upsert(thirdsRows);
    }
  }
  tlog('  ✅ Palpites de 8 melhores 3ºs inseridos (com variedade)', 'ok');

  for(const [ui, u] of signedUsers.entries()) {
    const rows = [];
    // Para cada fase, cada usuário palpita N times do pool real (com offset para variedade)
    // Isso garante que alguns acertam e outros erram — testando a pontuação corretamente
    const phaseDef = [
      {phase:'round32', pool: realPool.round32, count:16},
      {phase:'round16', pool: realPool.round16, count:8},
      {phase:'quarter', pool: realPool.quarter, count:4},
      {phase:'semi',    pool: realPool.semi,    count:2},
      {phase:'final',   pool: realPool.final,   count:1}, // 1 = campeão
      {phase:'third',   pool: realPool.third,   count:1}, // 1 = 3º lugar
    ];
    phaseDef.forEach(({phase,pool,count}) => {
      // Se pool real disponível: usuário 0 acerta todos, outros têm offset (acertam parcialmente)
      const src = pool.length>=count ? pool : pool; // se pool vazio, não usa ALL_TEAMS (já barrado acima)
      const offset = ui===0 ? 0 : ui; // usuário 0 sempre acerta tudo
      const picked = src.slice(offset%src.length).concat(src).slice(0,count);
      userPreds[u.id].knockout[phase]=picked;
      picked.forEach(team => rows.push({user_id:u.id, phase, team_name:team, points:0, bolao_id:testBolao?.id}));
    });
    // runner_up automático: o outro da semi que não é o final
    const champPick = userPreds[u.id].knockout['final']?.[0];
    const semiPicks = userPreds[u.id].knockout['semi']||[];
    const vicePick = semiPicks.find(t=>t!==champPick);
    if(vicePick){
      userPreds[u.id].knockout['runner_up']=[vicePick];
      rows.push({user_id:u.id, phase:'runner_up', team_name:vicePick, points:0, bolao_id:testBolao?.id});
    }
    const scorer = scorerOptions[ui];
    userPreds[u.id].scorer = scorer;
    const testSessKo = u._session;
    if(testSessKo){
      await SB_TEST.auth.setSession({access_token:testSessKo.access_token,refresh_token:testSessKo.refresh_token});
      await SB_TEST.from('knockout_predictions').delete().eq('user_id',u.id).eq('bolao_id',testBolao?.id);
      if(rows.length>0) await SB_TEST.from('knockout_predictions').insert(rows);
      await SB_TEST.from('scorer_predictions').upsert({user_id:u.id, player_name:scorer, points:0, bolao_id:testBolao?.id});
    } else {
      await SB.from('knockout_predictions').delete().eq('user_id',u.id).eq('bolao_id',testBolao?.id);
      if(rows.length>0) await SB.from('knockout_predictions').insert(rows);
      await SB.from('scorer_predictions').upsert({user_id:u.id, player_name:scorer, points:0, bolao_id:testBolao?.id});
    }
    tlog(`  ✅ ${u.name}: fases (offset=${ui}) + artilheiro "${scorer}"`, 'ok');
  }

  // STEP 5: Recalcular pontuações usando resultados reais do banco
  tlog('\n🔢 PASSO 5: Recalculando pontuações com resultados reais do banco...', 'bold');
  const realScorer = realKoMap['top_scorer']?.[0]||'';

  for(const u of signedUsers) {
    try {
      const sess5 = u._session;
      const db5 = sess5 ? SB_TEST : SB;
      if(sess5){
        const {error:sessErr} = await SB_TEST.auth.setSession({access_token:sess5.access_token, refresh_token:sess5.refresh_token});
        if(sessErr) tlog(`  ⚠️ ${u.name} sessão: ${sessErr.message}`, 'warn');
        else tlog(`  🔑 ${u.name}: sessão ok (${sess5.access_token.substring(0,12)}...)`, 'info');
      } else {
        tlog(`  ⚠️ ${u.name}: sem sessão — usando admin SB`, 'warn');
      }

      // Jogos: DELETE + INSERT
      const mRows = MATCHES.map(m=>{
        const p=userPreds[u.id].matches[m.num];
        const r=realMatchMap[m.num]||{s1:0,s2:0};
        return {user_id:u.id, match_number:m.num, predicted_score1:p.s1, predicted_score2:p.s2, points:calcPts(p.s1,p.s2,r.s1,r.s2), bolao_id:testBolao?.id};
      });
      const totalMPts = mRows.reduce((s,r)=>s+r.points,0);
      const {error:mDel} = await db5.from('match_predictions').delete().eq('user_id',u.id).eq('bolao_id',testBolao?.id);
      if(mDel) tlog(`  ⚠️ ${u.name} delete match: ${mDel.message}`, 'warn');
      const {error:mErr} = await db5.from('match_predictions').insert(mRows);
      if(mErr) throw new Error('match_predictions: '+mErr.message);
      tlog(`  ✅ ${u.name} jogos: ${mRows.length} rows, ${totalMPts}pts calculados`, 'ok');

      // Grupos: DELETE + INSERT com pontos
      const gRows = [];
      Object.entries(userPreds[u.id].groups).forEach(([g,positions])=>{
        Object.entries(positions).forEach(([pos,team])=>{
          const p=parseInt(pos);
          const rst=realStMap[g]||{};
          const realPos=(()=>{ if(rst[1]===team)return 1; if(rst[2]===team)return 2; if(realThirds.includes(team))return 3; return null; })();
          const pts = p<=3 ? calcGrpPts(p, realPos) : 0;
          gRows.push({user_id:u.id, group_id:g, position:p, team_name:team, points:pts, bolao_id:testBolao?.id});
        });
      });
      (userPreds[u.id].thirds||[]).forEach((team,idx)=>{
        const grp=Object.entries(GROUPS).find(([g,ts])=>ts.includes(team))?.[0];
        const rst=realStMap[grp]||{};
        const realPos=(()=>{ if(rst[1]===team)return 1; if(rst[2]===team)return 2; if(realThirds.includes(team))return 3; return null; })();
        const pts = realPos===3?5:0; // 3º melhor = 5pts, 1º/2º na aba grupos não conta aqui
        gRows.push({user_id:u.id, group_id:'_thirds', position:idx+1, team_name:team, points:pts, bolao_id:testBolao?.id});
      });
      const totalGPts = gRows.reduce((s,r)=>s+r.points,0);
      const {error:gDel} = await db5.from('group_predictions').delete().eq('user_id',u.id).eq('bolao_id',testBolao?.id);
      if(gDel) tlog(`  ⚠️ ${u.name} delete group: ${gDel.message}`, 'warn');
      const {error:gErr} = await db5.from('group_predictions').insert(gRows);
      if(gErr) throw new Error('group_predictions: '+gErr.message);
      tlog(`  ✅ ${u.name} grupos: ${gRows.length} rows, ${totalGPts}pts`, 'ok');

      // KO: DELETE + INSERT com pontos
      const kRows = [];
      Object.entries(userPreds[u.id].knockout).forEach(([phase,teams])=>{
        teams.forEach(team=>{
          const isReal = realKoMap[phase]?.includes(team);
          const pts = isReal ? (phase==='final'||phase==='champion'?50:phase==='runner_up'?30:phase==='third'?15:10) : 0;
          kRows.push({user_id:u.id, phase, team_name:team, points:pts, bolao_id:testBolao?.id});
        });
      });
      // DELETE por user_id + bolao_id (PK não inclui bolao_id, mas garante limpeza do bolão correto)
      const {error:kDel} = await db5.from('knockout_predictions').delete().eq('user_id',u.id);
      if(kDel) tlog(`  ⚠️ ${u.name} delete KO: ${kDel.message}`, 'warn');
      if(kRows.length>0){
        const totalKPts = kRows.reduce((s,r)=>s+r.points,0);
        const {error:kErr} = await db5.from('knockout_predictions').insert(kRows);
        if(kErr) throw new Error('knockout_predictions: '+kErr.message);
        tlog(`  ✅ ${u.name} KO: ${kRows.length} rows, ${totalKPts}pts`, 'ok');
      } else {
        tlog(`  ⚠️ ${u.name} KO: 0 rows (sem palpites de fase)`, 'warn');
      }

      // Artilheiro
      const spts = realScorer && userPreds[u.id].scorer===realScorer ? 30 : 0;
      await db5.from('scorer_predictions').delete().eq('user_id',u.id);
      const {error:sErr} = await db5.from('scorer_predictions').insert({user_id:u.id, player_name:userPreds[u.id].scorer, points:spts});
      if(sErr) tlog(`  ⚠️ ${u.name} scorer: ${sErr.message}`, 'warn');
      else tlog(`  ✅ ${u.name} scorer: "${userPreds[u.id].scorer}" → ${spts}pts`, 'ok');

      // Total esperado
      const expM = Object.values(userPreds[u.id].matches||{}).reduce((s,p)=>{ const r=realMatchMap[p.num||0]||{}; return s+(r.s1!==undefined?calcPts(p.s1,p.s2,r.s1,r.s2):0); }, 0);
      tlog(`  📊 ${u.name} recalculado ok`, 'ok');
    } catch(e) {
      tlog(`  ❌ ${u.name}: ${e.message}`, 'err');
    }
  }

  // STEP 6: Validação — comparar esperado (calculado localmente) vs obtido (banco)
  tlog('\n✅ PASSO 6: Validando pontuações...', 'bold');
  const results = [];
  let allPassed = true;

  for(const u of signedUsers) {
    let expM=0, expG=0, expK=0, expS=0;
    // Jogos
    MATCHES.forEach(m=>{
      const p=userPreds[u.id].matches[m.num], r=realMatchMap[m.num]||{s1:0,s2:0};
      expM+=calcPts(p.s1,p.s2,r.s1,r.s2);
    });
    // Grupos
    Object.entries(userPreds[u.id].groups).forEach(([g,pos])=>{
      Object.entries(pos).forEach(([pStr,team])=>{
        const p=parseInt(pStr); if(p>3) return;
        const rst=realStMap[g]||{};
        const realPos=(()=>{ if(rst[1]===team)return 1; if(rst[2]===team)return 2; if(realThirds.includes(team))return 3; return null; })();
        expG+=calcGrpPts(p, realPos);
      });
    });
    // 3ºs
    (userPreds[u.id].thirds||[]).forEach(team=>{
      const grp=Object.entries(GROUPS).find(([g,ts])=>ts.includes(team))?.[0];
      const rst=realStMap[grp]||{};
      const rp=(()=>{ if(rst[1]===team)return 1; if(rst[2]===team)return 2; if(realThirds.includes(team))return 3; return null; })();
      expG+=rp===3?5:0; // 3º melhor = 5pts fixo
    });
    // Fases KO
    Object.entries(userPreds[u.id].knockout).forEach(([phase,teams])=>{
      teams.forEach(team=>{ if(realKoMap[phase]?.includes(team)) expK+=(phase==='final'||phase==='champion'?50:phase==='runner_up'?30:phase==='third'?15:10); });
    });
    // Artilheiro
    expS = realScorer && userPreds[u.id].scorer===realScorer ? 30 : 0;
    const expT = expM+expG+expK+expS;

    const [mp,gp,kp,sp] = await Promise.all([
      SB.from('match_predictions').select('points').eq('user_id',u.id),
      SB.from('group_predictions').select('points').eq('user_id',u.id),
      SB.from('knockout_predictions').select('points').eq('user_id',u.id),
      SB.from('scorer_predictions').select('points').eq('user_id',u.id),
    ]);
    const actM=(mp.data||[]).reduce((s,r)=>s+(r.points||0),0);
    const actG=(gp.data||[]).reduce((s,r)=>s+(r.points||0),0);
    const actK=(kp.data||[]).reduce((s,r)=>s+(r.points||0),0);
    const actS=(sp.data||[]).length>0?(sp.data[0].points||0):0;
    const actT=actM+actG+actK+actS;
    const ok=expT===actT&&expM===actM&&expG===actG&&expK===actK&&expS===actS;
    if(!ok) allPassed=false;
    results.push({name:u.name, expM,actM, expG,actG, expK,actK, expS,actS, expT,actT, ok});
    tlog(`  ${ok?'✅':'❌'} ${u.name}: Total Esp=${expT} Obt=${actT} | J:${expM}/${actM} G:${expG}/${actG} F:${expK}/${actK} A:${expS}/${actS}`, ok?'ok':'err');
    if(!ok){
      // Log diagnóstico detalhado
      if(expM!==actM) tlog(`     🔍 Jogos: esperado ${expM}, banco=${actM} — ${(mp.data||[]).length} rows no banco`, 'warn');
      if(expG!==actG) tlog(`     🔍 Grupos: esperado ${expG}, banco=${actG} — ${(gp.data||[]).length} rows no banco`, 'warn');
      if(expK!==actK){
        tlog(`     🔍 Fases: esperado ${expK}, banco=${actK} — ${(kp.data||[]).length} rows no banco`, 'warn');
        // Mostrar quais fases foram palpitadas vs reais
        const koDetail = Object.entries(userPreds[u.id].knockout||{}).map(([ph,ts])=>{
          const real = realKoMap[ph]||[];
          const hits = ts.filter(t=>real.includes(t));
          const pts = hits.length*(ph==='final'||ph==='champion'?20:10);
          return `${ph}:${hits.length}/${ts.length}(${pts}p)`;
        }).join(' ');
        tlog(`     🔍 KO detail: ${koDetail}`, 'warn');
      }
      if(expS!==actS) tlog(`     🔍 Artilheiro: ${u.name} palpitou="${userPreds[u.id].scorer}" real="${realScorer}" banco=${actS}pts`, 'warn');
    }
  }

  tlog('\n═══════════════════════════════════════', 'info');
  tlog(allPassed?'🎉 TODOS OS TESTES PASSARAM!':'⚠️ ATENÇÃO: FALHAS ENCONTRADAS', allPassed?'ok':'err');
  tlog('═══════════════════════════════════════', 'info');
  if(realScorer) tlog('Artilheiro real no banco: '+realScorer, 'info');
  tlog('Campeão real no banco: '+(realKoMap['final']?.[0]||realKoMap['champion']?.[0]||'?'), 'info');
  tlog('\nAgora vá para 🏆 Ranking para ver as pontuações!', 'warn');
  tlog('Use 🗑 Limpar Tudo quando quiser remover os dados de teste.', 'warn');

  window._testResults = results;
  testRunning = false;
  testDone = true;

  // SEMPRE restaurar STATE com dados do admin ao finalizar
  tlog('\n🔄 Finalizando...', 'bold');
  const adminUser = adminSess?.user;
  if(adminUser) {
    const [adminProfile] = [await dbQ('profiles',{id:adminUser.id})];
    STATE.user = adminUser;
    STATE.profile = adminProfile[0];
    await loadMyBolaos(adminUser.id);
    // Selecionar primeiro bolão real (não o de teste)
    CURRENT_BOLAO = MY_BOLAOS.find(b=>b.invite_code!=='TESTE1')||null;
    tlog('  ✅ Estado restaurado: '+STATE.profile?.display_name+' | Bolão: '+(CURRENT_BOLAO?.name||'nenhum'), 'ok');
  }

  // Forçar reload completo do estado para garantir que ranking funciona
  const {data:freshProfs} = await SB.from('profiles').select('id,display_name,is_admin,username');
  STATE.profiles = freshProfs||[];
  tlog('  → STATE.profiles recarregado: '+STATE.profiles.length+' perfis', 'info');
  
  renderTestPage(main);
  showToast('✅ Teste completo! Logado como '+STATE.profile?.display_name+'. Vá para 🏆 Ranking!');
}

async function cleanupTest(main) {
  if(!confirm('Remover TODOS os dados de teste? (usuários, palpites e resultados)')) return;
  testLog = [];
  renderTestPage(main);
  tlog('🗑 Iniciando limpeza...', 'warn');
  tlog('  → Sessão atual: '+(STATE.profile?.display_name||'?'), 'info');

  // STEP 1: Encontrar IDs dos usuários de teste
  tlog('  → Buscando usuários de teste...', 'info');
  const testUsernames = TEST_USERS_DATA.map(u=>u.username);
  const testUsernamesAlt = TEST_USERS_DATA.map(u=>'teste.'+u.username);
  const allUsernames = [...testUsernames, ...testUsernamesAlt];
  const {data:allProfiles} = await SB.from('profiles').select('id,username');
  tlog('  → Profiles no banco: '+(allProfiles?.length||0), 'info');
  const allTestIds = new Set();
  (allProfiles||[]).forEach(p=>{ if(allUsernames.includes(p.username)) allTestIds.add(p.id); });

  // Também pegar pelo bolão de teste
  const {data:testBolaoRows} = await SB.from('bolao_groups').select('id').eq('invite_code','TESTE1');
  const testBolaoId = testBolaoRows?.[0]?.id;
  tlog('  → Bolão de teste: '+(testBolaoId||'não encontrado'), 'info');
  if(testBolaoId) {
    const {data:members} = await SB.from('bolao_members').select('user_id').eq('bolao_id',testBolaoId);
    (members||[]).forEach(m=>{ if(m.user_id !== STATE.profile?.id) allTestIds.add(m.user_id); });
  }

  const ids = [...allTestIds];
  tlog('  → Encontrados '+ids.length+' usuários de teste', 'info');

  // STEP 2: Deletar dados de cada usuário
  if(ids.length > 0) {
    for(const id of ids) {
      await SB.from('match_predictions').delete().eq('user_id',id);
      await SB.from('group_predictions').delete().eq('user_id',id);
      await SB.from('knockout_predictions').delete().eq('user_id',id);
      await SB.from('scorer_predictions').delete().eq('user_id',id);
      await SB.from('bolao_members').delete().eq('user_id',id);
      const {error:delErr} = await SB.from('profiles').delete().eq('id',id);
      if(delErr) tlog('  ⚠️ Erro profile '+id+': '+delErr.message, 'warn');
    }
    tlog('  ✅ '+ids.length+' usuários removidos', 'ok');
  } else {
    tlog('  ℹ️ Nenhum usuário de teste encontrado', 'info');
  }

  // STEP 3: Admin (Nenê) não é tocado — apenas usuários de teste são removidos
  tlog('  ℹ️ Admin preservado: '+STATE.profile?.display_name, 'info');

  // STEP 4: Resultados reais NÃO são tocados pelo teste — nada a restaurar

  // STEP 5: Remover bolão de teste
  if(testBolaoId) {
    await SB.from('bolao_members').delete().eq('bolao_id',testBolaoId);
    await SB.from('bolao_groups').delete().eq('id',testBolaoId);
    tlog('  ✅ Bolão de teste removido', 'ok');
  }

  testUserIds=[]; testDone=false; window._testResults=null;
  tlog('✅ Limpeza concluída! Base zerada.', 'ok');
  showToast('✅ Base limpa! Pronto para novo teste.');

  // Reload
  const {data:allProfs} = await SB.from('profiles').select('id,display_name,is_admin');
  STATE.profiles = allProfs||[];
  await loadMyBolaos(STATE.profile.id);
  CURRENT_BOLAO = MY_BOLAOS[0]||null;
  renderTestPage(main);
}

// ── Self-tests (rodar no console: runTests()) ──────────────────────────────
window.runTests = function() {
  let pass = 0, fail = 0;
  function assert(label, got, expected) {
    if (got === expected) {
      console.log('%c✅ ' + label, 'color:green');
      pass++;
    } else {
      console.error('❌ ' + label + ' | got:', got, '| expected:', expected);
      fail++;
    }
  }
  const origBolao = CURRENT_BOLAO;

  // 1. tabEnabled — mode full
  CURRENT_BOLAO = { mode: 'full' };
  assert('full: matches habilitado',    tabEnabled('matches'),    true);
  assert('full: standings habilitado',  tabEnabled('standings'),  true);
  assert('full: ko_matches habilitado', tabEnabled('ko_matches'), true);
  assert('full: knockout habilitado',   tabEnabled('knockout'),   true);

  // 2. tabEnabled — mode placares
  CURRENT_BOLAO = { mode: 'placares' };
  assert('placares: matches habilitado',       tabEnabled('matches'),    true);
  assert('placares: ko_matches habilitado',    tabEnabled('ko_matches'), true);
  assert('placares: standings DESABILITADO',   tabEnabled('standings'),  false);
  assert('placares: knockout DESABILITADO',    tabEnabled('knockout'),   false);

  // 3. tabEnabled — mode classificados
  CURRENT_BOLAO = { mode: 'classificados' };
  assert('classificados: standings habilitado',    tabEnabled('standings'),  true);
  assert('classificados: knockout habilitado',     tabEnabled('knockout'),   true);
  assert('classificados: matches DESABILITADO',    tabEnabled('matches'),    false);
  assert('classificados: ko_matches DESABILITADO', tabEnabled('ko_matches'), false);

  // 4. bolaoMode fallback
  CURRENT_BOLAO = {};
  assert('bolaoMode sem mode → full', bolaoMode(), 'full');
  CURRENT_BOLAO = null;
  assert('bolaoMode null → full', bolaoMode(), 'full');

  // 5. BOLAO_MODES tem as 3 chaves
  assert('BOLAO_MODES.full existe',          !!BOLAO_MODES.full,          true);
  assert('BOLAO_MODES.placares existe',      !!BOLAO_MODES.placares,      true);
  assert('BOLAO_MODES.classificados existe', !!BOLAO_MODES.classificados, true);

  CURRENT_BOLAO = origBolao;
  console.log('\n=== ' + pass + ' passou, ' + fail + ' falhou ===');
  return { pass, fail };
};

// ── Start ──────────────────────────────────────────────────────────────────
init();
</script>
