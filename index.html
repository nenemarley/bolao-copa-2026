let jogosSubTab = 'proximos'; // 'proximos' | 'finalizados'

function renderJogos(main) {
  const v = PAGE_VERSION;
  main.innerHTML = '';
  main.appendChild(el('div',{class:'ch'},'📅 Jogos — Visão Cronológica'));

  if(!CURRENT_BOLAO){
    const w=el('div',{style:{background:'rgba(255,215,0,.08)',border:'1px solid rgba(255,215,0,.3)',borderRadius:'8px',padding:'1.25rem',textAlign:'center',marginTop:'1rem'}});
    w.appendChild(el('div',{style:{fontSize:'1.5rem',marginBottom:'.5rem'}},'🎯'));
    w.appendChild(el('div',{style:{fontWeight:'600',marginBottom:'.5rem'}},'Selecione um bolão primeiro'));
    w.appendChild(el('button',{class:'btn btn-p',onclick:()=>setState({page:'bolaos'})},'Ir para Meus Bolões'));
    main.appendChild(w);
    return;
  }

  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));

  Promise.all([
    dbQ('match_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'match_number,predicted_score1,predicted_score2,points'),
    dbQ('group_matches',{},'match_number,real_score1,real_score2,is_finished'),
  ]).then(([mp,rm])=>{
    if(PAGE_VERSION !== v) return;

    // Reusar matchPreds e realScores globais para compatibilidade com saveMatches
    matchPreds = {};
    (mp||[]).forEach(p=>{ matchPreds[p.match_number]={s1:p.predicted_score1,s2:p.predicted_score2,pts:p.points}; });
    realScores = {};
    (rm||[]).forEach(m=>{ realScores[m.match_number]=m; });
    matchDirty = false;

    buildJogosUI(main);
  }).catch(e=>{ if(e.message!=='timeout'&&PAGE_VERSION===v) console.error('jogos:',e); });
}

function buildJogosUI(main) {
  main.innerHTML = '';

  // Sub-abas
  const subRow = el('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem'}});
  ['proximos','finalizados'].forEach(tab=>{
    const label = tab==='proximos' ? '⏳ Próximos Jogos' : '✅ Finalizados';
    const isAct = jogosSubTab === tab;
    subRow.appendChild(el('button',{
      class: 'gb-btn'+(isAct?' active':''),
      style:{flex:'1',padding:'.5rem',borderRadius:'8px',fontWeight:isAct?'700':'400'},
      onclick:()=>{ jogosSubTab=tab; buildJogosUI(main); }
    },label));
  });
  main.appendChild(subRow);

  // Todos os jogos da 1ª fase — proximos: mais próximo primeiro; finalizados: mais recente primeiro
  const allMatchesAsc  = MATCHES.slice().sort((a,b)=>(MATCH_DATES[a.num]||'').localeCompare(MATCH_DATES[b.num]||''));
  const allMatchesDesc = MATCHES.slice().sort((a,b)=>(MATCH_DATES[b.num]||'').localeCompare(MATCH_DATES[a.num]||''));

  if(jogosSubTab === 'proximos') {
    // Próximos: não finalizados, do mais próximo ao mais distante
    const proximos = allMatchesAsc.filter(m => {
      const r = realScores[m.num];
      return !r?.is_finished;
    });

    if(proximos.length === 0){
      main.appendChild(el('div',{style:{textAlign:'center',color:'var(--muted)',padding:'2rem',fontSize:'.9rem'}},'Nenhum jogo pendente!'));
      return;
    }

    // Alerta de jogos sem palpite próximos
    const semPalpite = proximos.filter(m=>{
      const d=daysUntil(MATCH_DATES[m.num]);
      return matchPreds[m.num]?.s1===undefined && d>=0 && d<=1;
    });
    if(semPalpite.length>0){
      const isToday=semPalpite.some(m=>daysUntil(MATCH_DATES[m.num])===0);
      const alertDiv=el('div',{style:{background:isToday?'rgba(239,68,68,.1)':'rgba(245,158,11,.1)',border:'1px solid '+(isToday?'rgba(239,68,68,.3)':'rgba(245,158,11,.3)'),borderRadius:'10px',padding:'.75rem',marginBottom:'1rem'}});
      alertDiv.appendChild(el('div',{style:{fontWeight:'700',fontSize:'.85rem',color:isToday?'#FCA5A5':'#FCD34D'}},
        (isToday?'🚫':'⚠️')+' '+semPalpite.length+' jogo(s) '+(isToday?'HOJE':'amanhã')+' sem palpite!'));
      alertDiv.appendChild(el('div',{style:{color:'var(--muted)',fontSize:'.75rem',marginTop:'2px'}},
        isToday?'Prazo encerrado para esses jogos.':'Palpite agora antes que bloqueie!'));
      main.appendChild(alertDiv);
    }

    proximos.forEach(m=>{ appendMatchCard(main, m, false); });
    updateSaveBarJogos();

  } else {
    // Finalizados: com resultado real, do mais RECENTE ao mais antigo
    const finalizados = allMatchesDesc.filter(m=>{
      const r=realScores[m.num];
      return r?.is_finished && r.real_score1!==undefined;
    });

    if(finalizados.length === 0){
      main.appendChild(el('div',{style:{textAlign:'center',color:'var(--muted)',padding:'2rem',fontSize:'.9rem'}},'Nenhum jogo finalizado ainda.'));
      return;
    }

    finalizados.forEach(m=>{ appendMatchCard(main, m, true); });
  }
}

function appendMatchCard(main, m, forceFinalized) {
  const p = matchPreds[m.num]||{};
  const r = realScores[m.num];
  const hasResult = r?.is_finished && r.real_score1!==undefined;
  const canBetNow = !forceFinalized && canBet(m.num);
  const locked = !canBetNow;
  const hasPred = p.s1 !== undefined;

  const pts = (hasResult && hasPred) ? calcPts(p.s1, p.s2||0, r.real_score1, r.real_score2) : 0;
  const ptsCls = pts===10?'p10':pts===7?'p7':pts===5?'p5':pts===2?'p2':'p0';

  // Label de data
  const dateStr2 = MATCH_DATES[m.num];
  const dateLabel = dateStr2 ? (()=>{
    const dt = new Date(dateStr2+':00-03:00');
    return dt.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'})+' · '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  })() : '';

  // Badge de grupo acima do card
  const grpBadge = el('div',{style:{fontSize:'.68rem',color:'var(--gold)',fontWeight:'700',marginBottom:'2px',marginTop:'4px',letterSpacing:'.03em'}},
    'GRUPO '+m.group+' — Jogo #'+m.num);
  main.appendChild(grpBadge);

  const mc = el('div',{class:'mc'+(hasResult?' fin':'')+(locked&&!hasResult?' locked':'')});

  // Data
  if(dateLabel) mc.appendChild(el('div',{style:{textAlign:'center',fontSize:'.62rem',color:'var(--muted)',fontWeight:'600',marginBottom:'.3rem'}},dateLabel));

  // Times
  const teamsRow = el('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'.4rem'}});
  teamsRow.appendChild(el('span',{style:{fontSize:'.95rem'}},FLAGS[m.t1]||'🏳'));
  teamsRow.appendChild(el('span',{style:{fontSize:'.72rem',fontWeight:'600',flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.t1));
  teamsRow.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.7rem',fontWeight:'700',flexShrink:'0'}},' × '));
  teamsRow.appendChild(el('span',{style:{fontSize:'.72rem',fontWeight:'600',flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}},m.t2));
  teamsRow.appendChild(el('span',{style:{fontSize:'.95rem'}},FLAGS[m.t2]||'🏳'));
  mc.appendChild(teamsRow);

  // Placar / controles
  if(canBetNow) {
    const v1=hasPred?p.s1:null, v2=hasPred?p.s2:null;
    const scoreRow = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'4px',marginBottom:'.3rem'}});
    scoreRow.appendChild(makeMatchCtrl(v1, v=>{ matchPreds[m.num]={...(matchPreds[m.num]||{}),s1:v,s2:matchPreds[m.num]?.s2??0}; }, false, ()=>{ matchDirty=true; updateSaveBarJogos(); }));
    scoreRow.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700',fontSize:'.9rem',margin:'0 3px'}},'×'));
    scoreRow.appendChild(makeMatchCtrl(v2, v=>{ matchPreds[m.num]={...(matchPreds[m.num]||{}),s2:v,s1:matchPreds[m.num]?.s1??0}; }, false, ()=>{ matchDirty=true; updateSaveBarJogos(); }));
    mc.appendChild(scoreRow);
  } else {
    const lockRow = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',marginBottom:'.3rem'}});
    if(hasResult){
      lockRow.appendChild(el('span',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:'1.3rem',color:'var(--gold)'}},r.real_score1+' — '+r.real_score2));
    } else {
      lockRow.appendChild(el('span',{style:{fontSize:'.8rem',color:'var(--muted)'}},'🔒 Prazo encerrado'));
    }
    mc.appendChild(lockRow);
  }

  // Meu palpite (quando bloqueado ou finalizado)
  if(locked) {
    // Clicável se tem resultado (finalizados) OU se está bloqueado sem resultado (em andamento)
    const canShowPopup = hasResult || (!hasResult && locked);
    const sep = el('div',{style:{borderTop:'1px solid rgba(45,55,72,.5)',marginTop:'.3rem',paddingTop:'.3rem',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',flexWrap:'wrap',cursor:'pointer'},
      onclick: ()=>showMatchPalpitesPopup(m, r, hasResult),
      title: 'Clique para ver palpites de todos'
    });
    const leftDiv = el('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}});
    leftDiv.appendChild(el('span',{style:{fontSize:'.65rem',color:'var(--muted)'}},'Meu palpite:'));
    if(hasPred){
      leftDiv.appendChild(el('span',{style:{fontSize:'.75rem',color:'#94A3B8',fontWeight:'600'}},p.s1+' × '+p.s2));
      if(hasResult) leftDiv.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.65rem'}},pts+'pts'));
    } else {
      leftDiv.appendChild(el('span',{style:{fontSize:'.7rem',color:'var(--muted)'}},'Sem palpite'));
      if(hasResult) leftDiv.appendChild(el('span',{class:'pp p0',style:{fontSize:'.65rem'}},'0pts'));
    }
    sep.appendChild(leftDiv);
    sep.appendChild(el('span',{style:{fontSize:'.65rem',color:'var(--muted)',flexShrink:'0'}},hasResult?'👥 ver todos':'👥 ver palpites'));
    mc.appendChild(sep);
  }

  main.appendChild(mc);
}

async function showMatchPalpitesPopup(m, r, hasResult=false) {
  document.getElementById('match-palpites-popup')?.remove();

  const overlay = el('div',{id:'match-palpites-popup',style:{
    position:'fixed',top:'0',left:'0',right:'0',bottom:'0',
    background:'rgba(0,0,0,.78)',zIndex:'9999',
    display:'flex',alignItems:'flex-end',justifyContent:'center'
  }});
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  const modal = el('div',{style:{
    background:'var(--dk2)',borderRadius:'16px 16px 0 0',
    width:'100%',maxWidth:'600px',maxHeight:'88vh',
    display:'flex',flexDirection:'column',overflow:'hidden',
    position:'relative'
  }});

  // Header
  const hdr = el('div',{style:{padding:'1rem 2.5rem 1rem 1rem',borderBottom:'1px solid var(--bdr)',flexShrink:'0'}});
  hdr.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',fontSize:'1.1rem',marginBottom:'.3rem'}},
    '👥 Palpites — Jogo #'+m.num+' · Grupo '+m.group));

  // Times e resultado real (ou "em andamento")
  const matchInfo = el('div',{style:{display:'flex',alignItems:'center',gap:'6px'}});
  matchInfo.appendChild(el('span',{style:{fontSize:'.82rem',fontWeight:'600'}},(FLAGS[m.t1]||'🏳')+' '+m.t1));
  if(hasResult && r){
    matchInfo.appendChild(el('span',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:'1.15rem',color:'var(--gold)',margin:'0 6px'}},r.real_score1+' — '+r.real_score2));
  } else {
    matchInfo.appendChild(el('span',{style:{fontSize:'.72rem',color:'#FCD34D',margin:'0 6px',fontWeight:'700'}},'🔴 EM ANDAMENTO'));
  }
  matchInfo.appendChild(el('span',{style:{fontSize:'.82rem',fontWeight:'600'}},m.t2+' '+(FLAGS[m.t2]||'🏳')));
  hdr.appendChild(matchInfo);

  modal.appendChild(hdr);
  const closeBtn = el('button',{class:'btn btn-sm btn-o',style:{position:'absolute',top:'1rem',right:'1rem'},onclick:()=>overlay.remove()},'✕');
  modal.appendChild(closeBtn);

  // Body com loading
  const body = el('div',{style:{overflowY:'auto',flex:'1',padding:'.75rem 1rem 1.5rem'}});
  body.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // Buscar palpites de todos do bolão para esse jogo
  try {
    const bolaoId = CURRENT_BOLAO?.id;
    const [members, allPreds] = await Promise.all([
      dbQ('bolao_members',{bolao_id:bolaoId},'user_id'),
      SB.from('match_predictions')
        .select('user_id,predicted_score1,predicted_score2,points')
        .eq('match_number', m.num)
        .eq('bolao_id', bolaoId)
        .then(res=>res.data||[])
    ]);

    const memberIds = new Set((members||[]).map(x=>x.user_id));
    const predsDoJogo = allPreds.filter(p=>memberIds.has(p.user_id));

    // Montar lista com todos os membros (inclusive quem não palpitou)
    const rows = [];
    memberIds.forEach(uid=>{
      const pred = predsDoJogo.find(p=>p.user_id===uid);
      const prof = STATE.profiles.find(p=>p.id===uid);
      if(!prof) return;
      const s1 = pred?.predicted_score1;
      const s2 = pred?.predicted_score2;
      const hasPred = s1 !== undefined && s1 !== null;
      const pts = (hasPred && hasResult && r) ? calcPts(s1, s2||0, r.real_score1, r.real_score2) : null;
      rows.push({uid, name:prof.display_name, s1, s2, pts, hasPred, isMe: uid===STATE.profile.id});
    });

    // Ordenar: se tem resultado, por pts desc; se não tem, alfabético. Sem palpite sempre no final.
    rows.sort((a,b)=>{
      if(!a.hasPred && !b.hasPred) return a.name.localeCompare(b.name);
      if(!a.hasPred) return 1;
      if(!b.hasPred) return -1;
      if(hasResult) return (b.pts??0) - (a.pts??0);
      return a.name.localeCompare(b.name);
    });

    body.innerHTML='';

    if(rows.length===0){
      body.appendChild(el('div',{style:{textAlign:'center',color:'var(--muted)',padding:'2rem'}},'Nenhum participante encontrado.'));
      return;
    }

    // Legenda de pontuação
    const leg = el('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'.75rem',fontSize:'.65rem',color:'var(--muted)'}});
    [['p10','10pts=placar exato'],['p7','7pts=resultado+1 gol'],['p5','5pts=resultado'],['p2','2pts=1 gol certo'],['p0','0pts']].forEach(([cls,txt])=>{
      const b=el('div',{style:{display:'flex',alignItems:'center',gap:'3px'}});
      b.appendChild(el('span',{class:'pp '+cls,style:{fontSize:'.6rem'}},cls==='p0'?'0':cls.replace('p','')));
      b.appendChild(el('span',{},txt));
      leg.appendChild(b);
    });
    body.appendChild(leg);

    rows.forEach((row,i)=>{
      const ptsCls = row.pts===10?'p10':row.pts===7?'p7':row.pts===5?'p5':row.pts===2?'p2':'p0';
      const medal = hasResult
        ? (i===0&&row.hasPred?'🥇':i===1&&row.hasPred?'🥈':i===2&&row.hasPred?'🥉':null)
        : null;

      const card = el('div',{style:{
        display:'flex',alignItems:'center',gap:'8px',
        padding:'.55rem .75rem',
        background: row.isMe ? 'rgba(255,215,0,.08)' : i%2===0?'var(--dk3)':'transparent',
        border: row.isMe ? '1px solid rgba(255,215,0,.3)' : '1px solid transparent',
        borderRadius:'8px',marginBottom:'4px'
      }});

      // Posição/medal
      card.appendChild(el('div',{style:{width:'24px',textAlign:'center',flexShrink:'0',fontWeight:'700',fontSize:'.75rem',color:'var(--muted)'}},
        medal || (i+1)+'º'));

      // Nome
      const nameDiv = el('div',{style:{flex:'1',minWidth:'0'}});
      nameDiv.appendChild(el('div',{style:{
        fontWeight: row.isMe?'700':'500',
        color: row.isMe?'var(--gold)':'var(--txt)',
        fontSize:'.85rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'
      }},row.name+(row.isMe?' 👤':'')));
      card.appendChild(nameDiv);

      // Palpite
      const predDiv = el('div',{style:{textAlign:'center',minWidth:'48px',flexShrink:'0'}});
      if(row.hasPred){
        predDiv.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:'1rem',color:'#94A3B8',letterSpacing:'.05em'}},row.s1+' × '+row.s2));
      } else {
        predDiv.appendChild(el('div',{style:{fontSize:'.68rem',color:'var(--muted)',fontStyle:'italic'}},'—'));
      }
      card.appendChild(predDiv);

      // Pontuação — só mostra se tem resultado
      const ptsDiv = el('div',{style:{flexShrink:'0',minWidth:'42px',textAlign:'right'}});
      if(row.pts !== null){
        ptsDiv.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.72rem'}},row.pts+'pts'));
      } else {
        ptsDiv.appendChild(el('span',{style:{fontSize:'.65rem',color:'var(--muted)'}},'—'));
      }
      card.appendChild(ptsDiv);

      body.appendChild(card);
    });

  } catch(e) {
    body.innerHTML='';
    body.appendChild(el('div',{style:{color:'var(--err)',padding:'1rem',fontSize:'.85rem'}},'Erro ao carregar: '+e.message));
  }
}

  ]).then(([gp,rs,rk])=>{
    if(PAGE_VERSION !== v) return;
    const srRow=(rk||[]).find(r=>r.phase==='second_round_date');
    if(srRow?.team_ids?.[0]) SECOND_ROUND_DATE=srRow.team_ids[0];
    const mlRow=(rk||[]).find(r=>r.phase==='matches_lock_start');
    if(mlRow?.team_ids?.[0]) MATCHES_LOCK_START=mlRow.team_ids[0];
    main.innerHTML='';
    main.appendChild(el('div',{class:'ch'},'📊 Classificação dos Grupos'));
    grpPreds={};
    (gp||[]).forEach(p=>{
      if(p.group_id === '_thirds') {
        // terceiros palpitados salvos como group_id='_thirds', position=índice 1..8
        if(!grpPreds['_thirds']) grpPreds['_thirds']=[];
        grpPreds['_thirds'].push(p.team_name);
      } else {
        if(!grpPreds[p.group_id])grpPreds[p.group_id]={};
        grpPreds[p.group_id][p.position]={team:p.team_name,pts:p.points};
      }
    });
    grpReal={};
    (rs||[]).forEach(r=>{ if(!grpReal[r.group_id])grpReal[r.group_id]={}; grpReal[r.group_id][r.position]=r.team_name; });
    const realThirdsKo = (rk||[]).find(r=>r.phase==='best_thirds');
    grpReal['_thirds_real'] = realThirdsKo?.team_ids || [];

    // Limpar _thirds fantasmas: remover times que não são mais o 3º de nenhum grupo
    if(grpPreds['_thirds']){
      const valid3rds = Object.entries(GROUPS).map(([g])=>grpPreds[g]?.[3]?.team).filter(Boolean);
      grpPreds['_thirds'] = grpPreds['_thirds'].filter(t=>valid3rds.includes(t));
    }

    grpDirty=false;
    buildStandingsUI(main);
  });
}
// Sincroniza koPreds com o pool atual baseado nos palpites de grupos
// Remove times do koPreds que saíram do pool (por mudança de grupo)
function clearPhasesFrom(phase){
  // Limpar completamente todas as fases a partir da fase indicada
  const order = ['round32','round16','quarter','semi','final','runner_up','third'];
  const idx = order.indexOf(phase);
  if(idx < 0) return;
  order.slice(idx).forEach(p=>{ koPreds[p]=[]; });
}

function syncKoPredsWithGrpPreds(){
  // Recalcular pool do round32 com grpPreds atual
  const userStandings={};
  Object.entries(GROUPS).forEach(([g])=>{
    if(!userStandings[g]) userStandings[g]={};
    [1,2,3,4].forEach(pos=>{
      if(grpPreds[g]?.[pos]?.team) userStandings[g][pos]=grpPreds[g][pos].team;
    });
  });
  koUserGrpStandings=userStandings;

  // Pool de 3ºs válidos: apenas os times que estão atualmente como 3º de algum grupo
  const valid3rds = Object.entries(GROUPS).map(([g])=>grpPreds[g]?.[3]?.team).filter(Boolean);

  // Limpar _thirds de times que não são mais 3ºs de nenhum grupo
  if(grpPreds['_thirds']) {
    grpPreds['_thirds'] = grpPreds['_thirds'].filter(t=>valid3rds.includes(t));
  }

  // Pool do round32: top2 de cada grupo + _thirds válidos
  const pool32=[];
  Object.values(userStandings).forEach(pos=>{
    if(pos[1]) pool32.push(pos[1]);
    if(pos[2]) pool32.push(pos[2]);
  });
  (grpPreds['_thirds']||[]).forEach(t=>{ if(!pool32.includes(t)) pool32.push(t); });

  // Verificar se algum time do round32 saiu do pool — se sim, limpar TUDO a partir do round32
  const r32invalid = (koPreds['round32']||[]).some(x=>!pool32.includes(x.team));
  if(r32invalid){
    clearPhasesFrom('round32');
    return;
  }

  // Deduplicar round32 por segurança
  if(koPreds['round32']){
    const seen=new Set();
    koPreds['round32']=koPreds['round32'].filter(x=>{ if(seen.has(x.team)) return false; seen.add(x.team); return true; });
  }
}

  const t2=el('button',{style:tabStyle('thirds'),onclick:()=>{ window._grpSubTab='thirds'; buildStandingsUI(main); }},'🥉 Melhores 3ºs');
  subTabs.appendChild(t1); subTabs.appendChild(t2);
  main.appendChild(subTabs);

  // Banner de prazo
  if(!grpOpen){
    main.appendChild(el('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:'10px',padding:'.875rem',marginBottom:'1rem',textAlign:'center'}},
      el('div',{style:{fontSize:'1.2rem',marginBottom:'4px'}},'🔒'),
      el('div',{style:{color:'#FCA5A5',fontWeight:'700',marginBottom:'4px'}},'Prazo encerrado'),
      el('div',{style:{color:'var(--muted)',fontSize:'.8rem'}},'Palpites de classificados bloqueados desde o início da 2ª rodada.')
    ));
  } else if(daysLeft<=3){
    const urgency=daysLeft<=1?'#EF4444':'#F59E0B';
    const msg=daysLeft<=0?'⏰ Hoje é o último dia!':daysLeft===1?'⏰ Falta 1 dia para o prazo!':'⏰ Faltam '+daysLeft+' dias para o prazo!';
    main.appendChild(el('div',{style:{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:'10px',padding:'.75rem',marginBottom:'1rem',textAlign:'center'}},
      el('div',{style:{color:urgency,fontWeight:'700',fontSize:'.85rem'}},msg),
      el('div',{style:{color:'var(--muted)',fontSize:'.75rem',marginTop:'2px'}},'Bloqueio em '+GROUPS_DEADLINE+'. Preencha classificados e eliminatórias antes!')
    ));
  }

  const selectedThirds = grpPreds['_thirds'] || [];
  const realThirdsReal = grpReal['_thirds_real'] || [];

  // Limpar _thirds fantasmas em memória (times que não são mais 3º de nenhum grupo)
  const valid3rdsNow = Object.entries(GROUPS).map(([g])=>grpPreds[g]?.[3]?.team).filter(Boolean);
  if(grpPreds['_thirds']){
    const before = grpPreds['_thirds'].length;
    grpPreds['_thirds'] = grpPreds['_thirds'].filter(t=>valid3rdsNow.includes(t));
    if(grpPreds['_thirds'].length !== before) grpDirty=true;
  }
  const selectedThirdsClean = grpPreds['_thirds'] || [];

  // ── ABA 1: CLASSIFICADOS POR GRUPO ──────────────────────────────────────
  if(window._grpSubTab==='classified'){
    main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.78rem',marginBottom:'1rem'}},'1º exato=10pts · 2º exato=10pts · 1º/2º invertidos=5pts · 3º e 4º não pontuam · Melhores 3ºs=5pts'));
    const grid=el('div',{class:'sg'});

    Object.entries(GROUPS).forEach(([g,teams])=>{
      const sc=el('div',{class:'sc'});
      sc.appendChild(el('h4',{},'GRUPO '+g));

      // Botão ver palpites de todos (só quando bloqueado)
      if(!grpOpen){
        sc.appendChild(el('button',{
          class:'btn btn-sm btn-o',
          style:{width:'100%',marginBottom:'.5rem',fontSize:'.72rem'},
          onclick:()=>showGroupPalpitesPopup(g, grpReal[g])
        },'👥 Ver palpites de todos'));
      }

      // Todas as 4 posições — 1º e 2º pontuam, 3º e 4º não pontuam
      [1,2,3,4].forEach(pos=>{
        const curr=grpPreds[g]?.[pos]?.team||'';
        // Times já usados nas outras posições deste grupo
        const usedOthers = [1,2,3,4].filter(p=>p!==pos).map(p=>grpPreds[g]?.[p]?.team).filter(Boolean);
        const rTeam=grpReal[g]?.[pos];
        const rTeam1=grpReal[g]?.[1]; const rTeam2=grpReal[g]?.[2];

        // Pontuação em tempo real (só 1º e 2º pontuam)
        let pts=undefined;
        if(curr && (rTeam1||rTeam2)){
          if(pos<=2){
            if(curr===rTeam) pts=10;
            else if([rTeam1,rTeam2].includes(curr)) pts=5;
            else if(rTeam) pts=0;
          } else {
            pts=undefined; // 3º e 4º nunca pontuam — não mostrar badge
          }
        }

        const pr=el('div',{class:'pr'});
        const posLabel=el('span',{class:'pl',style:{color:pos<=2?'var(--txt)':'var(--muted)'}},pos+'º');
        pr.appendChild(posLabel);

        const sel=el('select',{class:'ps'});
        if(!grpOpen){ sel.disabled=true; sel.style.opacity='0.5'; }
        sel.appendChild(el('option',{value:''},'— Selecione —'));
        teams.forEach(t=>{
          if(usedOthers.includes(t)) return;
          const o=el('option',{value:t},(FLAGS[t]||'')+' '+t);
          if(t===curr) o.selected=true;
          sel.appendChild(o);
        });
        sel.onchange=()=>{
          if(!grpOpen) return;
          if(!grpPreds[g])grpPreds[g]={};
          const oldTeam = grpPreds[g][pos]?.team||'';
          let newPts=0;
          if(sel.value && pos<=2 && grpReal[g]){
            if(grpReal[g][pos]===sel.value) newPts=10;
            else if([grpReal[g][1],grpReal[g][2]].includes(sel.value)) newPts=5;
          }
          grpPreds[g][pos]={team:sel.value,pts:newPts};
          // Se mudou o 3º colocado, remover o time antigo dos _thirds automaticamente
          if(pos===3 && oldTeam && oldTeam!==sel.value && grpPreds['_thirds']) {
            const i=grpPreds['_thirds'].indexOf(oldTeam);
            if(i>=0) grpPreds['_thirds'].splice(i,1);
          }
          // Se mudou 1º ou 2º e o novo time estava nos _thirds, removê-lo também
          if(pos<=2 && sel.value && grpPreds['_thirds']) {
            const i=grpPreds['_thirds'].indexOf(sel.value);
            if(i>=0) grpPreds['_thirds'].splice(i,1);
          }
          // FIX 1+3: sincronizar koPreds com o novo pool (grupos mudaram)
          syncKoPredsWithGrpPreds();
          grpDirty=true; updateGrpSaveBar();
          buildStandingsUI(main);
        };
        pr.appendChild(sel);

        // Badge de pontuação só para 1º e 2º
        if(pos<=2 && curr && pts!==undefined){
          pr.appendChild(el('span',{class:`pp ${pts===10?'p10':pts===5?'p5':'p0'}`,style:{whiteSpace:'nowrap'}},pts+'p'));
        }
        sc.appendChild(pr);
      });

      grid.appendChild(sc);
    });
    main.appendChild(grid);
  }

  // ── ABA 2: MELHORES 3ºS ─────────────────────────────────────────────────
  if(window._grpSubTab==='thirds'){
    const thirdsCount=selectedThirdsClean.length;
    main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.78rem',marginBottom:'.75rem'}},'Selecione até 8 dos 12 terceiros colocados que passarão como melhores 3ºs · Acertar = 5pts cada'));
    main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.72rem',marginBottom:'.75rem',fontStyle:'italic'}},'Os times exibidos são os 3ºs que você palpitou na aba Classificados. Preencha primeiro todos os grupos.'));
    main.appendChild(el('div',{style:{fontSize:'.82rem',fontWeight:'600',color:thirdsCount===8?'var(--ok)':'var(--gold)',marginBottom:'.5rem'}},
      thirdsCount+'/8 selecionados'+(thirdsCount===8?' ✓':'')));

    // Botão ver palpites de todos nos 3ºs (só quando bloqueado)
    if(!grpOpen){
      main.appendChild(el('button',{
        class:'btn btn-o',
        style:{width:'100%',marginBottom:'1rem',fontSize:'.78rem'},
        onclick:()=>showThirdsPalpitesPopup(realThirdsReal)
      },'👥 Ver palpites de todos nos Melhores 3ºs'));
    }

    // Pool: apenas os 3ºs palpitados pelo usuário (posição 3 de cada grupo)
    const poolWrap=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}});
    let missingGroups=[];

    Object.entries(GROUPS).forEach(([g,teams])=>{
      const third3=grpPreds[g]?.[3]?.team||null;
      const isReal=realThirdsReal.includes(third3);
      const isSel=third3&&selectedThirdsClean.includes(third3);
      const blocked=!isSel && thirdsCount>=8;

      if(!third3){
        missingGroups.push(g);
        // Mostrar placeholder cinza
        const ph=el('button',{
          class:'btn btn-sm btn-o',
          disabled:true,
          style:{opacity:'0.3',cursor:'not-allowed'}
        },'G'+g+': — sem palpite');
        poolWrap.appendChild(ph);
        return;
      }

      let cls='btn-o';
      if(isSel && isReal) cls='btn-s';
      else if(isSel && realThirdsReal.length>0 && !isReal) cls='btn-d';
      else if(isSel) cls='btn-p';

      // Mostrar letra do grupo antes do nome (ex: "G · Brasil")
      const orderTag = g+' · '; // mostrar letra do grupo em todos os botões
      const ptsTag = isSel&&isReal ? ' · 5p' : '';
      const label = orderTag+(FLAGS[third3]||'🏳')+' '+third3+ptsTag;

      const b=el('button',{
        class:`btn btn-sm ${cls}`,
        disabled:blocked,
        style:blocked?{opacity:'0.3',cursor:'not-allowed'}:{},
        onclick:()=>{
          if(!grpOpen){ showToast('Prazo encerrado!','err'); return; }
          if(!grpPreds['_thirds']) grpPreds['_thirds']=[];
          const idx=grpPreds['_thirds'].indexOf(third3);
          if(idx>=0){
            grpPreds['_thirds'].splice(idx,1);
          } else {
            if(grpPreds['_thirds'].length>=8){ showToast('Máximo 8!','err'); return; }
            grpPreds['_thirds'].push(third3);
          }
          syncKoPredsWithGrpPreds();
          grpDirty=true; updateGrpSaveBar(); buildStandingsUI(main);
        }
      },label);
      poolWrap.appendChild(b);
    });

    main.appendChild(poolWrap);

    if(missingGroups.length>0){
      main.appendChild(el('div',{style:{fontSize:'.72rem',color:'var(--muted)',marginTop:'1rem',fontStyle:'italic'}},
        '⚠️ Falta palpitar o 3º colocado dos grupos: '+missingGroups.join(', ')+' — vá em Classificados por Grupo'));
    }
  }

  updateGrpSaveBar();
}

    width:'100%',maxWidth:'600px',maxHeight:'88vh',

  }});

  hdr.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',fontSize:'1.1rem',marginBottom:'.3rem'}},
    '👥 Palpites — Grupo '+groupId));

  if(hasReal){
    const ri = el('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'.8rem'}});
    [1,2].forEach(pos=>{
      const t = realStandings[pos];
      if(t) ri.appendChild(el('span',{style:{fontWeight:'700',color:'var(--gold)'}},pos+'º '+(FLAGS[t]||'🏳')+' '+t));
    });
    hdr.appendChild(ri);
  } else {
    hdr.appendChild(el('div',{style:{fontSize:'.72rem',color:'#FCD34D',fontWeight:'700'}},'⏳ Resultado ainda não definido'));
  }

  modal.appendChild(hdr);
  modal.appendChild(el('button',{class:'btn btn-sm btn-o',style:{position:'absolute',top:'1rem',right:'1rem'},onclick:()=>overlay.remove()},'✕'));

  const body = el('div',{style:{overflowY:'auto',flex:'1',padding:'.75rem 1rem 1.5rem'}});
  body.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  try {
    const bolaoId = CURRENT_BOLAO?.id;
    const [members, allGrpPreds] = await Promise.all([
      dbQ('bolao_members',{bolao_id:bolaoId},'user_id'),
      SB.from('group_predictions')
        .select('user_id,group_id,position,team_name,points')
        .eq('group_id', groupId)
        .eq('bolao_id', bolaoId)
        .then(r=>r.data||[])
    ]);

    const memberIds = new Set((members||[]).map(m=>m.user_id));

    // Agrupar palpites por user: {uid: {1:'México', 2:'Coreia', pts:X}}
    const byUser = {};
    allGrpPreds.filter(p=>memberIds.has(p.user_id)).forEach(p=>{
      if(!byUser[p.user_id]) byUser[p.user_id]={};
      byUser[p.user_id][p.position] = {team:p.team_name, pts:p.points||0};
    });

    // Calcular pts totais do grupo (1º+2º) por usuário
    const rows = [];
    memberIds.forEach(uid=>{
      const prof = STATE.profiles.find(p=>p.id===uid);
      if(!prof) return;
      const u = byUser[uid]||{};
      const pred1 = u[1]?.team||'';
      const pred2 = u[2]?.team||'';
      const hasPred = pred1||pred2;
      let pts = 0;
      if(hasPred && hasReal){
        const r1=realStandings[1], r2=realStandings[2];
        if(pred1===r1) pts+=10; else if(pred1===r2) pts+=5;
        if(pred2===r2) pts+=10; else if(pred2===r1) pts+=5;
      }
      rows.push({uid, name:prof.display_name, pred1, pred2, pts, hasPred:!!(pred1||pred2), isMe:uid===STATE.profile.id});
    });

    rows.sort((a,b)=>{
      if(!a.hasPred && !b.hasPred) return a.name.localeCompare(b.name);
      if(!a.hasPred) return 1; if(!b.hasPred) return -1;
      if(hasReal) return b.pts - a.pts;
      return a.name.localeCompare(b.name);
    });

    body.innerHTML='';

    // Legenda
    const leg = el('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'.75rem',fontSize:'.65rem',color:'var(--muted)'}});
    leg.appendChild(el('span',{},'🏆 1º e 2º exatos = 10pts cada · invertidos = 5pts cada'));

    rows.forEach((row,i)=>{
      const ptsCls = row.pts>=20?'p10':row.pts>=10?'p7':row.pts>0?'p5':'p0';
      const medal = hasReal ? (i===0&&row.hasPred?'🥇':i===1&&row.hasPred?'🥈':i===2&&row.hasPred?'🥉':null) : null;

      const card = el('div',{style:{
        display:'flex',alignItems:'center',gap:'8px',padding:'.55rem .75rem',
        background:row.isMe?'rgba(255,215,0,.08)':i%2===0?'var(--dk3)':'transparent',
        border:row.isMe?'1px solid rgba(255,215,0,.3)':'1px solid transparent',

      }});

      card.appendChild(el('div',{style:{width:'24px',textAlign:'center',flexShrink:'0',fontWeight:'700',fontSize:'.75rem',color:'var(--muted)'}},
        medal||(i+1)+'º'));

      const nameDiv=el('div',{style:{flex:'1',minWidth:'0'}});
      nameDiv.appendChild(el('div',{style:{fontWeight:row.isMe?'700':'500',color:row.isMe?'var(--gold)':'var(--txt)',fontSize:'.85rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
        row.name+(row.isMe?' 👤':'')));
      card.appendChild(nameDiv);

      // Palpites 1º e 2º
      const predDiv = el('div',{style:{textAlign:'center',flexShrink:'0',minWidth:'90px'}});
      if(row.hasPred){
        predDiv.appendChild(el('div',{style:{fontSize:'.7rem',color:'#94A3B8',lineHeight:'1.3'}},
          '1º '+(FLAGS[row.pred1]||'🏳')+' '+(row.pred1||'—')));
        predDiv.appendChild(el('div',{style:{fontSize:'.7rem',color:'#94A3B8',lineHeight:'1.3'}},
          '2º '+(FLAGS[row.pred2]||'🏳')+' '+(row.pred2||'—')));
      } else {
        predDiv.appendChild(el('div',{style:{fontSize:'.68rem',color:'var(--muted)',fontStyle:'italic'}},'sem palpite'));
      }
      card.appendChild(predDiv);

      // Pts
      const ptsDiv=el('div',{style:{flexShrink:'0',minWidth:'38px',textAlign:'right'}});
      if(row.hasPred && hasReal){
        ptsDiv.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.72rem'}},row.pts+'pts'));
      } else {
        ptsDiv.appendChild(el('span',{style:{fontSize:'.65rem',color:'var(--muted)'}},'—'));
      }
      card.appendChild(ptsDiv);
      body.appendChild(card);
    });

  } catch(e){
    body.innerHTML='';
    body.appendChild(el('div',{style:{color:'var(--err)',padding:'1rem',fontSize:'.85rem'}},'Erro: '+e.message));
  }
}

  const body = el('div',{style:{overflowY:'auto',flex:'1',padding:'.75rem 1rem 1.5rem'}});
  body.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  try {
    const bolaoId = CURRENT_BOLAO?.id;
    const [members, thirdsRaw] = await Promise.all([
      dbQ('bolao_members',{bolao_id:bolaoId},'user_id'),
      SB.from('group_predictions')
        .select('user_id,group_id,position,team_name,points')
        .eq('group_id', '_thirds')
        .eq('bolao_id', bolaoId)
        .then(r=>r.data||[])
    ]);

    const memberIds = new Set((members||[]).map(m=>m.user_id));

    // Agrupar por user: lista de times selecionados como melhores 3ºs
    const byUser = {};
    thirdsRaw.filter(p=>memberIds.has(p.user_id)).forEach(p=>{
      if(!byUser[p.user_id]) byUser[p.user_id]=[];
      if(p.team_name) byUser[p.user_id].push(p.team_name);
    });

    const rows = [];
    memberIds.forEach(uid=>{
      const prof = STATE.profiles.find(p=>p.id===uid);
      if(!prof) return;
      const teams = byUser[uid]||[];
      const hasPred = teams.length>0;
      const pts = hasPred && hasReal ? teams.filter(t=>realThirds.includes(t)).length * 5 : 0;
      rows.push({uid, name:prof.display_name, teams, pts, hasPred, isMe:uid===STATE.profile.id});
    });

    rows.sort((a,b)=>{
      if(!a.hasPred&&!b.hasPred) return a.name.localeCompare(b.name);
      if(!a.hasPred) return 1; if(!b.hasPred) return -1;
      if(hasReal) return b.pts-a.pts;
      return a.name.localeCompare(b.name);
    });

    body.innerHTML='';
    body.appendChild(el('div',{style:{fontSize:'.65rem',color:'var(--muted)',marginBottom:'.75rem'}},'Cada 3º real acertado = 5pts · máximo 8 escolhas'));

    rows.forEach((row,i)=>{
      const ptsCls = row.pts>=30?'p10':row.pts>=15?'p7':row.pts>0?'p5':'p0';
      const medal = hasReal?(i===0&&row.hasPred?'🥇':i===1&&row.hasPred?'🥈':i===2&&row.hasPred?'🥉':null):null;

      const card = el('div',{style:{
        padding:'.6rem .75rem',
        background:row.isMe?'rgba(255,215,0,.08)':i%2===0?'var(--dk3)':'transparent',
        border:row.isMe?'1px solid rgba(255,215,0,.3)':'1px solid transparent',
        borderRadius:'8px',marginBottom:'4px'
      }});

      const top = el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'.3rem'}});
      top.appendChild(el('div',{style:{width:'24px',textAlign:'center',flexShrink:'0',fontWeight:'700',fontSize:'.75rem',color:'var(--muted)'}},medal||(i+1)+'º'));
      const nameS=el('div',{style:{flex:'1',fontWeight:row.isMe?'700':'500',color:row.isMe?'var(--gold)':'var(--txt)',fontSize:'.85rem'}},row.name+(row.isMe?' 👤':''));
      top.appendChild(nameS);
      if(row.hasPred&&hasReal){
        top.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.72rem'}},row.pts+'pts'));
      } else {
        top.appendChild(el('span',{style:{fontSize:'.65rem',color:'var(--muted)'}},row.hasPred?'—':'sem palpite'));
      }
      card.appendChild(top);

      if(row.hasPred){
        const teamsDiv = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',paddingLeft:'32px'}});
        row.teams.forEach(t=>{
          const isAcerto = hasReal && realThirds.includes(t);
          teamsDiv.appendChild(el('span',{style:{
            fontSize:'.68rem',padding:'2px 6px',borderRadius:'4px',
            background:isAcerto?'rgba(34,197,94,.15)':'rgba(255,255,255,.05)',
            color:isAcerto?'#4ADE80':'#94A3B8',
            border:'1px solid '+(isAcerto?'rgba(34,197,94,.3)':'rgba(255,255,255,.08)')
          }},(FLAGS[t]||'🏳')+' '+t+(isAcerto?' ✓':'')));
        });
        card.appendChild(teamsDiv);
      }
      body.appendChild(card);
    });

  } catch(e){
    body.innerHTML='';
    body.appendChild(el('div',{style:{color:'var(--err)',padding:'1rem',fontSize:'.85rem'}},'Erro: '+e.message));
  }
}

async function saveStandings(){
  const rows=[];
  Object.entries(GROUPS).forEach(([g])=>{
    [1,2,3,4].forEach(pos=>{
      const p=grpPreds[g]?.[pos];
      if(p?.team){
        // Usar calcGrpPts: só 1º e 2º pontuam, 3º/4º = 0
        const realPos = (()=>{
          if(grpReal[g]?.[1]===p.team) return 1;
          if(grpReal[g]?.[2]===p.team) return 2;
          if(grpReal[g]?.[3]===p.team) return 3;
          return null;
        })();
        const pts = calcGrpPts(pos, realPos);
        rows.push({user_id:STATE.profile.id,group_id:g,position:pos,team_name:p.team,points:pts});
      }
    });
  });
  // Salvar os 8 melhores terceiros palpitados (group_id='_thirds', position=índice 1..8)
  // Primeiro deletar entradas antigas para evitar fantasmas quando reduz seleção
  const thirds = grpPreds['_thirds']||[];
  const realThirds = grpReal['_thirds_real']||[];
  const bolaoIds = REPLICATE_ALL ? MY_BOLAOS.map(b=>b.id) : [CURRENT_BOLAO?.id];
  for(const bid of bolaoIds){
    if(bid) await SB.from('group_predictions').delete().eq('user_id',STATE.profile.id).eq('group_id','_thirds').eq('bolao_id',bid);
  }
  thirds.forEach((team, idx)=>{
    const pts = realThirds.includes(team) ? 5 : 0;
    rows.push({user_id:STATE.profile.id,group_id:'_thirds',position:idx+1,team_name:team,points:pts});
  });
  try{
    await upsertWithReplicate('group_predictions',rows);
    // Ao salvar grupos, limpar fases KO do banco (pool mudou, seleções anteriores inválidas)
    const koPhases=['round32','round16','quarter','semi','final','runner_up','third'];
    const bolaoIdsKo = REPLICATE_ALL ? MY_BOLAOS.map(b=>b.id) : [CURRENT_BOLAO?.id];
    for(const bid of bolaoIdsKo){
      if(bid) await SB.from('knockout_predictions').delete()
        .eq('user_id',STATE.profile.id).eq('bolao_id',bid)
        .in('phase',koPhases);
    }
    // Limpar em memória também
    clearPhasesFrom('round32');
    koDirty=false;
    grpDirty=false;
    showToast('✅ Classificação salva! Refaça as eliminatórias.'+(REPLICATE_ALL&&MY_BOLAOS.length>1?' (em todos os bolões)':''));
    updateGrpSaveBar();
  }
  catch(e){ showToast(e.message,'err'); }
}

// ── Knockout ───────────────────────────────────────────────────────────────
let koPreds={}, koReal={}, koScorer='', koDirty=false, koRealThirds=[], koUserThirds=[], koUserGrpStandings={};
// Get teams available for a phase based on previous phase selections
function getAvailableTeams(phase, currentPreds, realStandings, userThirds) {
  // REGRA: SEMPRE palpites do usuário, NUNCA resultados reais como fallback

  if(phase === 'round32') {
    const standings = koUserGrpStandings || {};
    const classified = [];
    Object.entries(standings).forEach(([g, pos]) => {
      if(pos[1]) classified.push(pos[1]);
      if(pos[2]) classified.push(pos[2]);
    });
    (userThirds||[]).forEach(t => { if(!classified.includes(t)) classified.push(t); });
    // Se não preencheu grupos → retorna [] (sem fallback para ALL_TEAMS)
    return classified;
  }

  if(phase === 'round16') {
    const prev = currentPreds['round32']||[];
    return prev.map(x=>x.team);
  }

  // quarter, semi, final, third: cascata dos palpites
  const prevPhase = {quarter:'round16', semi:'quarter', final:'semi', third:'semi'};
  const prev = prevPhase[phase];
  if(prev && currentPreds[prev]) return currentPreds[prev].map(x=>x.team);
  return [];
}

  }
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  Promise.all([
    CURRENT_BOLAO ? dbQ('knockout_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'phase,team_name,points') : Promise.resolve([]),
    dbQ('real_knockouts',{},'phase,team_ids'),
    CURRENT_BOLAO ? dbQ('scorer_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'player_name,points') : dbQ('scorer_predictions',{user_id:STATE.profile.id},'player_name,points'),
    CURRENT_BOLAO ? dbQ('group_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id,group_id:'_thirds'},'group_id,team_name,points') : Promise.resolve([]),
    dbQ('real_group_standings',{},'group_id,position,team_name'),
    CURRENT_BOLAO ? dbQ('group_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'group_id,position,team_name') : Promise.resolve([]),
  ]).then(([kp,rk,sp,thirdPreds,rgs,userGrpPreds])=>{
    if(PAGE_VERSION !== v) return;
    main.innerHTML='';
    main.appendChild(el('div',{class:'ch'},'🔥 Fases Eliminatórias'));
    koPreds={};
    (kp||[]).forEach(p=>{ if(!koPreds[p.phase])koPreds[p.phase]=[]; koPreds[p.phase].push({team:p.team_name,pts:p.points}); });
    PHASES.forEach(ph=>{
      if(koPreds[ph.key]){
        // Deduplicar por time primeiro, depois truncar ao limite
        const seen=new Set();
        koPreds[ph.key]=koPreds[ph.key].filter(x=>{ if(seen.has(x.team)) return false; seen.add(x.team); return true; });
        if(koPreds[ph.key].length>ph.count) koPreds[ph.key]=koPreds[ph.key].slice(0,ph.count);
      }
    });
    koReal={};
    (rk||[]).forEach(r=>{ koReal[r.phase]=r; });
    koScorer=(sp||[])[0]?.player_name||'';
    koRealThirds = (koReal['best_thirds']?.team_ids||[]);
    koUserThirds = (thirdPreds||[]).map(p=>p.team_name).filter(Boolean);
    // Real standings para mostrar resultados reais
    grpReal={};
    (rgs||[]).forEach(r=>{ if(!grpReal[r.group_id])grpReal[r.group_id]={}; grpReal[r.group_id][r.position]=r.team_name; });
    // Palpites do usuário nos grupos (1º e 2º) para montar pool do round32
    const userGrpStandings={};
    (userGrpPreds||[]).forEach(p=>{
      if(p.group_id==='_thirds') return;
      if(!userGrpStandings[p.group_id]) userGrpStandings[p.group_id]={};
      userGrpStandings[p.group_id][p.position]=p.team_name;
    });
    // Usar palpites do usuário como pool se definidos, senão usar resultados reais
    // REGRA: usar SEMPRE os palpites do usuário — nunca grpReal (resultados reais do admin)
    // FIX 4: se grpPreds está dirty (usuário mudou grupos sem salvar), usar grpPreds atual
    if(grpDirty && Object.keys(grpPreds).length>0) {
      const liveStandings={};
      Object.entries(GROUPS).forEach(([g])=>{
        if(!liveStandings[g]) liveStandings[g]={};
        [1,2,3,4].forEach(pos=>{ if(grpPreds[g]?.[pos]?.team) liveStandings[g][pos]=grpPreds[g][pos].team; });
      });
      koUserGrpStandings = liveStandings;
    } else {
      koUserGrpStandings = userGrpStandings;
    }
    koDirty=false;
    buildKoUI(main);
  });
}
function buildKoUI(main){
  main.innerHTML='';
  const koOpen = canBetGroups();
  const koDaysLeft = daysUntilGroupsDeadline();
  if(!koOpen){
    main.appendChild(el('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:'10px',padding:'.875rem',marginBottom:'1rem',textAlign:'center'}},

      el('div',{style:{color:'var(--muted)',fontSize:'.8rem'}},'Os palpites de eliminatórias foram bloqueados. Seus palpites estão salvos abaixo.')
    ));
  } else if(koDaysLeft<=3){
    const urgency=koDaysLeft<=1?'#EF4444':'#F59E0B';
    const msg=koDaysLeft<=0?'⏰ Hoje é o último dia!':koDaysLeft===1?'⏰ Falta 1 dia!':'⏰ Faltam '+koDaysLeft+' dias!';
    main.appendChild(el('div',{style:{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:'10px',padding:'.75rem',marginBottom:'1rem'}},
      el('div',{style:{color:urgency,fontWeight:'700',fontSize:'.85rem'}},msg+' Preencha todas as fases antes do bloqueio!'),
      el('div',{style:{color:'var(--muted)',fontSize:'.75rem',marginTop:'2px'}},'Prazo: '+GROUPS_DEADLINE+' · Classif. grupos → Rodada 32 → Oitavas → Campeão')
    ));
  }
  main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.82rem',marginBottom:'1rem'}},'Acertar classificado em cada fase = 10pts · Campeão = 50pts · Vice = 30pts · 3º lugar = 15pts · Artilheiro = 30pts'));

  // REGRA: confrontos do participante usam SEMPRE os palpites do usuário
  // Se não preencheu os 8 melhores 3ºs ainda, os slots de 3º ficam como "3º (A/B/...)"
  // até ele preencher — NUNCA substituir pelos resultados reais
  const userThirdsPool = koUserThirds.length > 0 ? koUserThirds : [];

  // ── Fases principais (round32 → semi → final) ──
  const mainPhases = PHASES.filter(ph=>ph.key!=='third');
  mainPhases.forEach(ph=>{
    const sel = koPreds[ph.key]||[];
    const rp  = koReal[ph.key];
    const avail = getAvailableTeams(ph.key, koPreds, grpReal, userThirdsPool);
    const isFull = sel.length >= ph.count;

    const card = el('div',{class:'card'});

    // Título com contador
    const titleRow = el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'.5rem'}});
    titleRow.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',fontSize:'1rem'}},ph.label));
    titleRow.appendChild(el('div',{style:{fontSize:'.75rem',color:isFull?'var(--ok)':'var(--muted)',fontWeight:'600'}},sel.length+'/'+ph.count+(isFull?' ✓':'')));
    card.appendChild(titleRow);

    // Mensagem de etapa faltante — sem fallback para dados reais
    const prevLabels = {
      round32: 'Classificação dos Grupos e 8 Melhores 3ºs',
      round16: 'Rodada de 32',
      quarter: 'Oitavas de Final',
      semi:    'Quartas de Final',
      final:   'Semifinal',
      third:   'Semifinal',
    };
    // round32: faltam grupos/3ºs se pool vazio
    // demais: falta a fase anterior
    if(avail.length===0){
      const missing = prevLabels[ph.key]||'fase anterior';
      const msgDiv = el('div',{style:{
        background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',
        borderRadius:'8px',padding:'.75rem',fontSize:'.82rem',color:'#FCD34D',
        display:'flex',alignItems:'center',gap:'8px'
      }});
      msgDiv.appendChild(el('span',{},'⚠️'));
      msgDiv.appendChild(el('span',{},
        ph.key==='round32'
          ? 'Preencha primeiro a Classificação dos Grupos e os 8 Melhores 3ºs.'
          : 'Preencha primeiro: '+missing+'.'));
      card.appendChild(msgDiv);
      main.appendChild(card);
      return;
    }
    if(ph.key==='round32'){
      card.appendChild(el('div',{style:{fontSize:'.72rem',color:'var(--muted)',marginBottom:'.5rem'}},'São 32 classificados. Escolha 16 que passam para as Oitavas.'));
    }

    const btns = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});

    // Final — confronto entre os 2 da semi, escolhe 1 campeão (20pts); vice automático
    if(ph.key==='final'){
      const realChamp = koReal['final']?.team_ids?.[0] || koReal['champion']?.team_ids?.[0];
      const champSel = (koPreds['final']||[])[0]?.team;
      const t1 = avail[0], t2 = avail[1];
      const matchRow = el('div',{style:{display:'flex',alignItems:'center',gap:'6px',background:'var(--dk3)',borderRadius:'10px',padding:'8px 10px'}});
      [t1,t2].forEach(team=>{
        if(!team) return;
        const isSel=champSel===team, isRealCh=realChamp&&team===realChamp;
        const cls=isSel&&isRealCh?'btn-s':isSel&&(realChamp&&realChamp.length>0)&&!isRealCh?'btn-d':isSel?'btn-p':'btn-o';
        const ptsLabel = (realChamp && realChamp.length>0) ? (isRealCh ? ' ·50p' : (isSel ? ' ·0p' : '')) : '';
        const b=el('button',{class:`btn btn-sm ${cls}`,style:{flex:'1',textAlign:'center',fontSize:'.78rem'},
          onclick:()=>{
            // Toggle: clicou no selecionado → deseleciona; clicou no outro → troca
            if(isSel){
              koPreds['final']=[];
              koPreds['runner_up']=[];
            } else {
              koPreds['final']=[{team,pts:isRealCh?50:0}];
              const vicePick=avail.find(t=>t!==team);
              const realVice=koReal['runner_up']?.team_ids?.[0];
              if(vicePick) koPreds['runner_up']=[{team:vicePick,pts:realVice&&vicePick===realVice?30:0}];
            }
            koDirty=true; buildKoUI(main);
          }
        },(FLAGS[team]||'')+' '+team+(isSel?ptsLabel:''));
        if(matchRow.children.length>0) matchRow.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.7rem',fontWeight:'700',flexShrink:0}},'×'));
        matchRow.appendChild(b);
      });
      card.appendChild(matchRow);
      // Vice automático
      const vicePick=avail.find(t=>t!==champSel);
      if(champSel && vicePick){
        const realVice=koReal['runner_up']?.team_ids?.[0];
        const viceOk=realVice&&vicePick===realVice;
        const viceDiv=el('div',{style:{marginTop:'.5rem',fontSize:'.78rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:'6px'}});
        const vBadge=el('span',{style:{display:'inline-flex',alignItems:'center',gap:'4px',background:viceOk?'rgba(16,185,129,.15)':'rgba(255,255,255,.05)',border:'1px solid '+(viceOk?'#10B981':'var(--bdr)'),borderRadius:'20px',padding:'3px 10px',fontSize:'.78rem'}},(FLAGS[vicePick]||'')+' '+vicePick+(viceOk?' ·30p ✓':''));
        viceDiv.appendChild(el('span',{},'🥈 Vice (auto):'));
        viceDiv.appendChild(vBadge);
        if(realVice&&!viceOk) viceDiv.appendChild(el('span',{style:{color:'var(--err)',fontSize:'.72rem'}},'Real: '+(FLAGS[realVice]||'')+' '+realVice));
        card.appendChild(viceDiv);
      }
      main.appendChild(card);
      return;
    }

    // Fases com bracket (round32, round16, quarter, semi) — mostrar confrontos
    const bracketMap = {round32:ROUND32_BRACKET, round16:ROUND16_BRACKET, quarter:QUARTER_BRACKET, semi:SEMI_BRACKET};
    const bracket = bracketMap[ph.key];

    function pickTeam(team, opponent) {
      if(!koOpen){ showToast('🔒 Prazo encerrado! Eliminatórias bloqueadas.','err'); return; }
      if(!koPreds[ph.key]) koPreds[ph.key]=[];
      const alreadySel = koPreds[ph.key].find(x=>x.team===team);
      const isReal2=rp?.team_ids?.includes(team);
      if(alreadySel){
        // Desselecionou — limpar esta fase e todas as posteriores
        koPreds[ph.key]=koPreds[ph.key].filter(x=>x.team!==team);
        clearPhasesFrom(ph.key==='round32'?'round16':ph.key==='round16'?'quarter':ph.key==='quarter'?'semi':ph.key==='semi'?'final':'third');
      } else {
        // Selecionou novo time — remover adversário e limpar fases posteriores
        if(opponent) koPreds[ph.key]=koPreds[ph.key].filter(x=>x.team!==opponent);
        // Deduplicar antes de adicionar
        if(!koPreds[ph.key].find(x=>x.team===team)){
          koPreds[ph.key].push({team, pts:isReal2?ph.pts:0});
        }
        // Deduplicar por segurança
        const seen=new Set();
        koPreds[ph.key]=koPreds[ph.key].filter(x=>{ if(seen.has(x.team)) return false; seen.add(x.team); return true; });
        // Limpar fases posteriores pois o bracket mudou
        const nextPhase={round32:'round16',round16:'quarter',quarter:'semi',semi:'final',final:'runner_up'};
        if(nextPhase[ph.key]) clearPhasesFrom(nextPhase[ph.key]);
      }
      koDirty=true;
      buildKoUI(main);
    }

    if(bracket) {
      const userSt = koUserGrpStandings||{};
      const userThirds = userThirdsPool||[];
      const userMatchWinners = {};
      const r32picks = (koPreds['round32']||[]).map(x=>x.team);

      // Distribuir os 8 melhores 3ºs pelos 8 slots em ordem (sem duplicatas)
      // 1. Coletar todos os times que aparecem como 1º ou 2º nos palpites
      const userTop2 = new Set();
      Object.entries(userSt).forEach(([g,pos])=>{ if(pos[1]) userTop2.add(pos[1]); if(pos[2]) userTop2.add(pos[2]); });
      // 2. Filtrar userThirds — remover inválidos (são top2 ou não são 3º de nenhum grupo)
      const validThirdsOfGroups = new Set(Object.values(userSt).map(p=>p[3]).filter(Boolean));
      const validUserThirds = userThirds.filter(t=>!userTop2.has(t)&&validThirdsOfGroups.has(t));
      // 3. Completar com reais do banco se necessário (também filtrados)
      const realThirdsForSlots = koRealThirds.filter(t=>!userTop2.has(t)&&!validUserThirds.includes(t));
      const thirdsForSlots = [...validUserThirds, ...realThirdsForSlots].slice(0,8);
      // Distribuir pelos slots corretos baseado no grupo de cada 3º
      const thirdAssignment = buildThirdAssignment(thirdsForSlots, userSt);

      // Montar confrontos garantindo que nenhum time aparece em mais de 1 jogo
      const usedTeams = new Set();
      ROUND32_BRACKET.forEach(m=>{
        const i1=resolveSlotInfo(m.slot1,userSt,thirdsForSlots,thirdAssignment,m.id);
        const i2=resolveSlotInfo(m.slot2,userSt,thirdsForSlots,thirdAssignment,m.id);
        let t1=i1.team||i1.label, t2=i2.team||i2.label;
        // Se t1 já foi usado em outro confronto como time normal (não 3º), manter
        // Se um 3º já foi atribuído a outro slot, substituir por placeholder
        if(m.slot1.type==='3' && t1 && usedTeams.has(t1)) t1=i1.label||('3º J'+m.id);
        if(m.slot2.type==='3' && t2 && usedTeams.has(t2)) t2=i2.label||('3º J'+m.id);
        if(t1 && !t1.startsWith('3º') && !t1.startsWith('Venc.')) usedTeams.add(t1);
        if(t2 && !t2.startsWith('3º') && !t2.startsWith('Venc.')) usedTeams.add(t2);
        const winner=r32picks.find(t=>t===t1||t===t2);
        userMatchWinners[m.id]={winner:winner||null,t1,t2,l1:i1.label,l2:i2.label};
      });
      const r16picks = (koPreds['round16']||[]).map(x=>x.team);
      ROUND16_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||'Venc. J'+m.slot1.matchId;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||'Venc. J'+m.slot2.matchId;
        const winner=r16picks.find(t=>t===t1||t===t2);
        userMatchWinners[m.id]={winner:winner||null,t1,t2};
      });
      const qpicks = (koPreds['quarter']||[]).map(x=>x.team);
      QUARTER_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||'Venc. J'+m.slot1.matchId;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||'Venc. J'+m.slot2.matchId;
        const winner=qpicks.find(t=>t===t1||t===t2);
        userMatchWinners[m.id]={winner:winner||null,t1,t2};
      });
      const spicks = (koPreds['semi']||[]).map(x=>x.team);
      SEMI_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||null;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||null;
        const winner=spicks.find(t=>t===t1||t===t2)||null;
        userMatchWinners[m.id]={winner,t1,t2};
      });
      // _semiWinners: para cada confronto da semi, guardar t1, t2 e winner
      buildKoUI._semiWinners = SEMI_BRACKET.map(m=>userMatchWinners[m.id]);
      // _spicks: os times selecionados na semi (vão pra final)
      buildKoUI._spicks = spicks;

      // Helpers de label (mesmos do admin)
      function pBracketLabel(matchId) {
        if(matchId>=73&&matchId<=88)  return 'VJ'+(matchId-72);
        if(matchId>=89&&matchId<=96)  return 'VO'+(matchId-88);
        if(matchId>=97&&matchId<=100) return 'VQ'+(matchId-96);
        if(matchId>=101&&matchId<=102)return 'VS'+(matchId-100);
        return 'J'+matchId;
      }
      const phPrefix = ph.key==='round32'?'Jogo':ph.key==='round16'?'Oitava':ph.key==='quarter'?'Quarta':ph.key==='semi'?'Semi':'Jogo';

      // Dividir bracket em Lado Esquerdo e Lado Direito
      // R32: J1-8 (idx 0-7) = esq, J9-16 (idx 8-15) = dir
      // R16: O1-4 (idx 0-3) = esq, O5-8 (idx 4-7) = dir
      // Q: Q1-2 (idx 0-1) = esq, Q3-4 (idx 2-3) = dir
      // Semi: S1 (idx 0) = esq, S2 (idx 1) = dir
      const splitIdx = bracket.length >= 8 ? Math.ceil(bracket.length/2) : (bracket.length>=4 ? 2 : (bracket.length>=2?1:0));
      const hasSides = bracket.length >= 2;
      const leftBracket  = bracket.slice(0, splitIdx);
      const rightBracket = bracket.slice(splitIdx);

      function renderMatchRow(m, idx, globalIdx) {
        let t1,t2,l1='',l2='';
        if(ph.key==='round32'){
          const mw = userMatchWinners[m.id];
          t1=mw?.t1||'?'; t2=mw?.t2||'?';
          l1=mw?.l1||''; l2=mw?.l2||'';
        } else {
          t1=userMatchWinners[m.slot1.matchId]?.winner||null;
          t2=userMatchWinners[m.slot2.matchId]?.winner||null;
          l1=pBracketLabel(m.slot1.matchId); l2=pBracketLabel(m.slot2.matchId);
        }
        const sel1=sel.find(x=>x.team===t1);
        const sel2=sel.find(x=>x.team===t2);
        const real1=rp?.team_ids?.includes(t1);
        const real2=rp?.team_ids?.includes(t2);
        const t1Known=t1&&!t1.startsWith('Venc.')&&!t1.startsWith('1º')&&!t1.startsWith('2º')&&!t1.startsWith('3º(')&&t1!=='?'&&t1!==null;
        const t2Known=t2&&!t2.startsWith('Venc.')&&!t2.startsWith('1º')&&!t2.startsWith('2º')&&!t2.startsWith('3º(')&&t2!==null&&t2!=='?';
        // Label do jogo: usar ID do jogo (não índice do array, pois bracket foi reordenado)
        const jogNum = ph.key==='round32' ? (m.id - 72) : (globalIdx + 1);
        const jogNumLabel = bracket.length>1 ? phPrefix+' '+jogNum : phPrefix;
        const jogLabel = el('div',{style:{fontSize:'.65rem',color:'var(--muted)',fontWeight:'600',marginBottom:'3px',letterSpacing:'.3px'}},jogNumLabel);
        const wrap=el('div');
        wrap.appendChild(jogLabel);
        const row=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',background:'var(--dk3)',borderRadius:'10px',padding:'8px 10px'}});
        const rpHasResult = rp?.team_ids?.length > 0;
        const cls1 = sel1&&real1?'btn-s':sel1&&rpHasResult&&!real1?'btn-d':sel1?'btn-p':'btn-o';
        const pts1 = rpHasResult ? (real1 ? ' ·'+ph.pts+'p' : (sel1 ? ' ·0p' : '')) : '';
        const lbl1txt = l1 ? ' ('+l1+')' : '';
        const b1=el('button',{class:`btn btn-sm ${cls1}`,style:{flex:'1',textAlign:'center',fontSize:'.72rem',opacity:t1Known?'1':'0.5'},disabled:!t1Known,onclick:()=>pickTeam(t1||'',t2||'')},(t1Known?(FLAGS[t1]||'')+' '+t1:l1||'?')+lbl1txt+(sel1?pts1:''));
        const vs=el('span',{style:{color:'var(--muted)',fontSize:'.7rem',fontWeight:'700',flexShrink:0}},'×');
        const cls2 = sel2&&real2?'btn-s':sel2&&rpHasResult&&!real2?'btn-d':sel2?'btn-p':'btn-o';
        const pts2 = rpHasResult ? (real2 ? ' ·'+ph.pts+'p' : (sel2 ? ' ·0p' : '')) : '';
        const lbl2txt = l2 ? ' ('+l2+')' : '';
        const b2=el('button',{class:`btn btn-sm ${cls2}`,style:{flex:'1',textAlign:'center',fontSize:'.72rem',opacity:t2Known?'1':'0.5'},disabled:!t2Known,onclick:()=>pickTeam(t2||'',t1||'')},(t2Known?(FLAGS[t2]||'')+' '+t2:l2||'?')+lbl2txt+(sel2?pts2:''));
        row.appendChild(b1); row.appendChild(vs); row.appendChild(b2);
        wrap.appendChild(row);
        return wrap;
      }

      // Renderizar com divisão Esquerdo / Direito
      if(hasSides && rightBracket.length > 0) {
        const sideLabel = (txt) => el('div',{style:{
          fontSize:'.7rem',fontWeight:'700',color:'var(--gold)',letterSpacing:'1px',
          textTransform:'uppercase',marginBottom:'8px',marginTop:'4px',
          paddingBottom:'4px',borderBottom:'1px solid var(--bdr)'
        }},txt);

        const leftWrap  = el('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
        leftWrap.appendChild(sideLabel('◀ Chave A'));
        leftBracket.forEach((m,i) => leftWrap.appendChild(renderMatchRow(m, i, i)));

        const divider = el('div',{style:{
          width:'100%',height:'1px',background:'var(--bdr)',
          margin:'8px 0',position:'relative',display:'flex',alignItems:'center',justifyContent:'center'
        }});
        const divLabel = el('span',{style:{
          background:'var(--dk2)',padding:'2px 10px',fontSize:'.68rem',
          color:'var(--muted)',borderRadius:'999px',border:'1px solid var(--bdr)',
          fontWeight:'600',letterSpacing:'.5px'
        }},'⚔️  CHAVE B  ▶');
        divider.appendChild(divLabel);

        const rightWrap = el('div',{style:{display:'flex',flexDirection:'column',gap:'6px',marginTop:'8px'}});
        rightBracket.forEach((m,i) => rightWrap.appendChild(renderMatchRow(m, i, splitIdx+i)));

        const matchesWrap = el('div');
        matchesWrap.appendChild(leftWrap);
        matchesWrap.appendChild(divider);
        matchesWrap.appendChild(rightWrap);
        card.appendChild(matchesWrap);
      } else {
        // Fase com jogo único (Final) — sem divisão
        const matchesWrap = el('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
        bracket.forEach((m,idx) => matchesWrap.appendChild(renderMatchRow(m, idx, idx)));
        card.appendChild(matchesWrap);
      }
    } else {
      // Fallback: lista de botões (para fases sem bracket mapeado)
      avail.forEach(team=>{
        const isSel=sel.find(x=>x.team===team);
        const isReal=rp?.team_ids?.includes(team);
        const rpHas=rp?.team_ids?.length>0;
        let cls='btn-o';
        if(isSel&&isReal) cls='btn-s';
        else if(isSel&&rpHas&&!isReal) cls='btn-d';
        else if(isSel) cls='btn-p';
        const b=el('button',{class:`btn btn-sm ${cls}`,onclick:()=>pickTeam(team)},
          (FLAGS[team]||'')+' '+team+(isSel&&isReal?' ·'+(ph.pts||10)+'p':''));
        btns.appendChild(b);
      });
      card.appendChild(btns);
    }
    main.appendChild(card);
  });

  // ── Disputa de 3º/4º ──
  const thirdPh = PHASES.find(ph=>ph.key==='third');
  if(thirdPh){
    const semiSel = (koPreds['semi']||[]).map(x=>x.team);
    const semiWinners = buildKoUI._semiWinners||[];
    const thirdPool = [];
    semiWinners.forEach(m=>{
      if(!m) return;
      const {t1, t2, winner} = m;
      if(winner && t1 && t2){
        const loser = winner===t1 ? t2 : t1;
        if(loser && !loser.startsWith('Venc.') && loser!=='?') thirdPool.push(loser);
      }
    });
    const rp3 = koReal['third'];
    const thirdSel = koPreds['third']||[];
    const isFull3 = thirdSel.length>=1;

    const card3=el('div',{class:'card'});
    const tRow=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'.5rem'}});
    tRow.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',fontSize:'1rem'}},'🥉 Disputa de 3º/4º Lugar'));
    tRow.appendChild(el('div',{style:{fontSize:'.75rem',color:isFull3?'var(--ok)':'var(--muted)',fontWeight:'600'}},thirdSel.length+'/1'+(isFull3?' ✓':'')));
    card3.appendChild(tRow);

    if(semiSel.length < 2){
      const msgDiv3=el('div',{style:{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',borderRadius:'8px',padding:'.75rem',fontSize:'.82rem',color:'#FCD34D'}});
      msgDiv3.appendChild(el('span',{},'⚠️ Selecione os 2 semifinalistas primeiro.'));
      card3.appendChild(msgDiv3);
    } else if(thirdPool.length < 2){
      const msgDiv3=el('div',{style:{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',borderRadius:'8px',padding:'.75rem',fontSize:'.82rem',color:'#FCD34D'}});
      msgDiv3.appendChild(el('span',{},'⚠️ Preencha as fases anteriores para resolver os confrontos da semi.'));
      card3.appendChild(msgDiv3);
    } else {
    card3.appendChild(el('div',{style:{fontSize:'.72rem',color:'var(--muted)',marginBottom:'.5rem'}},'Escolha quem ganha o 3º lugar. Acertar = 10pts.'));
    const t3a=thirdPool[0], t3b=thirdPool[1];
    const matchRow3=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',background:'var(--dk3)',borderRadius:'10px',padding:'8px 10px'}});
    [t3a,t3b].forEach(team=>{
      if(!team) return;
      const isSel3=thirdSel.find(x=>x.team===team);
      const isReal3=rp3?.team_ids?.includes(team);
      const cls3=isSel3&&isReal3?'btn-s':isSel3&&(rp3?.team_ids?.length>0)&&!isReal3?'btn-d':isSel3?'btn-p':'btn-o';
      const pts3 = rp3?.team_ids?.length>0 ? (isReal3 ? ' ·15p' : (isSel3 ? ' ·0p' : '')) : '';
      const b3=el('button',{class:`btn btn-sm ${cls3}`,style:{flex:'1',textAlign:'center',fontSize:'.78rem'},
        onclick:()=>{
          if(!koOpen){ showToast('🔒 Prazo encerrado! Eliminatórias bloqueadas.','err'); return; }
          koPreds['third']=isSel3?[]:[{team,pts:isReal3?15:0}];
          koDirty=true; buildKoUI(main);
        }
      },(FLAGS[team]||'')+' '+team+(isSel3?pts3:''));
      if(matchRow3.children.length>0) matchRow3.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.7rem',fontWeight:'700',flexShrink:0}},'×'));
      matchRow3.appendChild(b3);
    });
    card3.appendChild(matchRow3);
    }
    main.appendChild(card3);
  }

  // ── Artilheiro ──
  const scard=el('div',{class:'card',style:{marginBottom:'4rem'}});
  scard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.6rem'}},'⚽ Artilheiro'));
    const SCORER_LIST = SCORER_LIST_DYNAMIC.slice().sort((a,b)=>a.name.localeCompare(b.name,'pt'));

  const si=el('select',{class:'ps'});
  si.appendChild(el('option',{value:''},'— Selecione o artilheiro —'));
  SCORER_LIST.forEach(({name,flag})=>{
    const o=el('option',{value:name},flag+' '+name);
    if(koScorer===name) o.selected=true;
    si.appendChild(o);
  });
  si.onchange=()=>{ koScorer=si.value; koDirty=true; };
  if(!koOpen) si.disabled=true;
  scard.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome do artilheiro da Copa'),si));
  if(koReal['top_scorer']){
    const realScorer=koReal['top_scorer'].team_ids?.[0]||'';
    if(realScorer && realScorer!=='-'){
      const scorerRow=el('div',{style:{fontSize:'.8rem',color:'var(--muted)',marginTop:'.4rem'}});
      scorerRow.appendChild(document.createTextNode('Artilheiro real: '+realScorer));
      if(koScorer){
        const sPts=koScorer.trim().toLowerCase()===realScorer.trim().toLowerCase()?30:0;
        scorerRow.appendChild(el('span',{class:'pp '+(sPts>0?'p10':'p0'),style:{marginLeft:'8px'}},sPts+'pts'));
      }
      scard.appendChild(scorerRow);
    }
  }
  main.appendChild(scard);

  // Save bar — só mostra se ainda está dentro do prazo
  let sb=document.getElementById('savebar-matches')||document.getElementById('savebar-ko');
  if(!sb){ sb=el('div',{class:'sbar',id:'savebar'}); document.body.appendChild(sb); }
  sb.innerHTML='';
  if(!koOpen){ sb.style.display='none'; return; }
  sb.style.display='flex';
  const inn=el('div',{class:'sbar-in'});
  inn.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.82rem'}},koDirty?'Alterações não salvas':''));
  inn.appendChild(el('button',{class:'btn btn-p',onclick:saveKo},'💾 Salvar'));
  sb.appendChild(inn);
}

async function saveKo(){
  try{
    // Buscar resultados reais frescos do banco
    const freshKoReal = await dbQ('real_knockouts',{},'phase,team_ids').catch(()=>[]);
    (freshKoReal||[]).forEach(r=>{ koReal[r.phase]={phase:r.phase,team_ids:r.team_ids}; });

    // Auto-calcular vice
    const champPick = (koPreds['final']||[])[0]?.team;
    const semiPicks = (koPreds['semi']||[]).map(x=>x.team);
    const viceTeam  = semiPicks.find(t=>t!==champPick);
    if(viceTeam){
      const realVice = koReal['runner_up']?.team_ids?.[0];
      koPreds['runner_up']=[{team:viceTeam, pts:realVice&&viceTeam===realVice?30:0}];
    }

    const rows=[];
    Object.entries(koPreds).forEach(([phase,teams])=>{
      const rp=koReal[phase];
      teams.forEach(({team})=>{
        let pts=0;
        if(rp?.team_ids?.includes(team)){
          pts = phase==='final'||phase==='champion' ? 50
              : phase==='runner_up' ? 30
              : phase==='third' ? 15
              : 10;
        }
        rows.push({user_id:STATE.profile.id,phase,team_name:team,points:pts});
      });
    });

    const targetBolaos2=REPLICATE_ALL?MY_BOLAOS:[CURRENT_BOLAO];
    for(const bolao of targetBolaos2){
      if(rows.length>0){
        const tagged=rows.map(r=>({...r,bolao_id:bolao.id}));
        // DELETE fases alteradas antes de inserir — garante que times antigos não persistam
        const phasesToSave=[...new Set(rows.map(r=>r.phase))];
        for(const phase of phasesToSave){
          await SB.from('knockout_predictions')
            .delete()
            .eq('user_id',STATE.profile.id)
            .eq('bolao_id',bolao.id)
            .eq('phase',phase);
        }
        const {error:kErr}=await SB.from('knockout_predictions').insert(tagged);
        if(kErr) console.warn('insert KO falhou:', kErr.message);
      }
      // Scorer: DELETE + INSERT garante que sempre atualiza corretamente
      if(koScorer.trim()){
        const rp=koReal['top_scorer'];
        const pts=rp?.team_ids?.[0]?.trim().toLowerCase()===koScorer.trim().toLowerCase()?30:0;
        // Deletar entrada anterior (se existir) e inserir nova
        await SB.from('scorer_predictions')
          .delete()
          .eq('user_id',STATE.profile.id)
          .eq('bolao_id',bolao.id);
        const {error:sErr}=await SB.from('scorer_predictions')
          .insert({user_id:STATE.profile.id,player_name:koScorer.trim(),points:pts,bolao_id:bolao.id});
        if(sErr) console.warn('scorer insert falhou:', sErr.message);
      }
    }
    koDirty=false;
    showToast('✅ Palpites salvos e pontos calculados!'+(REPLICATE_ALL&&MY_BOLAOS.length>1?' (em todos os bolões)':''));
    const sb=document.getElementById('savebar-ko')||document.getElementById('savebar-matches'); if(sb) sb.innerHTML='';
    buildKoUI(document.querySelector('.main')||document.body);
  }catch(e){ showToast(e.message,'err'); }
}
