function canBet(matchNum) {
  const dateStr = MATCH_DATES[matchNum];
  if(!dateStr) return true;
  const today = new Date();
  today.setHours(0,0,0,0);
  const matchDay = new Date(dateStr + 'T00:00:00');
  return today < matchDay; // só pode apostar ANTES do dia do jogo
}

  const dateStr = KNOCKOUT_DATES[phase];
  if(!dateStr) return true;
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return today < d;
}

  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.ceil((d - today) / 86400000);
}

async function dbQ(table, filters={}, cols='*'){
  const version = PAGE_VERSION;
  const timeout = new Promise((_,reject) => setTimeout(()=>reject(new Error('timeout')), 8000));
  let q = SB.from(table).select(cols);
  Object.entries(filters).forEach(([k,v])=>{ q=q.eq(k,v); });
  const {data,error} = await Promise.race([q, timeout]);
  if(PAGE_VERSION !== version) return []; // page changed, discard result
  if(error) throw error;
  return data||[];
}

async function dbQBolao(table, extraFilters={}, cols='*'){
  if(!CURRENT_BOLAO) return [];
  return dbQ(table, {bolao_id:CURRENT_BOLAO.id, ...extraFilters}, cols);

  if(!CURRENT_BOLAO) return;
  const targetBolaos = REPLICATE_ALL ? MY_BOLAOS : [CURRENT_BOLAO];
  for(const bolao of targetBolaos){
    const tagged = rows.map(r=>({...r, bolao_id:bolao.id}));
    const {error} = await SB.from(table).upsert(tagged);
    if(error) console.error(table, error);
  }
}
async function dbUpsert(table, rows){
  const {error} = await SB.from(table).upsert(Array.isArray(rows)?rows:[rows]);
  if(error) throw error;
}
async function dbDelete(table, filters={}){
  let q = SB.from(table).delete();
  Object.entries(filters).forEach(([k,v])=>{ q=q.eq(k,v); });
  const {error} = await q;
  if(error) throw error;
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function init(){
  const {data:{session}} = await SB.auth.getSession();
  if(session?.user) await loadProfile(session.user);
  else {
    // Check URL for invite code
    const urlCode = new URLSearchParams(window.location.search).get('code');
    if(urlCode) localStorage.setItem('pending_invite',urlCode.toUpperCase());
    setState({loading:false});
  }
  SB.auth.onAuthStateChange(async(_,sess)=>{
    if(sess?.user) await loadProfile(sess.user);
    else setState({user:null,profile:null,loading:false});
  });
}

async function loadProfile(u){
  STATE.user=u;
  const [pp,all] = await Promise.all([dbQ('profiles',{id:u.id}), dbQ('profiles',{},'id,display_name,is_admin')]);
  STATE.profile = pp[0]||null;
  STATE.profiles = all||[];
  await loadMyBolaos(u.id);
  // Check pending invite from URL
  const pendingCode = localStorage.getItem('pending_invite');
  if(pendingCode) {
    localStorage.removeItem('pending_invite');
    try {
      const groups = await dbQ('bolao_groups',{invite_code:pendingCode});
      if(groups&&groups.length>0){
        const group=groups[0];
        const existing=await dbQ('bolao_members',{bolao_id:group.id,user_id:u.id});
        if(!existing||existing.length===0){
          await SB.from('bolao_members').insert({bolao_id:group.id,user_id:u.id,replicate_preds:true});
          await loadMyBolaos(u.id);
          CURRENT_BOLAO=MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
          showToast('✅ Entrou automaticamente no bolão "'+group.name+'"!');
        }
      }
    } catch(e){ console.warn('Pending invite error:',e); }
  }
  if(MY_BOLAOS.length>0 && !CURRENT_BOLAO) CURRENT_BOLAO=MY_BOLAOS[0];
  setState({user:u, loading:false, page: MY_BOLAOS.length===0?'bolaos':'dashboard'});
}

async function loadMyBolaos(uid){
  try {
    const members = await dbQ('bolao_members',{user_id:uid},'bolao_id,replicate_preds');
    if(!members||members.length===0){ MY_BOLAOS=[]; CURRENT_BOLAO=null; return; }
    const ids = members.map(m=>m.bolao_id);
    const groups = await dbQ('bolao_groups',{},'id,name,invite_code,created_by,description');
    MY_BOLAOS = groups.filter(g=>ids.includes(g.id)).map(g=>({
      ...g, replicate: members.find(m=>m.bolao_id===g.id)?.replicate_preds??true
    }));
    if(!CURRENT_BOLAO && MY_BOLAOS.length>0) CURRENT_BOLAO = MY_BOLAOS[0];
  } catch(e){ MY_BOLAOS=[]; CURRENT_BOLAO=null; }
}

async function signIn(email,pw){
  const {error} = await SB.auth.signInWithPassword({email,password:pw});
  if(error) throw error;
}
async function signUp(email,pw,username,displayName){
  const {data,error} = await SB.auth.signUp({email,password:pw});
  if(error) throw error;
  if(data.user){
    await dbUpsert('profiles',{id:data.user.id,username:username.toLowerCase().replace(/\s/g,'_'),display_name:displayName||username});
  }
  return data;
}
async function logout(){
  await SB.auth.signOut();
  setState({user:null,profile:null,page:'dashboard'});
}

// ── Render engine ──────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e[k]=v;
    else if(k==='style') Object.assign(e.style,v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML='';
  if(STATE.loading){ app.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'}))); return; }
  if(!STATE.user||!STATE.profile){ app.appendChild(renderAuth()); return; }
  app.appendChild(renderApp());
}

// ── Auth Screen ────────────────────────────────────────────────────────────
function renderAuth(){
  let mode='login', err='', ok='', busy=false;
  const wrap = el('div',{class:'auth-wrap'});
  const box = el('div',{class:'auth-box'});
  wrap.appendChild(box);

  function rebuild(){
    box.innerHTML='';
    box.appendChild(el('div',{class:'auth-logo'},'⚽ BOLÃO'));
    box.appendChild(el('div',{class:'auth-sub'},'Copa do Mundo 2026 — EUA / Canadá / México 🏆'));
    const card = el('div',{class:'card'});
    if(err) card.appendChild(el('div',{class:'err-box'},err));
    if(ok) card.appendChild(el('div',{class:'ok-box'},ok));

    const emailI = el('input',{class:'fi',type:'email',placeholder:'seu@email.com'});
    card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Email'),emailI));

    let usernameI, nameI;
    if(mode==='register'){
      usernameI = el('input',{class:'fi',placeholder:'apelido_no_bolao'});
      nameI = el('input',{class:'fi',placeholder:'Como quer aparecer no ranking'});
      card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome de usuário'),usernameI));
      card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome de exibição'),nameI));
    }

    const pwI = el('input',{class:'fi',type:'password',placeholder:'••••••••'});
    card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Senha'),pwI));

    const btn = el('button',{class:'btn btn-p btn-full', onclick: async()=>{
      err=''; ok=''; busy=true; rebuild();
      try{
        if(mode==='login'){
          await signIn(emailI.value, pwI.value);
        } else {
          const d = await signUp(emailI.value, pwI.value, usernameI.value, nameI.value);
          if(!d.session) { ok='Conta criada! Faça login.'; mode='login'; }
        }
      }catch(e){ err=e.message; }
      busy=false; rebuild();
    }}, busy?'Aguarde...':(mode==='login'?'Entrar':'Criar Conta'));
    card.appendChild(btn);

    const toggle = el('div',{class:'auth-toggle'});
    const tb = el('button',{onclick:()=>{mode=mode==='login'?'register':'login';err='';ok='';rebuild();}},
      mode==='login'?'Cadastrar':'Entrar');
    toggle.appendChild(document.createTextNode(mode==='login'?'Não tem conta? ':'Já tem conta? '));
    toggle.appendChild(tb);
    card.appendChild(toggle);
    box.appendChild(card);
  }
  rebuild();
  return wrap;
}

// ── Main App Shell ─────────────────────────────────────────────────────────
function renderApp(){

  // Toast
  if(STATE.toast){

  hdr.appendChild(hdrIn);
  wrap.appendChild(hdr);

  // Nav
  const nav = el('div',{class:'nav'});
  const navIn = el('div',{class:'nav-in'});
  const navItems = [
    {key:'bolaos',label:'🎯 Meus Bolões'},
    {key:'dashboard',label:'🏆 Ranking'},
    {key:'matches',label:'⚽ 1ª Fase'},
    {key:'standings',label:'📊 Grupos'},
    {key:'knockout',label:'🔥 Eliminat.'},
    {key:'mine',label:'📋 Meus Pts'},
    ...(STATE.profile.is_admin?[{key:'admin',label:'🔧 Admin'}]:[]),
  ];
  navItems.forEach(n=>{
    const isAct = STATE.page===n.key;
    const btn = el('button',{class:`nb${isAct?' act':''}`,onclick:()=>setState({page:n.key})},n.label);
    navIn.appendChild(btn);
    if(isAct) {
      // Scroll active item into center after render
      setTimeout(()=>{
        const nav = navIn.parentElement;
        if(nav) {
          const btnLeft = btn.offsetLeft;
          const btnWidth = btn.offsetWidth;
          const navWidth = nav.offsetWidth;
          nav.scrollLeft = btnLeft - (navWidth/2) + (btnWidth/2);
        }
      }, 50);
    }
  });

  wrap.appendChild(nav);

  else if(page==='mine') renderMine(main);

  wrap.appendChild(main);
  return wrap;
}


function renderGroupSelector(main, onSelect) {
  if(MY_BOLAOS.length === 0) {

      '⚠️ Você não está em nenhum bolão ainda. Vá em 🎯 Meus Bolões para criar ou entrar em um.');
    main.appendChild(warn);
    return false;
  }
  if(MY_BOLAOS.length === 1 && CURRENT_BOLAO) return true; // só 1 bolão, sem seletor

  const bar = el('div',{class:'group-selector'});
  bar.appendChild(el('span',{style:{fontSize:'.78rem',color:'var(--muted)',fontWeight:'600'}},'BOLÃO:'));

      class:'group-pill'+(isAct?' active':''),

function renderReplicateBar(main, onToggle) {
  if(MY_BOLAOS.length <= 1) return;
  const member = MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO?.id);
  const checked = member?.replicate ?? true;
  const bar = el('div',{class:'replicate-bar'});
  const cb = el('input',{type:'checkbox'}); cb.checked = checked;
  cb.onchange = async () => {
    REPLICATE_ALL = cb.checked;
    // Save preference
    await SB.from('bolao_members').upsert({bolao_id:CURRENT_BOLAO.id, user_id:STATE.profile.id, replicate_preds:cb.checked});
    if(MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO.id)) MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO.id).replicate=cb.checked;
    if(onToggle) onToggle(cb.checked);
  };
  const lbl = el('label',{},cb, '✨ Replicar meus palpites para todos os meus bolões');
  bar.appendChild(lbl);
  if(!checked) bar.appendChild(el('span',{style:{color:'var(--gold)',fontSize:'.75rem',marginLeft:'auto'}},'Palpitando só em: '+CURRENT_BOLAO?.name));
  main.appendChild(bar);
}

    const code = codeI.value.trim().toUpperCase();
    if(code.length!==6){ showToast('O código tem 6 caracteres','err'); return; }
    joinBtn.disabled=true; joinBtn.textContent='Buscando...';
    try {
      const groups = await dbQ('bolao_groups',{invite_code:code});
      if(!groups||groups.length===0) throw new Error('Código não encontrado. Verifique e tente novamente.');
      const group = groups[0];
      const existing = await dbQ('bolao_members',{bolao_id:group.id,user_id:STATE.profile.id});

function makeMatchCtrl(initVal, onChange) {
  let val = initVal===null||initVal===undefined ? null : initVal;
  const wrap = el('div',{style:{display:'flex',alignItems:'center',gap:'2px'}});
  const mn = el('button',{class:'score-btn'},'-');
  const dsp = el('span',{class:'score-val',style:{color:val===null?'var(--muted)':'var(--txt)'}},val===null?'—':''+val);
  const pl = el('button',{class:'score-btn'},'+');
  mn.onclick=()=>{ 
    if(val===null){val=0;}
    else if(val>0){val--;}
    dsp.textContent=val; dsp.style.color='var(--txt)';
    onChange(val); matchDirty=true; updateSaveBar(); 
  };
  pl.onclick=()=>{ 
    if(val===null){val=0;}
    else if(val<9){val++;}
    dsp.textContent=val; dsp.style.color='var(--txt)';
    onChange(val); matchDirty=true; updateSaveBar();

let koPreds={}, koReal={}, koScorer='', koDirty=false;
// Get teams available for a phase based on previous phase selections
function getAvailableTeams(phase, currentPreds, realStandings) {
  const prevPhase = {quarter:'round16', semi:'quarter', final:'semi', champion:'final', third:'semi'};

  if(phase === 'round16') {
    const classified = [];
    if(realStandings && Object.keys(realStandings).length >= 12) {
      Object.entries(realStandings).forEach(([g, pos]) => {
        if(pos[1]) classified.push(pos[1]);
        if(pos[2]) classified.push(pos[2]);
      });
    }
    return classified.length === 24 ? classified : ALL_TEAMS;
  }

  const prev = prevPhase[phase];
  if(prev && currentPreds[prev] && currentPreds[prev].length > 0) {
    return currentPreds[prev].map(x=>x.team);
  }
  return ALL_TEAMS;
}

    w.appendChild(el('button',{class:'btn btn-p',onclick:()=>setState({page:'bolaos'})},'Ir para Meus Bolões'));
    main.appendChild(w); return;

    dbQ('real_knockouts',{},'phase,team_ids'),
    dbQ('scorer_predictions',{user_id:STATE.profile.id},'player_name,points'),
  ]).then(([kp,rk,sp])=>{

    main.appendChild(el('div',{class:'ch'},'🔥 Fases Eliminatórias'));

    koPreds={};
    (kp||[]).forEach(p=>{ if(!koPreds[p.phase])koPreds[p.phase]=[]; koPreds[p.phase].push({team:p.team_name,pts:p.points}); });
    koReal={};

function buildKoUI(main){
  main.innerHTML='';
  main.appendChild(el('p',{style:{color:'var(--muted)',fontSize:'.82rem',marginBottom:'1.25rem'}},'Selecione as seleções classificadas. Acertar = 10pts (Campeão = 20pts)'));
  const koBanner=el('div',{style:{background:'rgba(255,215,0,.08)',border:'1px solid rgba(255,215,0,.3)',borderRadius:'8px',padding:'.75rem',marginBottom:'1rem',fontSize:'.82rem'}});
  koBanner.appendChild(el('span',{style:{color:'var(--gold)',fontWeight:'600'}},'ℹ️ Prazo: '));
  koBanner.appendChild(document.createTextNode('Palpites das eliminatórias se encerram no dia da fase. Botões bloqueados = prazo encerrado.'));
  main.appendChild(koBanner);

  PHASES.forEach(ph=>{
    const sel=koPreds[ph.key]||[];
    const rp=koReal[ph.key];
    const card=el('div',{class:'card'});
    card.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.6rem'}},
      ph.label+' ('+sel.length+'/'+ph.count+')'));
    const availTeams2 = getAvailableTeams(ph.key, koPreds, grpReal);
    const btns=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
    availTeams2.forEach(team=>{
      const isSel=sel.find(x=>x.team===team);
      const isReal=rp?.team_ids?.includes(team);
      let cls='btn-o';
      if(isSel && isReal) cls='btn-s';  // green = selected & correct
      else if(isSel && !isReal && isReal!==undefined) cls='btn-d'; // red = selected & wrong
      else if(isSel) cls='btn-p'; // gold = selected, no result yet
      const b=el('button',{class:`btn btn-sm ${cls}`,onclick:()=>{
        if(!koPreds[ph.key])koPreds[ph.key]=[];
        const idx=koPreds[ph.key].findIndex(x=>x.team===team);
        if(idx>=0) koPreds[ph.key].splice(idx,1);
        else if(koPreds[ph.key].length<ph.count) {
          const predPts = rp?.team_ids?.includes(team) ? (ph.pts||10) : 0;
          koPreds[ph.key].push({team, pts:predPts});
        }
        koDirty=true; 
        // Cascade: clear invalid selections in subsequent phases
        const nextPhases = {round16:['quarter','semi','final','champion','runner_up','third'], quarter:['semi','final','champion','runner_up','third'], semi:['final','champion','runner_up','third'], final:['champion','runner_up']};
        if(nextPhases[ph.key]) {
          nextPhases[ph.key].forEach(np => {
            const avail = getAvailableTeams(np, koPreds, grpReal);
            if(koPreds[np]) koPreds[np] = koPreds[np].filter(x=>avail.includes(x.team));
          });
        }
        buildKoUI(main);
      }},(FLAGS[team]||'')+' '+team+(isSel&&isReal?' ·'+(ph.pts||10)+'p':''));
      btns.appendChild(b);
    });
    card.appendChild(btns);
    main.appendChild(card);
  });

  // Scorer
  const scard=el('div',{class:'card',style:{marginBottom:'4rem'}});
  scard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.6rem'}},'⚽ Palpite de Artilheiro'));
  const si=el('input',{class:'fi',placeholder:'Ex: Mbappé, Vinicius Jr...',value:koScorer});
  si.oninput=()=>{ koScorer=si.value; koDirty=true; };
  scard.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome do artilheiro da Copa'),si));
  if(koReal['top_scorer']) {
    const realScorer = koReal['top_scorer'].team_ids?.[0]||'-';
    const scorerRow = el('div',{style:{fontSize:'.8rem',color:'var(--muted)',marginTop:'.4rem'}});
    scorerRow.appendChild(document.createTextNode('Artilheiro real: '+realScorer));
    if(koScorer) {
      const scorerPts = koScorer.trim().toLowerCase()===realScorer.trim().toLowerCase()?10:0;
      const sCls = scorerPts>0?'pp p10':'pp p0';
      scorerRow.appendChild(el('span',{class:sCls,style:{marginLeft:'8px'}},scorerPts+'pts'));
    }
    scard.appendChild(scorerRow);
  }
  main.appendChild(scard);

  // Auto runner_up info card
  const finalPicks2 = (koPreds['final']||[]).map(x=>x.team);
  const champPick2 = (koPreds['champion']||[])[0]?.team;
  const vicePick2 = finalPicks2.find(t=>t!==champPick2);
  const realVice2 = koReal['runner_up']?.team_ids?.[0];
  if(vicePick2 || realVice2) {
    const vCard = el('div',{class:'card'});
    vCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.5rem'}},'🥈 Vice-Campeão (auto)'));
    const vRow = el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}});
    if(vicePick2) {
      const isCorrect = realVice2 && vicePick2===realVice2;
      const vBtn = el('div',{style:{padding:'6px 12px',borderRadius:'20px',fontSize:'.8rem',background:isCorrect?'rgba(16,185,129,.2)':realVice2?'rgba(239,68,68,.15)':'rgba(255,215,0,.1)',border:'1px solid '+(isCorrect?'#10B981':realVice2?'#EF4444':'rgba(255,215,0,.3)')}});
      vBtn.appendChild(document.createTextNode((FLAGS[vicePick2]||'')+' '+vicePick2));
      if(isCorrect) vBtn.appendChild(el('span',{style:{marginLeft:'6px',color:'#6EE7B7',fontWeight:'700'}},'·10p ✓'));
      vRow.appendChild(vBtn);
    }
    if(realVice2 && !vicePick2) {
      vRow.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.8rem'}},'Selecione os 2 finalistas para definir o vice automaticamente'));
    }
    if(realVice2) {
      vRow.appendChild(el('span',{style:{fontSize:'.75rem',color:'var(--muted)'}},'Real: '+(FLAGS[realVice2]||'')+' '+realVice2));
    }
    vCard.appendChild(vRow);
    main.appendChild(vCard);
  }

  // Save bar
  let sb=document.getElementById('savebar');
  if(!sb){ sb=el('div',{class:'sbar',id:'savebar'}); document.body.appendChild(sb); }
  sb.innerHTML=''; sb.style.display='flex';
  const inn=el('div',{class:'sbar-in'});
  inn.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.82rem'}},koDirty?'Alterações não salvas':''));
  inn.appendChild(el('button',{class:'btn btn-p',onclick:saveKo},'💾 Salvar'));
  sb.appendChild(inn);
}
async function saveKo(){
  try{
    // Auto-calculate runner_up from final picks
    const finalPicks = (koPreds['final']||[]).map(x=>x.team);
    const champPick = (koPreds['champion']||[])[0]?.team;
    const viceTeam = finalPicks.find(t=>t!==champPick);
    if(viceTeam) {
      const realVice = koReal['runner_up']?.team_ids?.[0];
      const vicePts = realVice && viceTeam===realVice ? 10 : 0;
      koPreds['runner_up'] = [{team:viceTeam, pts:vicePts}];
    }
    const rows=[];
    Object.entries(koPreds).forEach(([phase,teams])=>{
      const rp=koReal[phase];
      teams.forEach(({team})=>{
        let pts=0;
        if(rp?.team_ids?.includes(team)) pts=phase==='champion'?20:10;
        rows.push({user_id:STATE.profile.id,phase,team_name:team,points:pts});
      });
    });
    const targetBolaos2 = REPLICATE_ALL ? MY_BOLAOS : [CURRENT_BOLAO];
    for(const bolao of targetBolaos2){
      await SB.from('knockout_predictions').delete().eq('user_id',STATE.profile.id).eq('bolao_id',bolao.id);
      if(rows.length>0) await SB.from('knockout_predictions').insert(rows.map(r=>({...r,bolao_id:bolao.id})));
      if(koScorer.trim()){
        const rp=koReal['top_scorer'];
        const pts=rp?.team_ids?.[0]?.toLowerCase()===koScorer.toLowerCase()?10:0;
        await SB.from('scorer_predictions').upsert({user_id:STATE.profile.id,player_name:koScorer,points:pts,bolao_id:bolao.id});
      }
    }
    koDirty=false; showToast('✅ Palpites salvos!'+(REPLICATE_ALL&&MY_BOLAOS.length>1?' (em todos os bolões)':''));
    const sb=document.getElementById('savebar'); if(sb) sb.innerHTML='';
  }catch(e){ showToast(e.message,'err'); }
}

        const b=el('button',{class:'btn btn-sm '+(isR?'btn-s':'btn-o'),onclick:async()=>{
          const curr=(adminKo[ph.key]?.team_ids||[]);
          const next=curr.includes(team)?curr.filter(t=>t!==team):[...curr,team];
          try{
            await dbUpsert('real_knockouts',{phase:ph.key,team_ids:next});
            const preds=await dbQ('knockout_predictions',{phase:ph.key});
            if(preds.length>0) await dbUpsert('knockout_predictions',preds.map(p=>({...p,points:next.includes(p.team_name)?(ph.key==='champion'?20:10):0})));
            if(!adminKo[ph.key])adminKo[ph.key]={phase:ph.key,team_ids:[]};
            adminKo[ph.key].team_ids=next;
            showToast('✅ Atualizado!'); buildAdminUI(main);
          }catch(e){ showToast(e.message,'err'); }
        }},`${FLAGS[team]||''} ${team}`);
        btns.appendChild(b);
      });
      card.appendChild(btns); main.appendChild(card);
    });
  }

  if(adminTab==='scorer'){
    const card=el('div',{class:'card'});
    card.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.6rem'}},'⚽ Definir Artilheiro Real'));
    const inp=el('input',{class:'fi',placeholder:'Nome do artilheiro',value:adminKo['top_scorer']?.team_ids?.[0]||''});
    const savB=el('button',{class:'btn btn-s',style:{marginTop:'8px'},onclick:async()=>{
      try{
        const name=inp.value.trim(); if(!name) return;
        await dbUpsert('real_knockouts',{phase:'top_scorer',team_ids:[name]});
        const preds=await dbQ('scorer_predictions');
        if(preds.length>0) await dbUpsert('scorer_predictions',preds.map(p=>({...p,points:p.player_name?.toLowerCase()===name.toLowerCase()?10:0})));
        showToast('✅ Artilheiro salvo!');
      }catch(e){ showToast(e.message,'err'); }
    }},'Salvar');
    card.appendChild(inp); card.appendChild(savB); main.appendChild(card);
  }
}


// ── Test Page ──────────────────────────────────────────────────────────────
const TEST_USERS_DATA = [
  {email:'teste.drada@bolao.test',pw:'Teste@1234',name:'Drada',username:'drada'},
  {email:'teste.buraco@bolao.test',pw:'Teste@1234',name:'Buraco',username:'buraco'},
  {email:'teste.barata@bolao.test',pw:'Teste@1234',name:'Barata',username:'barata'},
  {email:'teste.cleber@bolao.test',pw:'Teste@1234',name:'Cleber',username:'cleber'},
  {email:'teste.ronzo@bolao.test',pw:'Teste@1234',name:'Ronzo',username:'ronzo'},
];

// Resultados reais simulados fixos para validação
const REAL_SCORES_TEST = {};
MATCHES.forEach(m => {
  const s = [0,1,2,3]; 
  REAL_SCORES_TEST[m.num] = {s1:s[Math.floor(m.num*7%4)], s2:s[Math.floor(m.num*3%4)]};
});
const REAL_STANDINGS_TEST = {};
Object.entries(GROUPS).forEach(([g,teams],gi) => {
  REAL_STANDINGS_TEST[g] = {1:teams[gi%4],2:teams[(gi+1)%4],3:teams[(gi+2)%4],4:teams[(gi+3)%4]};
});
const allT = ALL_TEAMS;
const REAL_KO_TEST = {
  round16: allT.slice(0,16), quarter: allT.slice(0,8),
  semi: allT.slice(0,4), final: allT.slice(0,2),
  champion:[allT[0]], runner_up:[allT[1]], third:[allT[2]]
};
const REAL_SCORER_TEST = 'Mbappé';

let testLog = [];
let testRunning = false;
let testUserIds = [];
let testDone = false;

function renderTestPage(main) {
  try {
    main.innerHTML='';
    main.appendChild(el('div',{class:'ch'},'🧪 Página de Teste — Somente Admin'));

  // Warning banner
  const warn = el('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid #EF4444',borderRadius:'8px',padding:'.875rem',marginBottom:'1rem',fontSize:'.82rem',lineHeight:'1.6'}});
  warn.appendChild(el('strong',{style:{color:'#FCA5A5'}},'⚠️ Atenção: '));
  warn.appendChild(document.createTextNode('Esta página cria 5 usuários de teste, insere palpites aleatórios e resultados simulados para validar as pontuações. Ao final, use "Limpar Tudo" para remover os dados de teste.'));
  main.appendChild(warn);

  // Buttons
  const btnRow = el('div',{style:{display:'flex',gap:'8px',marginBottom:'1rem',flexWrap:'wrap'}});
  const btnRun = el('button',{class:'btn btn-p',style:{flex:'1'},onclick:()=>runTest(main)}, testRunning?'⏳ Executando...':'▶ Executar Teste Completo');
  const btnClean = el('button',{class:'btn btn-d',style:{flex:'1'},onclick:()=>cleanupTest(main)}, '🗑 Limpar Tudo');
  const btnRefresh = el('button',{class:'btn btn-o',style:{flex:'1'},onclick:()=>renderTestPage(main)}, '↻ Atualizar');
  if(testRunning) btnRun.disabled = true;
  btnRow.appendChild(btnRun);
  btnRow.appendChild(btnClean);
  btnRow.appendChild(btnRefresh);
  main.appendChild(btnRow);

  // Log
  const logCard = el('div',{class:'card',style:{marginBottom:'1rem'}});
  logCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.5rem',fontSize:'1rem'}},'📋 Log de Execução'));
  const logBox = el('div',{id:'testlog',style:{background:'var(--dk3)',borderRadius:'8px',padding:'.875rem',height:'240px',overflowY:'auto',fontFamily:'monospace',fontSize:'.72rem',lineHeight:'1.7'}});
  if(testLog.length===0) logBox.appendChild(el('span',{style:{color:'var(--muted)'}},'Aguardando execução...'));
  else logBox.innerHTML = testLog.join('<br>');
  logCard.appendChild(logBox);
  main.appendChild(logCard);

  // Validation results table
  if(testDone && window._testResults) {
    const allOk = window._testResults.every(r=>r.ok);
    const resCard = el('div',{class:'card'});
    resCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:allOk?'var(--ok)':'var(--err)',marginBottom:'.75rem',fontSize:'1.1rem'}},
      allOk?'✅ TODOS OS TESTES PASSARAM!':'❌ ATENÇÃO: FALHAS ENCONTRADAS'));

    const tbl = el('table',{class:'rkt'});
    const thead = el('thead');
    thead.appendChild(el('tr',{},
      ...['Usuário','Jogos','Grupos','Fases','Art.','Total','Status'].map(h=>el('th',{},h))
    ));
    tbl.appendChild(thead);
    const tbody = el('tbody');
    window._testResults.forEach(r => {
      const tr = el('tr');
      const cols = [
        {v:r.name, ok:true},
        {v:`${r.expM}/${r.actM}`, ok:r.expM===r.actM},
        {v:`${r.expG}/${r.actG}`, ok:r.expG===r.actG},
        {v:`${r.expK}/${r.actK}`, ok:r.expK===r.actK},
        {v:`${r.expS}/${r.actS}`, ok:r.expS===r.actS},
        {v:`${r.expT}/${r.actT}`, ok:r.expT===r.actT},
        {v:r.ok?'✅ OK':'❌ FALHOU', ok:r.ok},
      ];
      cols.forEach(col => {
        const td = el('td',{style:{color:col.ok?'inherit':'var(--err)',fontWeight:col.ok?'':'700'}},col.v+'');
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);

    const wrap = el('div',{style:{overflowX:'auto'}});
    wrap.appendChild(tbl);
    resCard.appendChild(wrap);
    resCard.appendChild(el('p',{style:{marginTop:'.75rem',fontSize:'.75rem',color:'var(--muted)'}},'Esp = Esperado (calculado localmente) · Obt = Obtido (banco de dados)'));
    main.appendChild(resCard);
  }
  } catch(e) {
    const errDiv = el('div',{style:{color:'var(--err)',padding:'1rem',background:'rgba(239,68,68,.1)',borderRadius:'8px',marginTop:'1rem'}});
    errDiv.appendChild(document.createTextNode('Erro ao carregar: '+e.message));
    main.appendChild(errDiv);
    console.error('renderTestPage:',e);
  }
}

function tlog(msg, type='') {
  const colors = {ok:'#10B981',err:'#EF4444',warn:'#FFD700',info:'#93C5FD',bold:'#E2E8F0'};
  const color = colors[type]||'#E2E8F0';
  testLog.push(`<span style="color:${color}">${msg}</span>`);
  const box = document.getElementById('testlog');
  if(box){ box.innerHTML = testLog.join('<br>'); box.scrollTop = box.scrollHeight; }
}

async function runTest(main) {
  if(testRunning) return;
  testRunning = true; testDone = false; testLog = []; testUserIds = []; window._testResults = null;
  renderTestPage(main);

  tlog('═══════════════════════════════════════', 'info');
  tlog('🧪 INICIANDO TESTE COMPLETO', 'bold');
  tlog('═══════════════════════════════════════', 'info');

  // Guardar sessão admin
  const {data:{session:adminSess}} = await SB.auth.getSession();
  
  // Criar bolão de teste se não existir
  tlog('\n🎯 Criando bolão de teste...', 'bold');
  let testBolao = null;
  try {
    const existing = await dbQ('bolao_groups',{invite_code:'TESTE1'});
    if(existing && existing.length>0) {
      testBolao = existing[0];
      tlog('  ℹ️ Bolão de teste já existe: '+testBolao.name, 'info');
    } else {
      const {data:bg, error:be} = await SB.from('bolao_groups').insert({
        name:'Bolão Teste Automático', invite_code:'TESTE1', created_by:STATE.profile.id
      }).select().single();
      if(be) throw be;
      await SB.from('bolao_members').insert({bolao_id:bg.id, user_id:STATE.profile.id, replicate_preds:true});
      testBolao = bg;
      tlog('  ✅ Bolão de teste criado', 'ok');
    }
    // Set as current bolão
    await loadMyBolaos(STATE.profile.id);
    CURRENT_BOLAO = MY_BOLAOS.find(b=>b.id===testBolao.id)||MY_BOLAOS[0];
  } catch(e) {
    tlog('  ❌ Erro ao criar bolão: '+e.message, 'err');
  }

  // STEP 1: Criar usuários
  tlog('\n📋 PASSO 1: Criando usuários de teste...', 'bold');
  const signedUsers = [];
  for(const u of TEST_USERS_DATA) {
    try {
      // Tenta signup
      await SB.auth.signUp({email:u.email, password:u.pw});
      // Sign in
      const {data, error} = await SB.auth.signInWithPassword({email:u.email, password:u.pw});
      if(error) throw error;
      const uid = data.user.id;
      const token = data.session.access_token;
      // Create profile
      await SB.from('profiles').upsert({id:uid, username:u.username, display_name:u.name});
      // Join test bolão
      if(testBolao) {
        await SB.from('bolao_members').upsert({bolao_id:testBolao.id, user_id:uid, replicate_preds:true});
      }
      signedUsers.push({...u, id:uid, token});
      testUserIds.push(uid);
      tlog(`  ✅ ${u.name} pronto`, 'ok');
    } catch(e) {
      tlog(`  ❌ ${u.name}: ${e.message}`, 'err');
    }
  }
  tlog(`  → ${signedUsers.length}/5 usuários prontos`, 'info');

  // Restaurar sessão admin
  if(adminSess) await SB.auth.setSession(adminSess);

  // STEP 2: Palpites de jogos
  tlog('\n⚽ PASSO 2: Palpites dos jogos...', 'bold');
  const userPreds = {};
  for(const u of signedUsers) {
    userPreds[u.id] = {matches:{}, groups:{}, knockout:{}, scorer:''};
    const rows = [];
    MATCHES.forEach(m => {
      const s1=Math.floor((u.name.length*m.num*3)%5), s2=Math.floor((u.name.length*m.num*7)%5);
      rows.push({user_id:u.id, match_number:m.num, predicted_score1:s1, predicted_score2:s2, points:0, bolao_id:testBolao?.id});
      userPreds[u.id].matches[m.num]={s1,s2};
    });
    const {error} = await SB.from('match_predictions').upsert(rows);
    if(error) tlog(`  ❌ ${u.name}: ${error.message}`, 'err');
    else tlog(`  ✅ ${u.name}: 72 jogos`, 'ok');
  }

  // STEP 3: Palpites de grupos
  tlog('\n📊 PASSO 3: Palpites de grupos...', 'bold');
  for(const u of signedUsers) {
    const rows = [];
    Object.entries(GROUPS).forEach(([g,teams],gi) => {
      const offset = signedUsers.indexOf(u);
      [1,2,3,4].forEach((pos,i) => {
        const team = teams[(i+offset)%4];
        rows.push({user_id:u.id, group_id:g, position:pos, team_name:team, points:0, bolao_id:testBolao?.id});
        if(!userPreds[u.id].groups[g]) userPreds[u.id].groups[g]={};
        userPreds[u.id].groups[g][pos]=team;
      });
    });
    const {error} = await SB.from('group_predictions').upsert(rows);
    if(error) tlog(`  ❌ ${u.name}: ${error.message}`, 'err');
    else tlog(`  ✅ ${u.name}: 48 posições de grupo`, 'ok');
  }

  // STEP 4: Palpites eliminatórias
  tlog('\n🔥 PASSO 4: Palpites das fases...', 'bold');
  const scorerOptions = ['Mbappé','Vinicius Jr','Haaland','Lewandowski','Salah'];
  for(const [ui, u] of signedUsers.entries()) {
    const rows = [];
    const phases2 = ['round16','quarter','semi','final','champion','runner_up','third'];
    const counts2 = {round16:16,quarter:8,semi:4,final:2,champion:1,runner_up:1,third:1};
    phases2.forEach(phase => {
      const count = counts2[phase];
      const picked = ALL_TEAMS.slice(ui*2, ui*2+count).concat(ALL_TEAMS).slice(0,count);
      userPreds[u.id].knockout[phase]=picked;
      picked.forEach(team => rows.push({user_id:u.id, phase, team_name:team, points:0, bolao_id:testBolao?.id}));
    });
    const scorer = scorerOptions[ui];
    userPreds[u.id].scorer = scorer;
    await SB.from('knockout_predictions').delete().eq('user_id',u.id);
    await SB.from('knockout_predictions').insert(rows);
    await SB.from('scorer_predictions').upsert({user_id:u.id, player_name:scorer, points:0, bolao_id:testBolao?.id});
    tlog(`  ✅ ${u.name}: fases + artilheiro "${scorer}"`, 'ok');
  }

  // STEP 5: Resultados reais (admin)
  tlog('\n🔧 PASSO 5: Inserindo resultados reais...', 'bold');
  const matchRows = MATCHES.map(m=>({
    match_number:m.num, team1_name:m.t1, team2_name:m.t2, group_id:m.group,
    real_score1:REAL_SCORES_TEST[m.num].s1, real_score2:REAL_SCORES_TEST[m.num].s2, is_finished:true
  }));
  await SB.from('group_matches').upsert(matchRows);
  tlog(`  ✅ 72 resultados de jogos`, 'ok');

  const standRows = [];
  Object.entries(REAL_STANDINGS_TEST).forEach(([g,pos]) => {
    Object.entries(pos).forEach(([p,team]) => standRows.push({group_id:g, position:parseInt(p), team_name:team}));
  });
  await SB.from('real_group_standings').upsert(standRows);
  tlog(`  ✅ Classificação dos 12 grupos`, 'ok');

  for(const phase of Object.keys(REAL_KO_TEST)) {
    await SB.from('real_knockouts').upsert({phase, team_ids:REAL_KO_TEST[phase]});
  }
  await SB.from('real_knockouts').upsert({phase:'top_scorer', team_ids:[REAL_SCORER_TEST]});
  tlog(`  ✅ Eliminatórias + artilheiro real: ${REAL_SCORER_TEST}`, 'ok');

  // STEP 6: Recalcular pontuações
  tlog('\n🔢 PASSO 6: Recalculando pontuações...', 'bold');
  for(const u of signedUsers) {
    // Matches
    const mUp = MATCHES.map(m=>{
      const p=userPreds[u.id].matches[m.num], r=REAL_SCORES_TEST[m.num];
      return {user_id:u.id, match_number:m.num, predicted_score1:p.s1, predicted_score2:p.s2, points:calcPts(p.s1,p.s2,r.s1,r.s2)};
    });
    await SB.from('match_predictions').upsert(mUp);

    // Groups
    const gUp = [];
    Object.entries(userPreds[u.id].groups).forEach(([g,positions])=>{
      Object.entries(positions).forEach(([pos,team])=>{
        let pts=0;
        const p=parseInt(pos);
        if((p===1||p===2)&&REAL_STANDINGS_TEST[g][pos]===team) pts=10;
        else if((p===1||p===2)&&[REAL_STANDINGS_TEST[g][1],REAL_STANDINGS_TEST[g][2]].includes(team)) pts=5;
        gUp.push({user_id:u.id, group_id:g, position:parseInt(pos), team_name:team, points:pts});
      });
    });
    await SB.from('group_predictions').upsert(gUp);

    // Knockout
    const kRows = [];
    Object.entries(userPreds[u.id].knockout).forEach(([phase,teams])=>{
      teams.forEach(team=>{
        const isReal = REAL_KO_TEST[phase]?.includes(team);
        kRows.push({user_id:u.id, phase, team_name:team, points:isReal?(phase==='champion'?20:10):0});
      });
    });
    await SB.from('knockout_predictions').delete().eq('user_id',u.id);
    if(kRows.length>0) await SB.from('knockout_predictions').insert(kRows);

    // Scorer
    const spts = userPreds[u.id].scorer===REAL_SCORER_TEST?10:0;
    await SB.from('scorer_predictions').upsert({user_id:u.id, player_name:userPreds[u.id].scorer, points:spts});

    tlog(`  ✅ ${u.name} recalculado`, 'ok');
  }

  // STEP 7: Validação
  tlog('\n✅ PASSO 7: Validando pontuações...', 'bold');
  const results = [];
  let allPassed = true;

  for(const u of signedUsers) {
    let expM=0, expG=0, expK=0, expS=0;
    MATCHES.forEach(m=>{ const p=userPreds[u.id].matches[m.num],r=REAL_SCORES_TEST[m.num]; expM+=calcPts(p.s1,p.s2,r.s1,r.s2); });
    Object.entries(userPreds[u.id].groups).forEach(([g,pos])=>{
      Object.entries(pos).forEach(([p,team])=>{
        if(REAL_STANDINGS_TEST[g][p]===team) expG+=10;
        else if(Object.values(REAL_STANDINGS_TEST[g]).includes(team)) expG+=5;
      });
    });
    Object.entries(userPreds[u.id].knockout).forEach(([phase,teams])=>{
      teams.forEach(team=>{ if(REAL_KO_TEST[phase]?.includes(team)) expK+=(phase==='champion'?20:10); });
    });
    expS = userPreds[u.id].scorer===REAL_SCORER_TEST?10:0;
    const expT = expM+expG+expK+expS;

    const [mp,gp,kp,sp] = await Promise.all([
      SB.from('match_predictions').select('points').eq('user_id',u.id),
      SB.from('group_predictions').select('points').eq('user_id',u.id),
      SB.from('knockout_predictions').select('points').eq('user_id',u.id),
      SB.from('scorer_predictions').select('points').eq('user_id',u.id),
    ]);
    const actM=(mp.data||[]).reduce((s,r)=>s+(r.points||0),0);
    const actG=(gp.data||[]).reduce((s,r)=>s+(r.points||0),0);
    const actK=(kp.data||[]).reduce((s,r)=>s+(r.points||0),0);
    const actS=(sp.data||[]).length>0?(sp.data[0].points||0):0;
    const actT=actM+actG+actK+actS;
    const ok=expT===actT&&expM===actM&&expG===actG&&expK===actK&&expS===actS;
    if(!ok) allPassed=false;
    results.push({name:u.name, expM,actM, expG,actG, expK,actK, expS,actS, expT,actT, ok});
    tlog(`  ${ok?'✅':'❌'} ${u.name}: Total Esp=${expT} Obt=${actT} | J:${expM}/${actM} G:${expG}/${actG} F:${expK}/${actK} A:${expS}/${actS}`, ok?'ok':'err');
  }

  tlog('\n═══════════════════════════════════════', 'info');
  tlog(allPassed?'🎉 TODOS OS TESTES PASSARAM!':'⚠️ ATENÇÃO: FALHAS ENCONTRADAS', allPassed?'ok':'err');
  tlog('═══════════════════════════════════════', 'info');
  tlog(`Campeão real: ${REAL_KO_TEST.champion[0]} | Artilheiro: ${REAL_SCORER_TEST}`, 'info');
  tlog('\nAgora vá para 🏆 Ranking para ver as pontuações!', 'warn');
  tlog('Use 🗑 Limpar Tudo quando quiser remover os dados de teste.', 'warn');

  window._testResults = results;
  testRunning = false;
  testDone = true;
  
  // Reload profiles
  const {data:allProfs} = await SB.from('profiles').select('id,display_name,is_admin');
  STATE.profiles = allProfs||[];
  
  renderTestPage(main);
}

async function cleanupTest(main) {
  if(!confirm('Remover TODOS os dados de teste? (usuários, palpites e resultados)')) return;
  testLog = [];
  renderTestPage(main);
  tlog('🗑 Iniciando limpeza...', 'warn');

  // Get test user IDs
  const {data:testProfs} = await SB.from('profiles').select('id,username').in('username', TEST_USERS_DATA.map(u=>u.username));
  const ids = (testProfs||[]).map(p=>p.id);

  if(ids.length > 0) {
    for(const id of ids) {
      await SB.from('match_predictions').delete().eq('user_id',id);
      await SB.from('group_predictions').delete().eq('user_id',id);
      await SB.from('knockout_predictions').delete().eq('user_id',id);
      await SB.from('scorer_predictions').delete().eq('user_id',id);
      await SB.from('profiles').delete().eq('id',id);
    }
    tlog(`  ✅ ${ids.length} usuários de teste removidos`, 'ok');
  } else {
    tlog('  ℹ️ Nenhum usuário de teste encontrado', 'info');
  }

  // Clean match results, standings, knockouts
  await SB.from('group_matches').delete().neq('match_number',0);
  await SB.from('real_group_standings').delete().neq('group_id','Z');
  await SB.from('real_knockouts').delete().neq('phase','Z');
  tlog('  ✅ Resultados reais removidos', 'ok');

  // Remove test bolão
  const testBolaoQ = await dbQ('bolao_groups',{invite_code:'TESTE1'});
  if(testBolaoQ&&testBolaoQ.length>0) {
    const tbId = testBolaoQ[0].id;
    await SB.from('bolao_members').delete().eq('bolao_id',tbId);
    await SB.from('bolao_groups').delete().eq('id',tbId);
    tlog('  ✅ Bolão de teste removido', 'ok');
  }
  testUserIds=[]; testDone=false; testLog.push('<span style="color:#10B981">✅ Limpeza concluída! Base zerada.</span>');
  window._testResults=null;

  // Reload profiles
  const {data:allProfs} = await SB.from('profiles').select('id,display_name,is_admin');
  STATE.profiles = allProfs||[];

  renderTestPage(main);
  showToast('✅ Base limpa! Só você permanece.');
}
