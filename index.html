.nb{padding:10px 14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:500;border-bottom:2px solid transparent}

.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .2s;display:inline-block}

.fg{margin-bottom:1rem}
.fl{display:block;font-size:.82rem;color:var(--muted);margin-bottom:5px;font-weight:500}

</style>

// ── Debug visual ──────────────────────────────────────────────────────────
const _dbgLogs = [];
function _dbg() {
  const args = Array.prototype.slice.call(arguments);
  const msg = args.map(function(a){ return typeof a === 'object' ? JSON.stringify(a) : String(a); }).join(' ');
  _dbgLogs.push(msg);
  const panel = document.getElementById('_dbg_panel');
  if(panel) {
    const ln = document.createElement('div');
    ln.style.cssText = 'font-size:10px;padding:2px 0;border-bottom:1px solid #1F2937;word-break:break-all;color:#10B981;';
    ln.textContent = msg;
    panel.appendChild(ln);
    panel.scrollTop = panel.scrollHeight;
  }
}
function _showDebugPanel() {
  const existing = document.getElementById('_dbg_panel');
  if(existing) { existing.remove(); return; }
  const wrap = document.createElement('div');
  wrap.id = '_dbg_panel';
  wrap.style.cssText = 'position:fixed;bottom:80px;left:0;right:0;height:240px;background:#0a0f1e;font-family:monospace;overflow-y:auto;z-index:9999;padding:8px;border-top:2px solid #10B981;';
  const hdr = document.createElement('div');
  hdr.style.cssText = 'color:#FFD700;font-weight:700;font-size:11px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;';
  const title = document.createElement('span');
  title.textContent = 'DEBUG LOG (' + _dbgLogs.length + ' entradas)';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'X Fechar';
  closeBtn.style.cssText = 'background:#EF4444;color:#fff;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;';
  closeBtn.onclick = function(){ wrap.remove(); };
  hdr.appendChild(title);
  hdr.appendChild(closeBtn);
  wrap.appendChild(hdr);
  _dbgLogs.forEach(function(msg) {
    const ln = document.createElement('div');
    ln.style.cssText = 'font-size:10px;padding:2px 0;border-bottom:1px solid #1F2937;word-break:break-all;color:#10B981;';
    ln.textContent = msg;
    wrap.appendChild(ln);
  });
  document.body.appendChild(wrap);
  wrap.scrollTop = wrap.scrollHeight;
}

// Retorna o mapeamento {matchId → grupoLetra} para as 8 vagas de 3ºs
// Fonte primária: FIFA_THIRD_MATRIX_FULL (495 combinações oficiais do Anexo C)
// Fallback: algoritmo guloso por listas de prioridade
function getThirdVacancyMap(groupLetters) {
  if(!groupLetters || groupLetters.length < 8) return {};
  const key = [...groupLetters].sort().join('');
  // Lookup primário — tabela oficial FIFA (495 combinações)
  if(FIFA_THIRD_MATRIX_FULL[key]) return FIFA_THIRD_MATRIX_FULL[key];
  // Fallback: algoritmo guloso com listas de prioridade
  const PRIO = {
    74:['A','B','C','D','F'], 77:['C','D','F','G','H'],
    79:['C','E','F','H','I'], 80:['E','H','I','J','K'],
    81:['B','E','F','I','J'], 82:['A','E','H','I','J'],
    85:['E','F','G','I','J'], 87:['D','E','I','J','L'],
  };
  const avail = new Set(groupLetters);
  const assign = {};
  const slots = [74,77,79,80,81,82,85,87];
  // Backtracking
  function bt(idx) {
    if(idx === slots.length) return true;
    const slot = slots[idx];
    const cands = [...PRIO[slot].filter(g=>avail.has(g)), ...[...avail].filter(g=>!PRIO[slot].includes(g)).sort()];
    for(const g of cands) {
      assign[slot] = g; avail.delete(g);
      if(bt(idx+1)) return true;
      delete assign[slot]; avail.add(g);
    }
    return false;
  }
  bt(0);
  return assign;
}

// Constrói o assignment de 3ºs para o bracket
// standings: {grupo: {1:time, 2:time, 3:time}}
// thirds: array com as 8 LETRAS dos grupos classificados em 3º
//         OU array com nomes de times (legado — detectado automaticamente)
function buildThirdAssignment(thirds, standings) {
  if(!thirds || thirds.length === 0) return {};

  // Detectar se thirds é array de letras (ex: ['A','B','C'...]) ou de nomes de times (legado)
  const isLetters = thirds.every(t => t && t.length <= 2 && t === t.toUpperCase());

  let groupLetters;
  let teamToGroup = {};

  if(isLetters) {
    groupLetters = thirds;
  } else {
    // Legado: thirds são nomes de times — descobrir grupo de cada um via standings
    Object.entries(standings||{}).forEach(([g, pos]) => {
      if(pos[3]) teamToGroup[pos[3]] = g;
    });
    groupLetters = thirds.map(t => teamToGroup[t]).filter(Boolean);
  }

  // Consultar matriz FIFA
  const vacancyMap = getThirdVacancyMap(groupLetters); // { matchId → grupoLetra }

  // Construir assign: matchId → time (buscando via standings[grupo][3])
  const assign = {};
  Object.entries(vacancyMap).forEach(([matchIdStr, groupLetter]) => {
    const matchId = parseInt(matchIdStr);
    const team = standings?.[groupLetter]?.[3] || null;
    if(team) assign[matchId] = team;
    else assign[matchId] = { pendingGroup: groupLetter }; // grupo definido mas time ainda não
  });

  return assign;
}

function resolveSlotInfo(slot, standings, thirds, thirdAssign, matchId) {
  if(slot.type==='1'||slot.type==='2') {
    const pos=slot.type==='1'?1:2;
    const team=standings?.[slot.group]?.[pos];
    return {team: team||(pos+'ºGrupo'+slot.group), label: pos+'º'+slot.group};
  }
  if(slot.type==='3') {
    const raw = thirdAssign?.[matchId];
    // raw pode ser: string (nome do time), objeto {pendingGroup:'X'} (grupo definido, time não), ou undefined
    const team = typeof raw === 'string' ? raw : null;
    const pendingGroup = raw?.pendingGroup || null;
    const grp = team ? Object.keys(standings||{}).find(g=>standings[g]?.[3]===team)||'?' : null;
    const slotLabel = slot.slotKey ? 'Vaga 3º J'+slot.slotKey : (slot.thirdGroups||[]).join('/');
    return {
      team: team||null,
      label: team
        ? '3º'+grp                              // ex: 3ºD — grupo do time resolvido
        : pendingGroup
          ? '3º'+pendingGroup+' (TBD)'          // ex: 3ºC (TBD) — grupo conhecido, time pendente
          : '3º('+slotLabel+')'                 // ex: Vaga 3º J74 — vaga ainda não atribuída
    };
  }
  if(slot.type==='W'||slot.type==='L') {
    return {team:null, label:(slot.type==='W'?'Venc.':'Perd.')+' J'+slot.matchId};
  }
  return {team:'?', label:'?'};
}

function resolveMatchSlot(slot, realStandings, realThirds, adminMatchesMap) {
  if(slot.type==='1'||slot.type==='2') {
    const pos = slot.type==='1'?1:2;
    return realStandings?.[slot.group]?.[pos] || (pos+'º do Grupo '+slot.group);
  }
  if(slot.type==='3') {
    // 3º melhor — verificar qual dos grupos possíveis classificou
    const classified = realThirds||[];
    const found = (slot.thirdGroups||[]).map(g=>realStandings?.[g]?.[3]).find(t=>t&&classified.includes(t));
    return found || '3º ('+( slot.thirdGroups||[]).join('/')+')';
  }
  if(slot.type==='W'||slot.type==='L') {
    // Vencedor ou perdedor de um jogo anterior
    const m = adminMatchesMap?.[slot.matchId];
    if(m?.is_finished) {
      if(slot.type==='W') return m.real_score1>m.real_score2?m.team1_name:m.real_score2>m.real_score1?m.team2_name:(m.team1_name+'?');
      if(slot.type==='L') return m.real_score1<m.real_score2?m.team1_name:m.real_score2<m.real_score1?m.team2_name:(m.team1_name+'?');
    }
    const prefix = slot.type==='W'?'Venc.':'Perd.';
    return prefix+' Jogo '+slot.matchId;
  }
  return '?';
}

function canBet(matchNum) {
  // Se data global configurada: bloquear todos os jogos a partir dela
  if(MATCHES_LOCK_START){
    const ls = new Date(MATCHES_LOCK_START);
    if(!isNaN(ls) && new Date() >= ls) return false;
  }
  // Bloquear na hora exata do jogo (horário Brasília = UTC-3)
  const dateStr = MATCH_DATES[matchNum];
  if(!dateStr) return true;
  // Bloquear 2h antes do kickoff (horário Brasília = UTC-3)
  const kickoff = new Date(dateStr + ':00-03:00');
  const lockTime = new Date(kickoff.getTime() - LOCK_MINUTES_BEFORE * 60 * 1000);
  return new Date() < lockTime;
}

function canBetPhase(phase) {
  // Bloqueado pela data da 2ª rodada (classif. de times)
  if(SECOND_ROUND_DATE){
    const sr = new Date(SECOND_ROUND_DATE);
    if(!isNaN(sr) && new Date() >= sr) return false;
  }
  const dateStr = KNOCKOUT_DATES[phase];
  if(!dateStr) return true;
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return today < d;
}

function daysUntil(dateStr) {
  if(!dateStr) return 999;
  const today = new Date(); today.setHours(0,0,0,0);
  // Extrair só a data (ignora hora)
  const dateOnly = dateStr.split('T')[0];
  const d = new Date(dateOnly + 'T00:00:00');
  return Math.ceil((d - today) / 86400000);
}

// Pontuação da classificação dos grupos
// predPos = posição palpitada (1,2,3,4), realPos = posição real (1,2,3,4 ou null)
// 1º/2º exato=10pts | diff1=5pts | diff2=2pts | 4º=0pts
// Os 8 melhores 3ºs são pontuados separadamente (7pts cada)
function calcGrpPts(predPos, realPos){
  // Só 1º e 2º pontuam na classificação de grupos
  // Exato (1º/1º ou 2º/2º) = 10pts
  // Invertido (1º/2º ou 2º/1º) = 5pts
  // Qualquer outra combinação = 0pts
  if(predPos>=3) return 0;
  if(realPos===null||realPos===undefined) return 0;
  if(realPos>=3) return 0; // time não ficou em 1º ou 2º
  if(predPos===realPos) return 10;
  if((predPos===1&&realPos===2)||(predPos===2&&realPos===1)) return 5;
  return 0;
}

function calcPts(p1,p2,r1,r2){
  if(p1===r1&&p2===r2) return 10;
  const pw=p1>p2?1:p1<p2?2:0,rw=r1>r2?1:r1<r2?2:0,ok=pw===rw;
  if(ok&&(p1===r1||p2===r2)) return 7;
  if(ok) return 5;
  if(p1===r1||p2===r2) return 2;
  return 0;
}

// ── DB helpers ─────────────────────────────────────────────────────────────
async function dbQ(table, filters={}, cols='*'){
  const version = PAGE_VERSION;
  const timeout = new Promise((_,reject) => setTimeout(()=>reject(new Error('timeout')), 8000));
  let q = SB.from(table).select(cols);
  Object.entries(filters).forEach(([k,v])=>{ q=q.eq(k,v); });
  const {data,error} = await Promise.race([q, timeout]);
  if(PAGE_VERSION !== version) return []; // page changed, discard result
  if(error) throw error;
  return data||[];
}

async function dbQBolao(table, extraFilters={}, cols='*'){
  if(!CURRENT_BOLAO) return [];
  return dbQ(table, {bolao_id:CURRENT_BOLAO.id, ...extraFilters}, cols);
}

async function upsertWithReplicate(table, rows, conflictCols=''){
  if(!CURRENT_BOLAO) return;
  if(!rows || rows.length===0) return;
  const uid = STATE.profile?.id;
  if(!uid) throw new Error('Usuário não autenticado');

  // PK de cada tabela para onConflict (UPSERT seguro sem duplicatas)
  const pkMap = {
    'match_predictions':  'user_id,match_number,bolao_id',
    'group_predictions':  'user_id,group_id,position,bolao_id',
    'knockout_predictions':'user_id,phase,team_name,bolao_id',
    'scorer_predictions': 'user_id,bolao_id',
  };
  const pk = conflictCols || pkMap[table] || '';

  const targetBolaos = REPLICATE_ALL ? MY_BOLAOS : [CURRENT_BOLAO];
  for(const bolao of targetBolaos){
    const tagged = rows.map(r=>({...r, bolao_id:bolao.id}));
    if(pk){
      // UPSERT: atualiza se existe, insere se não existe — sem duplicatas
      const {error} = await SB.from(table).upsert(tagged, {onConflict:pk});
      if(error){
        // Fallback DELETE+INSERT se upsert falhar (PK não configurada no banco)
        console.warn(table+' upsert falhou ('+error.message+'), usando DELETE+INSERT');
        if(table==='match_predictions'){
          const nums=rows.map(r=>r.match_number||0);
          const minNum=Math.min(...nums), maxNum=Math.max(...nums);
          let delQ=SB.from(table).delete().eq('user_id',uid).eq('bolao_id',bolao.id);
          if(minNum>=73) delQ=delQ.gte('match_number',73);
          else if(maxNum<=72) delQ=delQ.lte('match_number',72);
          const {error:dErr}=await delQ;
          if(dErr) throw dErr;
        } else {
          const {error:dErr}=await SB.from(table).delete().eq('user_id',uid).eq('bolao_id',bolao.id);
          if(dErr) throw dErr;
        }
        const {error:iErr}=await SB.from(table).insert(tagged);
        if(iErr){ console.error(table+' insert:', iErr.message); throw iErr; }
      }
    } else {
      // Sem PK conhecida: DELETE+INSERT
      const {error:dErr}=await SB.from(table).delete().eq('user_id',uid).eq('bolao_id',bolao.id);
      if(dErr) throw dErr;
      const {error:iErr}=await SB.from(table).insert(tagged);
      if(iErr) throw iErr;
    }
  }
}
async function dbUpsert(table, rows){
  const {error} = await SB.from(table).upsert(Array.isArray(rows)?rows:[rows]);
  if(error) throw error;
}
async function dbDelete(table, filters={}){
  let q = SB.from(table).delete();
  Object.entries(filters).forEach(([k,v])=>{ q=q.eq(k,v); });
  const {error} = await q;
  if(error) throw error;
}

async function loadProfile(u){
  STATE.user=u;
  console.log('[loadProfile] Carregando perfil para:', u.email);
  // Usar SB diretamente (sem dbQ) para evitar race condition com PAGE_VERSION
  const [{data:ppData}, {data:allData}] = await Promise.all([
    SB.from('profiles').select('*').eq('id',u.id),
    SB.from('profiles').select('id,display_name,is_admin,username')
  ]);
  STATE.profile = ppData?.[0] || null;
  STATE.profiles = allData || [];

  // Garantir que o perfil existe — INSERT ignorando conflito, nunca sobrescreve display_name
  if(!STATE.profile){
    console.warn('[loadProfile] Perfil não encontrado — tentando criar...');
    const username = u.email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g,'_');

    await SB.from('profiles')
      .upsert({id:u.id, username, display_name:username, is_admin:false}, {onConflict:'id', ignoreDuplicates:true});

  setState({user:u, loading:false, page: MY_BOLAOS.length===0?'bolaos':'dashboard'});

async function loadMyBolaos(uid){
  try {
    const members = await dbQ('bolao_members',{user_id:uid},'bolao_id,replicate_preds');
    console.log('[loadMyBolaos] Membros encontrados:', members?.length, members?.map(m=>m.bolao_id));
    if(!members||members.length===0){ MY_BOLAOS=[]; CURRENT_BOLAO=null; return; }
    const ids = members.map(m=>m.bolao_id);
    const groups = await dbQ('bolao_groups',{},'id,name,invite_code,created_by,description,mode');
    MY_BOLAOS = groups.filter(g=>ids.includes(g.id)).map(g=>({
      ...g, replicate: members.find(m=>m.bolao_id===g.id)?.replicate_preds??true
    }));
    console.log('[loadMyBolaos] Bolões do usuário:', MY_BOLAOS.map(b=>b.name));
    if(!CURRENT_BOLAO && MY_BOLAOS.length>0) CURRENT_BOLAO = MY_BOLAOS[0];
  } catch(e){
    console.error('[loadMyBolaos] Erro:', e);
    MY_BOLAOS=[]; CURRENT_BOLAO=null;
  }
}

async function signIn(email,pw){
  const {error} = await SB.auth.signInWithPassword({email,password:pw});
  if(error) throw error;
}
async function signUp(email,pw,username,displayName){
  const {data,error} = await SB.auth.signUp({email,password:pw});
  if(error) throw error;
  if(data.user){
    await dbUpsert('profiles',{id:data.user.id,username:username.toLowerCase().replace(/\s/g,'_'),display_name:displayName||username});
  }
  return data;
}
async function logout(){
  await SB.auth.signOut();
  setState({user:null,profile:null,page:'dashboard'});
}

// ── Render engine ──────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e[k]=v;
    else if(k==='style') Object.assign(e.style,v);
    else if(k==='disabled') e.disabled=!!v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML='';
  if(STATE.loading){ app.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'}))); return; }

// ── Auth Screen ────────────────────────────────────────────────────────────
function renderAuth(){
  let mode='login', err='', ok='', busy=false;
  const wrap = el('div',{class:'auth-wrap'});
  const box = el('div',{class:'auth-box'});
  wrap.appendChild(box);

  function rebuild(){
    box.innerHTML='';
    box.appendChild(el('div',{class:'auth-logo'},'⚽ BOLÃO'));
    box.appendChild(el('div',{class:'auth-sub'},'Copa do Mundo 2026 — EUA / Canadá / México 🏆'));
    const card = el('div',{class:'card'});
    if(err) card.appendChild(el('div',{class:'err-box'},err));
    if(ok) card.appendChild(el('div',{class:'ok-box'},ok));

    const emailI = el('input',{class:'fi',type:'email',placeholder:'seu@email.com'});
    card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Email'),emailI));

    let usernameI, nameI;
    if(mode==='register'){
      usernameI = el('input',{class:'fi',placeholder:'apelido_no_bolao'});
      nameI = el('input',{class:'fi',placeholder:'Como quer aparecer no ranking'});
      card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome de usuário'),usernameI));
      card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Nome de exibição'),nameI));
    }

    const pwI = el('input',{class:'fi',type:'password',placeholder:'••••••••'});
    card.appendChild(el('div',{class:'fg'},el('label',{class:'fl'},'Senha'),pwI));

    const btn = el('button',{class:'btn btn-p btn-full', onclick: async()=>{
      err=''; ok=''; busy=true; rebuild();
      try{
        if(mode==='login'){
          await signIn(emailI.value, pwI.value);
        } else {
          const d = await signUp(emailI.value, pwI.value, usernameI.value, nameI.value);
          if(!d.session) { ok='Conta criada! Faça login.'; mode='login'; }
        }
      }catch(e){ err=e.message; }
      busy=false; rebuild();
    }}, busy?'Aguarde...':(mode==='login'?'Entrar':'Criar Conta'));
    card.appendChild(btn);

    const toggle = el('div',{class:'auth-toggle'});
    const tb = el('button',{onclick:()=>{mode=mode==='login'?'register':'login';err='';ok='';rebuild();}},
      mode==='login'?'Cadastrar':'Entrar');
    toggle.appendChild(document.createTextNode(mode==='login'?'Não tem conta? ':'Já tem conta? '));
    toggle.appendChild(tb);
    card.appendChild(toggle);
    box.appendChild(card);
  }
  rebuild();
  return wrap;
}

  ui.appendChild(el('button',{class:'btn btn-o btn-sm',onclick:logout},'Sair'));
  hdrIn.appendChild(ui);
  hdr.appendChild(hdrIn);
  wrap.appendChild(hdr);

  // Nav
  const nav = el('div',{class:'nav'});
  const navIn = el('div',{class:'nav-in'});
  const navItems = [
    {key:'rules',     label:'📖 Regras'},
    {key:'bolaos',    label:'🎯 Meus Bolões'},
    {key:'dashboard', label:'🏆 Ranking'},
    ...(tabEnabled('matches')    ? [{key:'matches',   label:'⚽ 1ª Fase'}]     : []),
    ...(tabEnabled('matches')    ? [{key:'jogos',     label:'📅 Jogos'}]       : []),
    ...(tabEnabled('standings')  ? [{key:'standings', label:'📊 Grupos'}]      : []),
    ...(tabEnabled('knockout')   ? [{key:'knockout',  label:'🔥 Eliminat.'}]   : []),
    ...(tabEnabled('ko_matches') ? [{key:'ko_matches',label:'⚔️ Jogos Elim.'}] : []),
    {key:'mine', label:'📋 Meus Pts'},
    ...(STATE.profile.is_admin?[{key:'admin',label:'🔧 Admin'}]:[]),
  ];
  navItems.forEach(n=>{
    const isAct = STATE.page===n.key;
    const btn = el('button',{class:`nb${isAct?' act':''}`,onclick:()=>setState({page:n.key})},n.label);
    navIn.appendChild(btn);
    if(isAct) {
      // Scroll active item into center after render
      setTimeout(()=>{
        const nav = navIn.parentElement;
        if(nav) {
          const btnLeft = btn.offsetLeft;
          const btnWidth = btn.offsetWidth;
          const navWidth = nav.offsetWidth;
          nav.scrollLeft = btnLeft - (navWidth/2) + (btnWidth/2);
        }
      }, 50);
    }
  });
  nav.appendChild(navIn);
  wrap.appendChild(nav);

  // Main content
  const main = el('div',{class:'main'});

  if(page==='bolaos') renderBolaos(main);

  else if(page==='admin'&&STATE.profile.is_admin) renderAdmin(main);
  wrap.appendChild(main);
  return wrap;
}

function renderReplicateBar(main, onToggle) {
  if(MY_BOLAOS.length <= 1) return;
  const member = MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO?.id);
  const checked = member?.replicate ?? true;
  const bar = el('div',{class:'replicate-bar'});
  const cb = el('input',{type:'checkbox'}); cb.checked = checked;
  cb.onchange = async () => {
    REPLICATE_ALL = cb.checked;
    // Save preference
    await SB.from('bolao_members').upsert({bolao_id:CURRENT_BOLAO.id, user_id:STATE.profile.id, replicate_preds:cb.checked});
    if(MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO.id)) MY_BOLAOS.find(b=>b.id===CURRENT_BOLAO.id).replicate=cb.checked;
    if(onToggle) onToggle(cb.checked);
  };
  const lbl = el('label',{},cb, '✨ Replicar meus palpites para todos os meus bolões');
  bar.appendChild(lbl);
  if(!checked) bar.appendChild(el('span',{style:{color:'var(--gold)',fontSize:'.75rem',marginLeft:'auto'}},'Palpitando só em: '+CURRENT_BOLAO?.name));
  main.appendChild(bar);
}

    const txt = el('div');
    txt.appendChild(el('div',{style:{fontWeight:'600',fontSize:'.82rem',color:'var(--txt)'}},info.label));
    txt.appendChild(el('div',{style:{fontSize:'.75rem',color:'var(--muted)'}},info.desc));
    row.appendChild(radio);
    row.appendChild(txt);
    row.onclick = () => {
      selectedMode = key;
      modeWrap.querySelectorAll('[data-mode]').forEach(r => {
        const sel = r.dataset.mode === selectedMode;
        r.style.border = '2px solid '+(sel?'var(--gold)':'var(--bdr)');
        r.querySelector('.mode-radio').style.background = sel?'var(--gold)':'transparent';
      });
    };
    modeWrap.appendChild(row);
  });
  createCard.appendChild(modeWrap);
  
  const createBtn = el('button',{class:'btn btn-p',style:{width:'100%'},onclick:async()=>{
    const nome = nameI.value.trim();
    if(!nome){ showToast('Digite o nome do bolão','err'); return; }
    createBtn.disabled=true; createBtn.textContent='Criando...';
    try {
      const code = Array.from({length:6},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
      const {data:bg, error:be} = await SB.from('bolao_groups').insert({
        name:nome, description:descI.value.trim()||null,
        invite_code:code, created_by:STATE.profile.id,
        mode: selectedMode,
      }).select().single();
      if(be) throw be;
      await SB.from('bolao_members').insert({bolao_id:bg.id, user_id:STATE.profile.id, replicate_preds:true});
      await loadMyBolaos(STATE.profile.id);
      CURRENT_BOLAO = MY_BOLAOS.find(b=>b.id===bg.id)||MY_BOLAOS[0];
      nameI.value=''; descI.value='';
      renderBolaos(main);
      showToast('✅ Bolão "'+nome+'" criado! ('+BOLAO_MODES[selectedMode].label+')');
    } catch(e){ showToast(e.message,'err'); createBtn.disabled=false; createBtn.textContent='Criar Bolão'; }
  }},'🎯 Criar Bolão');
  createCard.appendChild(createBtn);
  main.appendChild(createCard);

  // ── Entrar com código ──
  const joinCard = el('div',{class:'card',style:{marginBottom:'2rem'}});
  joinCard.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'.5rem',fontSize:'1.1rem'}},'🔑 Entrar com Código de Convite'));
  joinCard.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'.875rem'}},'Recebeu um código de 6 letras? Digite aqui:'));
  
  const codeI = el('input',{class:'code-input',placeholder:'ABC123',maxlength:'6'});
  codeI.oninput=()=>{ codeI.value=codeI.value.toUpperCase().replace(/[^A-Z0-9]/g,''); };
  
  const joinBtn = el('button',{class:'btn btn-p',style:{width:'100%',marginTop:'.75rem'},onclick:async()=>{
    const code = codeI.value.trim().toUpperCase();
    if(code.length!==6){ showToast('O código tem 6 caracteres','err'); return; }
    joinBtn.disabled=true; joinBtn.textContent='Buscando...';
    console.log('[joinBolao] Tentando entrar com código:', code);
    try {
      const groups = await dbQ('bolao_groups',{invite_code:code});
      console.log('[joinBolao] Bolão encontrado:', groups);
      if(!groups||groups.length===0) throw new Error('Código não encontrado. Verifique e tente novamente.');
      const group = groups[0];
      const existing = await dbQ('bolao_members',{bolao_id:group.id,user_id:STATE.profile.id});
      if(existing&&existing.length>0){
        showToast('Você já está no bolão "'+group.name+'"!');
        await loadMyBolaos(STATE.profile.id);
        CURRENT_BOLAO=MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
        joinBtn.disabled=false; joinBtn.textContent='Entrar no Bolão';
        renderBolaos(main); return;
      }
      console.log('[joinBolao] Inserindo em bolao_members...');
      const {error:insertErr} = await SB.from('bolao_members').insert({bolao_id:group.id, user_id:STATE.profile.id, replicate_preds:true});
      if(insertErr){
        console.error('[joinBolao] Erro:', insertErr);
        throw new Error('Erro ao entrar no bolão: '+insertErr.message);
      }
      console.log('[joinBolao] ✅ Vinculado com sucesso!');
      await loadMyBolaos(STATE.profile.id);
      CURRENT_BOLAO = MY_BOLAOS.find(b=>b.id===group.id)||MY_BOLAOS[0];
      codeI.value='';
      renderBolaos(main);
      showToast('✅ Entrou no bolão "'+group.name+'"! Bem-vindo!');
    } catch(e){
      console.error('[joinBolao] Erro:', e);
      showToast(e.message,'err');
    }
    joinBtn.disabled=false; joinBtn.textContent='Entrar no Bolão';
  }},'Entrar no Bolão');
  
  joinCard.appendChild(codeI);
  joinCard.appendChild(joinBtn);
  main.appendChild(joinCard);
}

async function loadBolaoMembers(bolaoId) {
  try {
    const members = await dbQ('bolao_members',{bolao_id:bolaoId},'user_id');
    return members||[];
  } catch { return []; }
}


// ── Editar nome do próprio perfil ──────────────────────────────────────────
async function showEditNameModal(targetUserId, targetUserName, onSuccess) {
  // Se chamado sem args, edita o próprio perfil
  const isSelf = !targetUserId || targetUserId === STATE.profile.id;
  const userId = targetUserId || STATE.profile.id;
  const currentName = targetUserName || STATE.profile.display_name;

  document.getElementById('edit-name-modal')?.remove();
  const overlay = el('div',{id:'edit-name-modal',style:{position:'fixed',top:'0',left:'0',right:'0',bottom:'0',background:'rgba(0,0,0,.75)',zIndex:'9999',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}});
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  const box = el('div',{style:{background:'var(--dk2)',borderRadius:'12px',padding:'1.25rem',width:'100%',maxWidth:'360px'}});
  box.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',fontSize:'1.1rem',marginBottom:'1rem'}},'✏️ '+(isSelf?'Editar Meu Nome':'Editar Nome do Usuário')));
  box.appendChild(el('div',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'.75rem'}},'Nome atual: '+currentName));

  const input = el('input',{type:'text',class:'fi',placeholder:'Seu nome no bolão',value:currentName,style:{marginBottom:'1rem'}});
  box.appendChild(input);

  const errDiv = el('div',{style:{color:'var(--err)',fontSize:'.8rem',marginBottom:'.5rem',display:'none'}});
  box.appendChild(errDiv);

  const btns = el('div',{style:{display:'flex',gap:'8px'}});
  const saveBtn = el('button',{class:'btn btn-p',style:{flex:'1'},onclick:async()=>{
    const newName = input.value.trim();
    if(!newName){ errDiv.textContent='Digite um nome válido'; errDiv.style.display='block'; return; }
    if(newName.length>40){ errDiv.textContent='Máximo 40 caracteres'; errDiv.style.display='block'; return; }
    saveBtn.disabled=true; saveBtn.textContent='⏳ Salvando...';
    try{
      let error;
      if(isSelf){
        // Usuário editando o próprio nome — RLS permite (auth.uid() = id)
        const res = await SB.from('profiles').update({display_name:newName}).eq('id',userId);
        error = res.error;
        console.log('[editName] self update:', res);
      } else {
        // Admin editando outro usuário — usa RPC SECURITY DEFINER para bypassar RLS
        const res = await SB.rpc('admin_update_display_name',{target_user_id:userId, new_name:newName});
        error = res.error;
        console.log('[editName] rpc result:', JSON.stringify(res));
      }
      if(error) throw new Error(error.message);
      if(isSelf) STATE.profile.display_name = newName;
      const p = STATE.profiles.find(p=>p.id===userId);
      if(p) p.display_name = newName;
      overlay.remove();
      showToast('✅ Nome atualizado: '+newName);
      if(onSuccess) onSuccess(newName);
      else setTimeout(()=>location.reload(), 800);
    }catch(e){ errDiv.textContent='Erro: '+e.message; errDiv.style.display='block'; saveBtn.disabled=false; saveBtn.textContent='💾 Salvar'; }
  }},'💾 Salvar');
  btns.appendChild(saveBtn);
  btns.appendChild(el('button',{class:'btn btn-o',onclick:()=>overlay.remove()},'Cancelar'));
  box.appendChild(btns);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  setTimeout(()=>input.focus(),100);
}

// ── Ver palpites de outro usuário ─────────────────────────────────────────
async function showUserPalpites(userId, userName, isMe=false) {
  // Remover popup anterior
  document.getElementById('user-palpites-modal')?.remove();

  // Bloquear scroll do body enquanto o modal estiver aberto
  const prevOverflow = document.body.style.overflow;

  const overlay = el('div', {id:'user-palpites-modal', style:{
    position:'fixed',top:'0',left:'0',right:'0',bottom:'0',
    background:'rgba(0,0,0,.75)',zIndex:'9999',
    display:'flex',alignItems:'flex-end',justifyContent:'center'
  }});
  overlay.onclick = e => { if(e.target===overlay){ overlay.remove(); document.body.style.overflow = prevOverflow; } };

  const modal = el('div', {style:{
    background:'var(--dk2)',borderRadius:'16px 16px 0 0',
    width:'100%',maxWidth:'600px',maxHeight:'85vh',
    display:'flex',flexDirection:'column',overflow:'hidden'
  }});

  // Header
  const hdr = el('div',{style:{padding:'1rem 1rem .5rem',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',borderBottom:'1px solid var(--bdr)',flexShrink:'0'}});
  hdr.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',fontSize:'1.2rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:'0'}},isMe?'🎯 Meus Palpites':'👤 Palpites de '+userName));
  hdr.appendChild(el('button',{class:'btn btn-sm',style:{padding:'4px 10px',flexShrink:'0'},onclick:()=>{ overlay.remove(); document.body.style.overflow = prevOverflow; }},'✕'));
  modal.appendChild(hdr);

  // Abas
  let activeTab = 'jogos';
  const tabBar = el('div',{style:{display:'flex',gap:'6px',padding:'.6rem 1rem',borderBottom:'1px solid var(--bdr)',flexShrink:'0',overflowX:'auto'}});
  const body = el('div',{style:{flex:'1',overflowY:'auto',padding:'1rem'}});

  const secondStarted = isSecondRoundStarted();

  function tabStyle(k) {
    return activeTab===k
      ? {padding:'5px 12px',borderRadius:'20px',background:'var(--gold)',color:'#000',fontWeight:'700',fontSize:'.8rem',border:'none',cursor:'pointer'}
      : {padding:'5px 12px',borderRadius:'20px',background:'var(--dk3)',color:'var(--muted)',fontSize:'.8rem',border:'none',cursor:'pointer'};
  }

  const tabs = [
    ...(tabEnabled('matches') ? [['jogos','⚽ Jogos']] : []),
    ...(secondStarted && tabEnabled('standings') ? [
      ['grupos','📊 Grupos'],
      ['thirds','🥉 3ºs'],
    ] : []),
    ...(secondStarted && tabEnabled('knockout') ? [
      ['fases','🔥 Eliminat.'],
      ['artilheiro','🎯 Artilheiro'],
    ] : []),
  ];
  // Garantir que activeTab seja uma aba válida
  if (!tabs.find(t => t[0] === activeTab)) activeTab = tabs[0]?.[0] || 'jogos';

  async function renderTab() {
    body.innerHTML = '';
    body.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));

    const bolaoId = CURRENT_BOLAO?.id;
    const today = new Date(); today.setHours(0,0,0,0);

    if(activeTab==='jogos') {
      // Buscar palpites de jogos bloqueados (data <= hoje)
      const [mp, rm] = await Promise.all([
        dbQ('match_predictions',{user_id:userId, bolao_id:bolaoId},'match_number,predicted_score1,predicted_score2,points'),
        dbQ('group_matches',{},'match_number,real_score1,real_score2,is_finished,team1_name,team2_name'),
      ]);
      body.innerHTML='';
      const matchMap={};
      (rm||[]).forEach(m=>matchMap[m.match_number]=m);
      const predMap={};
      (mp||[]).forEach(p=>predMap[p.match_number]=p);

      // Filtrar jogos cujo palpite já está bloqueado (kickoff passou OU lock global ativo)
      const now = new Date();
      const lockActive = MATCHES_LOCK_START && new Date(MATCHES_LOCK_START) <= now;
      const visibleMatches = MATCHES.filter(m=>{
        const dateStr = MATCH_DATES?.[m.num];
        if(!dateStr) return false;
        if(lockActive) return true; // lock global: todos os jogos visíveis
        const kickoff = new Date(dateStr + ':00-03:00');
        const lockTime = new Date(kickoff.getTime() - LOCK_MINUTES_BEFORE * 60 * 1000);
        return lockTime <= now; // lock passou
      }).sort((a,b)=>(MATCH_DATES[b.num]||'').localeCompare(MATCH_DATES[a.num]||''));

      if(visibleMatches.length===0){
        body.appendChild(el('div',{style:{color:'var(--muted)',textAlign:'center',padding:'2rem'}},'Nenhum jogo realizado ainda.'));
        return;
      }
      visibleMatches.forEach(m=>{
        const r=matchMap[m.num];
        const p=predMap[m.num];
        if(!p) return;
        const pts=p.points||0;
        const ptsCls=pts===10?'p10':pts===7?'p7':pts===5?'p5':pts===2?'p2':'p0';
        const hasReal = r?.is_finished && r.real_score1!==null && r.real_score1!==undefined;

        const row=el('div',{style:{padding:'8px 0',borderBottom:'1px solid var(--bdr)'}});

        // Linha do palpite: 🇧🇷 Brasil 2 – 1 Marrocos 🇲🇦
        const palpRow=el('div',{style:{display:'flex',alignItems:'center',gap:'4px',fontSize:'.82rem',marginBottom:'2px'}});
        palpRow.appendChild(el('span',{},( FLAGS[m.t1]||'')));
        palpRow.appendChild(el('span',{style:{fontWeight:'600'}},m.t1));
        palpRow.appendChild(el('span',{style:{color:'var(--gold)',fontWeight:'700',margin:'0 4px'}},p.predicted_score1+' – '+p.predicted_score2));
        palpRow.appendChild(el('span',{style:{fontWeight:'600'}},m.t2));
        palpRow.appendChild(el('span',{},(FLAGS[m.t2]||'')));
        row.appendChild(palpRow);

        // Linha do resultado real (se tiver)
        if(hasReal){
          const realRow=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'.72rem',color:'var(--muted)'}});
          realRow.appendChild(el('span',{},'Resultado: '+r.real_score1+' – '+r.real_score2));
          realRow.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.65rem'}},pts+'pts'));
          row.appendChild(realRow);
        } else {
          row.appendChild(el('div',{style:{fontSize:'.7rem',color:'var(--muted)',fontStyle:'italic'}},'Aguardando resultado'));
        }
        body.appendChild(row);
      });

    } else if(activeTab==='grupos') {
      const gp = await dbQ('group_predictions',{user_id:userId, bolao_id:bolaoId},'group_id,position,team_name,points');
      const rg = await dbQ('real_group_standings',{},'group_id,position,team_name');
      body.innerHTML='';
      const realSt={};
      (rg||[]).forEach(r=>{ if(!realSt[r.group_id])realSt[r.group_id]={}; realSt[r.group_id][r.position]=r.team_name; });
      const byGroup={};
      (gp||[]).filter(p=>p.group_id!=='_thirds').forEach(p=>{
        if(!byGroup[p.group_id]) byGroup[p.group_id]={};
        byGroup[p.group_id][p.position]=p;
      });
      Object.keys(GROUPS).sort().forEach(g=>{
        const grpDiv=el('div',{style:{marginBottom:'.75rem'}});
        grpDiv.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'4px'}},'Grupo '+g));
        [1,2].forEach(pos=>{
          const p=byGroup[g]?.[pos];
          if(!p) return;
          const pts=p.points||0;
          const ptsCls=pts===10?'p10':pts===5?'p5':'p0';
          const row=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 0',fontSize:'.82rem'}});
          row.appendChild(el('span',{style:{color:'var(--muted)',minWidth:'20px'}},pos+'º'));
          row.appendChild(el('span',{style:{flex:'1'}},(FLAGS[p.team_name]||'')+' '+p.team_name));
          row.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.7rem'}},pts+'pts'));
          grpDiv.appendChild(row);
        });
        body.appendChild(grpDiv);
      });

    } else if(activeTab==='thirds') {
      const gp = await dbQ('group_predictions',{user_id:userId,bolao_id:CURRENT_BOLAO?.id},'group_id,position,team_name,points');
      const rk = await dbQ('real_knockouts',{phase:'best_thirds'},'team_ids');
      body.innerHTML='';
      const realThirds=rk?.[0]?.team_ids||[];
      const thirds=(gp||[]).filter(p=>p.group_id==='_thirds').sort((a,b)=>a.position-b.position);
      if(thirds.length===0){
        body.appendChild(el('div',{style:{color:'var(--muted)',textAlign:'center',padding:'2rem'}},'Nenhum 3º selecionado.'));
        return;
      }
      thirds.forEach(p=>{
        const passed=realThirds.includes(p.team_name);
        const pts=p.points||0;
        const row=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid var(--bdr)'}});
        row.appendChild(el('span',{style:{color:'var(--muted)',minWidth:'25px',fontSize:'.8rem'}},p.position+'º'));
        row.appendChild(el('span',{style:{flex:'1',fontSize:'.85rem'}},(FLAGS[p.team_name]||'')+' '+p.team_name));
        row.appendChild(el('span',{class:'pp '+(pts>0?'p10':'p0'),style:{fontSize:'.7rem'}},pts+'pts'));
        body.appendChild(row);
      });

    } else if(activeTab==='fases') {
      const [kp, rk, gp] = await Promise.all([
        dbQ('knockout_predictions',{user_id:userId, bolao_id:bolaoId},'phase,team_name,points'),
        dbQ('real_knockouts',{},'phase,team_ids'),
        dbQ('group_predictions',{user_id:userId, bolao_id:bolaoId},'group_id,position,team_name'),
      ]);
      body.innerHTML='';
      const koMap={};
      (rk||[]).forEach(r=>koMap[r.phase]=r.team_ids||[]);
      const phaseLabels={round32:'Rodada de 32',round16:'Oitavas de Final',quarter:'Quartas de Final',semi:'Semifinal',final:'Final (Campeão)',third:'Disputa de 3º/4º Lugar'};
      const byPhase={};
      (kp||[]).forEach(p=>{ if(!byPhase[p.phase]) byPhase[p.phase]=[]; byPhase[p.phase].push(p.team_name); });
      const ptsByPhaseTeam={};
      (kp||[]).forEach(p=>{ ptsByPhaseTeam[p.phase+'|'+p.team_name]=p.points||0; });

      // Reconstruir standings de grupo do usuário p/ resolver round32
      const userSt={};
      (gp||[]).forEach(p=>{
        if(p.group_id==='_thirds') return;
        if(!userSt[p.group_id]) userSt[p.group_id]={};
        userSt[p.group_id][p.position]=p.team_name;
      });
      const userThirds=(gp||[]).filter(p=>p.group_id==='_thirds').map(p=>p.team_name);

      const userTop2=new Set();
      Object.values(userSt).forEach(pos=>{ if(pos[1]) userTop2.add(pos[1]); if(pos[2]) userTop2.add(pos[2]); });
      const validThirdsOfGroups=new Set(Object.values(userSt).map(p=>p[3]).filter(Boolean));
      const validUserThirds=userThirds.filter(t=>!userTop2.has(t)&&validThirdsOfGroups.has(t));
      const thirdsForSlots=validUserThirds.slice(0,8);
      const thirdAssignment=buildThirdAssignment(thirdsForSlots,userSt);

      const userMatchWinners={};
      const r32picks=byPhase['round32']||[];
      ROUND32_BRACKET.forEach(m=>{
        const i1=resolveSlotInfo(m.slot1,userSt,thirdsForSlots,thirdAssignment,m.id);
        const i2=resolveSlotInfo(m.slot2,userSt,thirdsForSlots,thirdAssignment,m.id);
        const t1=i1.team||i1.label, t2=i2.team||i2.label;
        const winner=r32picks.find(t=>t===t1||t===t2)||null;
        userMatchWinners[m.id]={t1,t2,winner};
      });
      const r16picks=byPhase['round16']||[];
      ROUND16_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||'Venc. J'+m.slot1.matchId;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||'Venc. J'+m.slot2.matchId;
        const winner=r16picks.find(t=>t===t1||t===t2)||null;
        userMatchWinners[m.id]={t1,t2,winner};
      });
      const qpicks=byPhase['quarter']||[];
      QUARTER_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||'Venc. J'+m.slot1.matchId;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||'Venc. J'+m.slot2.matchId;
        const winner=qpicks.find(t=>t===t1||t===t2)||null;
        userMatchWinners[m.id]={t1,t2,winner};
      });
      const spicks=byPhase['semi']||[];
      SEMI_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||null;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||null;
        const winner=spicks.find(t=>t===t1||t===t2)||null;
        userMatchWinners[m.id]={t1,t2,winner};
      });
      const fpicks=byPhase['final']||[];
      FINAL_BRACKET.forEach(m=>{
        const t1=userMatchWinners[m.slot1.matchId]?.winner||null;
        const t2=userMatchWinners[m.slot2.matchId]?.winner||null;
        const winner=fpicks.find(t=>t===t1||t===t2)||null;
        userMatchWinners[m.id]={t1,t2,winner};
      });

      const bracketByPhase={round32:ROUND32_BRACKET,round16:ROUND16_BRACKET,quarter:QUARTER_BRACKET,semi:SEMI_BRACKET,final:FINAL_BRACKET};
      const phaseOrder=['round32','round16','quarter','semi','final','runner_up','third'];

      function renderMatchRow(t1,t2,winner,pts){
        const row=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'6px 0',fontSize:'.8rem'}});
        const mk=(t,isW)=>el('span',{style:{
          flex:'1',padding:'4px 8px',borderRadius:'6px',textAlign:'center',
          background:isW?'rgba(255,215,0,.15)':'transparent',
          color:isW?'var(--gold)':'var(--muted)',
          fontWeight:isW?'700':'400',
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'
        }},(FLAGS[t]||'')+' '+(t||'?'));
        row.appendChild(mk(t1,winner&&t1===winner));
        row.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.7rem',flexShrink:'0'}},'×'));
        row.appendChild(mk(t2,winner&&t2===winner));
        if(pts!==null){
          const ptsCls=pts>=30?'p10':pts>=10?'p7':pts>0?'p5':'p0';
          row.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.65rem',flexShrink:'0',marginLeft:'4px'}},pts+'pts'));
        }
        return row;
      }

      phaseOrder.forEach(ph=>{
        const picks=byPhase[ph]||[];
        if(ph==='runner_up'){
          // Vice = automático, perdedor da final. Mostrar sempre que a final estiver definida.
          const finalMatch=FINAL_BRACKET[0];
          const fmw=userMatchWinners[finalMatch.id];
          if(!fmw||!fmw.winner||!fmw.t1||!fmw.t2) return;
          const viceTeam = fmw.winner===fmw.t1 ? fmw.t2 : fmw.t1;
          if(!viceTeam || viceTeam.startsWith('Venc.')) return;
          const pts = ptsByPhaseTeam['runner_up|'+viceTeam] ?? null;
          const phDiv=el('div',{style:{marginBottom:'1rem'}});
          phDiv.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'6px',fontSize:'.95rem'}},'🥈 Vice-campeão'));
          const row=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 0',fontSize:'.85rem'}});
          row.appendChild(el('span',{style:{flex:'1',fontWeight:'700',color:'var(--gold)'}},(FLAGS[viceTeam]||'')+' '+viceTeam));
          if(pts!==null){
            const ptsCls=pts>=30?'p10':pts>=10?'p7':pts>0?'p5':'p0';
            row.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.65rem'}},pts+'pts'));
          }
          phDiv.appendChild(row);
          body.appendChild(phDiv);
          return;
        }
        if(picks.length===0 && ph!=='third') return;

        const phDiv=el('div',{style:{marginBottom:'1rem'}});
        phDiv.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',cursive",color:'var(--gold)',marginBottom:'6px',fontSize:'.95rem'}},phaseLabels[ph]||ph));

        if(ph==='third'){
          // Confronto único: 2 perdedores das semis
          const semiWinners=SEMI_BRACKET.map(m=>userMatchWinners[m.id]);
          const losers=semiWinners.map(m=>{
            if(!m||!m.winner||!m.t1||!m.t2) return null;
            const l=m.winner===m.t1?m.t2:m.t1;
            return (l&&!l.startsWith('Venc.'))?l:null;
          }).filter(Boolean);
          if(losers.length<2){
            phDiv.appendChild(el('div',{style:{color:'var(--muted)',fontSize:'.78rem',fontStyle:'italic'}},'Não definido.'));
          } else {
            const thirdPick=picks[0]||null;
            const pts=thirdPick?(ptsByPhaseTeam['third|'+thirdPick]??null):null;
            phDiv.appendChild(renderMatchRow(losers[0],losers[1],thirdPick,pts));
          }
        } else {
          const bracket=bracketByPhase[ph];
          bracket.forEach(m=>{
            const mw=userMatchWinners[m.id];
            if(!mw) return;
            const pts=mw.winner?(ptsByPhaseTeam[ph+'|'+mw.winner]??null):null;
            phDiv.appendChild(renderMatchRow(mw.t1,mw.t2,mw.winner,pts));
          });
        }
        body.appendChild(phDiv);
      });

      if(['round32','round16','quarter','semi','final','third'].every(ph=>(byPhase[ph]||[]).length===0)){
        body.appendChild(el('div',{style:{color:'var(--muted)',textAlign:'center',padding:'2rem'}},'Eliminatórias não palpitadas.'));
      }

    } else if(activeTab==='artilheiro') {
      const sp = await dbQ('scorer_predictions',{user_id:userId,bolao_id:CURRENT_BOLAO?.id},'player_name,points');
      body.innerHTML='';
      const s=sp?.[0];
      if(!s){ body.appendChild(el('div',{style:{color:'var(--muted)',textAlign:'center',padding:'2rem'}},'Artilheiro não palpitado.')); return; }
      const pts=s.points||0;
      const div=el('div',{style:{textAlign:'center',padding:'1.5rem'}});
      div.appendChild(el('div',{style:{fontSize:'2rem',marginBottom:'8px'}},'⚽'));
      div.appendChild(el('div',{style:{fontSize:'1.2rem',fontWeight:'700',color:'var(--gold)',marginBottom:'8px'}},s.player_name));
      div.appendChild(el('span',{class:'pp '+(pts>0?'p10':'p0'),style:{fontSize:'1rem'}},pts+'pts'));
      body.appendChild(div);
    }
  }

  // Montar abas
  tabs.forEach(([k,label])=>{
    const btn=el('button',{style:tabStyle(k),onclick:async()=>{
      activeTab=k;
      // Atualizar estilos
      tabBar.querySelectorAll('button').forEach((b,i)=>{
        const [tk]=tabs[i];
        Object.assign(b.style, tabStyle(tk));
      });
      await renderTab();
    }},label);
    tabBar.appendChild(btn);
  });

  modal.appendChild(tabBar);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  if(!secondStarted){
    const info=el('div',{style:{padding:'.5rem 1rem',background:'rgba(245,158,11,.1)',fontSize:'.75rem',color:'var(--gold)',textAlign:'center'}});
    info.textContent='⏳ Grupos/3ºs/Eliminatórias disponíveis após início da 2ª rodada';
    modal.insertBefore(info, body);
  }

  await renderTab();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(main){
  const v = PAGE_VERSION;
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  const bolaoId = CURRENT_BOLAO?.id;
  const mFilter = bolaoId ? {bolao_id:bolaoId} : {};
  Promise.all([
    dbQ('match_predictions',mFilter,'user_id,match_number,points'),
    dbQ('group_predictions',mFilter,'user_id,group_id,points'),
    dbQ('knockout_predictions',mFilter,'user_id,phase,points'),
    dbQ('scorer_predictions',mFilter,'user_id,points'),
    bolaoId ? dbQ('bolao_members',{bolao_id:bolaoId},'user_id') : Promise.resolve([]),
    dbQ('profiles',{},'id,display_name,is_admin,username'),
  ]).then(([mp,gp,kp,sp,members,freshProfiles])=>{
    if(PAGE_VERSION !== v) return;
    main.innerHTML='';
    // Seletor de bolão — aparece após o loading para não piscar
    if(MY_BOLAOS.length>1) renderGroupSelector(main, ()=>renderDashboard(main));
    if(freshProfiles && freshProfiles.length>0) STATE.profiles = freshProfiles;

    const memberIds = new Set((members||[]).map(m=>m.user_id));
    const bolaoProfiles = bolaoId
      ? STATE.profiles.filter(p=>memberIds.has(p.id))
      : STATE.profiles;

    // Categorias detalhadas
    const totals={};
    bolaoProfiles.forEach(p=>{ totals[p.id]={
      j1:0,   // Jogos 1ª Fase (1-72)
      je:0,   // Jogos Eliminatórias (73+)
      g:0,    // Grupos 1º/2º
      t3:0,   // 8 Melhores 3ºs
      fk:0,   // Fases KO (R32/Oitavas/Quartas/Semi)
      fc:0,   // Campeão/Vice/3ºLugar
      s:0,    // Artilheiro
      prof:p
    }; });

    (mp||[]).forEach(r=>{
      if(!totals[r.user_id]) return;
      if((r.match_number||0)<=72) totals[r.user_id].j1+=(r.points||0);
      else                        totals[r.user_id].je+=(r.points||0);
    });
    (gp||[]).forEach(r=>{
      if(!totals[r.user_id]) return;
      if(r.group_id==='_thirds') totals[r.user_id].t3+=(r.points||0);
      else                       totals[r.user_id].g+=(r.points||0);
    });
    (kp||[]).forEach(r=>{
      if(!totals[r.user_id]) return;
      // knockout_predictions phases: round32/round16/quarter/semi → Eliminatórias (fk)
      // final/champion/runner_up/third (vencedor 3ºlugar=15pts) → Finais (fc)
      const finalPhases=['final','champion','runner_up','third'];
      if(finalPhases.includes(r.phase)) totals[r.user_id].fc+=(r.points||0);
      else                              totals[r.user_id].fk+=(r.points||0);
    });
    (sp||[]).forEach(r=>{ if(totals[r.user_id]) totals[r.user_id].s+=(r.points||0); });

    const rows=Object.values(totals).map(t=>({
      ...t, total:t.j1+t.je+t.g+t.t3+t.fk+t.fc+t.s
    })).sort((a,b)=>b.total-a.total);

    const stats=el('div',{class:'stats'});
    [{v:bolaoProfiles.length,l:'Participantes'},{v:MATCHES.length,l:'Jogos 1ª Fase'},{v:12,l:'Grupos'},{v:48,l:'Seleções'}]
      .forEach(s=>stats.appendChild(el('div',{class:'sv'},el('div',{class:'svv'},''+s.v),el('div',{class:'svl'},s.l))));
    main.appendChild(stats);

    const card=el('div',{class:'card'});
    card.appendChild(el('div',{class:'ch'},'🏆 Ranking Geral'));

    // Tabela com scroll horizontal
    const tableWrap=el('div',{style:{overflowX:'auto'}});
    const t=el('table',{class:'rkt'});

    // Colunas condicionais por modalidade do bolão
    const _mode = bolaoMode();
    const rankCols = [
      { header:'Placar\n1ªFase',   val: r => r.j1,       show: _mode !== 'classificados' },
      { header:'Placar\nFinais',   val: r => r.je,       show: _mode !== 'classificados' },
      { header:'Classifi-\ncados', val: r => r.g,        show: _mode !== 'placares' },
      { header:'Melhores\n3º',     val: r => r.t3,       show: _mode !== 'placares' },
      { header:'Elimina-\ntórias', val: r => r.fk,       show: _mode !== 'placares' },
      { header:'Pódio',            val: r => r.fc + r.s, show: _mode !== 'placares' },
    ];
    const visCols = rankCols.filter(c => c.show);
    const headers = ['#','Palpiteiro',...visCols.map(c=>c.header),'Total'];
    t.appendChild(el('thead',{},el('tr',{},...headers.map(h=>el('th',{style:{whiteSpace:'pre-wrap',fontSize:'.65rem',padding:'5px 3px',textAlign:'center',lineHeight:'1.2'}},h)))));
    const em=['🥇','🥈','🥉'],rc=['r1','r2','r3'];
    const tbody=el('tbody');
    rows.forEach((r,i)=>{
      const tr=el('tr');
      tr.appendChild(el('td',{class:rc[i]||'',style:{textAlign:'center'}},em[i]||`${i+1}º`));
      const nameTd=el('td',{style:{whiteSpace:'nowrap'}});
      const isMe = r.prof.id===STATE.profile.id;
      const nameSpan=el('span',{
        style:{fontWeight:isMe?'700':'400',color:isMe?'var(--gold)':'inherit',cursor:'pointer',textDecoration:'underline dotted'},
        onclick: ()=>showUserPalpites(r.prof.id, r.prof.display_name, isMe)
      },r.prof.display_name);
      nameTd.appendChild(nameSpan);
      if(r.prof.is_admin) nameTd.appendChild(el('span',{class:'badge'},'ADMIN'));
      tr.appendChild(nameTd);
      // Pódio = campeão/vice/3ºlugar + artilheiro somados
      visCols.forEach(c=>{
        const v=c.val(r);
        const td=el('td',{style:{textAlign:'center',fontSize:'.8rem'}});
        td.appendChild(el('span',{style:{color:v>0?'var(--ok)':'var(--muted)'}},''+v));
        tr.appendChild(td);
      });
      const totalTd=el('td',{style:{textAlign:'center'}}); totalTd.appendChild(el('span',{class:'pbadge'},''+r.total)); tr.appendChild(totalTd);
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);
    tableWrap.appendChild(t);
    card.appendChild(tableWrap);
    main.appendChild(card);
  });
}

let matchPreds={}, realScores={}, matchDirty=false, activeGrp='A';
function renderMatches(main){
  const v = PAGE_VERSION;
  main.innerHTML='';
  main.appendChild(el('div',{class:'ch'},'⚽ Palpites dos Jogos — 1ª Fase'));
  if(!CURRENT_BOLAO){
    const w=el('div',{style:{background:'rgba(255,215,0,.08)',border:'1px solid rgba(255,215,0,.3)',borderRadius:'8px',padding:'1.25rem',textAlign:'center',marginTop:'1rem'}});
    w.appendChild(el('div',{style:{fontSize:'1.5rem',marginBottom:'.5rem'}},'🎯'));
    w.appendChild(el('div',{style:{fontWeight:'600',marginBottom:'.5rem'}},'Selecione um bolão primeiro'));
    w.appendChild(el('div',{style:{color:'var(--muted)',fontSize:'.85rem',marginBottom:'1rem'}},'Você precisa estar em um bolão para palpitar'));
    w.appendChild(el('button',{class:'btn btn-p',onclick:()=>setState({page:'bolaos'})},'Ir para Meus Bolões'));
    main.appendChild(w);
    return;
  }
  main.appendChild(el('div',{class:'spin-wrap'},el('div',{class:'sp'})));
  Promise.all([
    dbQ('match_predictions',{user_id:STATE.profile.id,bolao_id:CURRENT_BOLAO.id},'match_number,predicted_score1,predicted_score2,points'),
    dbQ('group_matches',{},'match_number,real_score1,real_score2,is_finished'),
  ]).then(([mp,rm])=>{
    if(PAGE_VERSION !== v) return;
    matchPreds={};
    (mp||[]).forEach(p=>{ matchPreds[p.match_number]={s1:p.predicted_score1,s2:p.predicted_score2,pts:p.points}; });
    realScores={};
    (rm||[]).forEach(m=>{ realScores[m.match_number]=m; });
    matchDirty=false;
    buildMatchesUI(main);
  }).catch(e=>{ if(e.message!=='timeout'&&PAGE_VERSION===v) console.error('matches:',e); });
}
// onDirty: callback chamado após cada alteração (default: marca matchDirty e atualiza savebar da 1ª fase)
function makeMatchCtrl(initVal, onChange, disabled=false, onDirty=null) {
  let val = initVal===null||initVal===undefined ? null : initVal;
  const wrap = el('div',{style:{display:'flex',alignItems:'center',gap:'2px'}});
  const mn = el('button',{class:'score-btn'},'-');
  const dsp = el('span',{class:'score-val',style:{color:val===null?'var(--muted)':'var(--txt)'}},val===null?'—':''+val);
  const pl = el('button',{class:'score-btn'},'+');
  if(disabled){ mn.disabled=true; pl.disabled=true; }
  const _dirty = onDirty || (()=>{ matchDirty=true; updateSaveBar(); });
  mn.onclick=()=>{ 
    if(disabled) return;
    if(val===null){val=0;}
    else if(val>0){val--;}
    dsp.textContent=val; dsp.style.color='var(--txt)';
    onChange(val); _dirty();
  };
  pl.onclick=()=>{ 
    if(disabled) return;
    if(val===null){val=0;}
    else if(val<9){val++;}
    dsp.textContent=val; dsp.style.color='var(--txt)';
    onChange(val); _dirty();
  };
  wrap.appendChild(mn); wrap.appendChild(dsp); wrap.appendChild(pl);
  return wrap;
}

function buildMatchesUI(main){
  main.innerHTML='';
  // Aviso de jogos sem palpite com prazo próximo (1 dia antes)
  const grpMatchesAlert = MATCHES.filter(m=>m.group===activeGrp).filter(m=>{
    const d=daysUntil(MATCH_DATES[m.num]);
    const hasPred = matchPreds[m.num]?.s1!==undefined;
    return !hasPred && d>=0 && d<=1; // sem palpite e jogo amanhã ou hoje
  });
  if(grpMatchesAlert.length>0){
    const isToday = grpMatchesAlert.some(m=>daysUntil(MATCH_DATES[m.num])===0);
    const alertDiv=el('div',{style:{
      background:isToday?'rgba(239,68,68,.1)':'rgba(245,158,11,.1)',
      border:'1px solid '+(isToday?'rgba(239,68,68,.3)':'rgba(245,158,11,.3)'),
      borderRadius:'10px',padding:'.75rem',marginBottom:'1rem'
    }});
    const icon=isToday?'🚫':'⚠️';
    const msg=isToday
      ? icon+' '+grpMatchesAlert.length+' jogo(s) SEM palpite estão acontecendo hoje!'
      : icon+' '+grpMatchesAlert.length+' jogo(s) amanhã ainda sem palpite!';
    alertDiv.appendChild(el('div',{style:{fontWeight:'700',fontSize:'.85rem',color:isToday?'#FCA5A5':'#FCD34D'}},msg));
    alertDiv.appendChild(el('div',{style:{color:'var(--muted)',fontSize:'.75rem',marginTop:'2px'}},
      isToday?'Prazo encerrado para esses jogos.':'Palpite agora antes que bloqueie!'));
    main.appendChild(alertDiv);
  }
  
  // Default score bar - use module-level ref to persist values
  if(!window._def) window._def = {s1:1, s2:0};
  const defBar=el('div',{style:{background:'rgba(255,215,0,.06)',border:'1px solid rgba(255,215,0,.2)',borderRadius:'8px',padding:'.6rem 1rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}});
  defBar.appendChild(el('span',{style:{fontSize:'.75rem',color:'var(--gold)',fontWeight:'600'}},'🎯 Placar padrão:'));
  defBar.appendChild(makeMatchCtrl(window._def.s1, v=>{ window._def.s1=v; }));
  defBar.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700'}},'×'));
  defBar.appendChild(makeMatchCtrl(window._def.s2, v=>{ window._def.s2=v; }));
  
  const applyBtn=el('button',{class:'btn btn-p btn-sm',style:{marginLeft:'auto'},onclick:()=>{
    let applied=0;
    const ds1=window._def.s1, ds2=window._def.s2;
    MATCHES.filter(m=>m.group===activeGrp).forEach(m=>{
      if(!canBet(m.num)) return;
      matchPreds[m.num]={s1:ds1,s2:ds2};
      applied++;
    });
    if(applied>0){ matchDirty=true; buildMatchesUI(main); showToast('✅ Placar '+ds1+'×'+ds2+' aplicado em '+applied+' jogos!'); updateSaveBar(); }
    else showToast('Nenhum jogo disponível para palpitar!');
  }},'Aplicar a todos os jogos');
  defBar.appendChild(applyBtn);
  const dbgBtn=el('button',{class:'btn btn-o btn-sm',style:{fontSize:'.65rem',padding:'3px 7px',marginLeft:'4px'},onclick:_showDebugPanel},'🔍');
  defBar.appendChild(dbgBtn);
  main.appendChild(defBar);

  // Group filter buttons
  const gb=el('div',{class:'gb'});
  Object.keys(GROUPS).forEach(g=>{
    gb.appendChild(el('button',{class:'gb-btn'+(g===activeGrp?' active':''),onclick:()=>{activeGrp=g;buildMatchesUI(main);}},g==='A'?'Grupo A':g==='B'?'Grupo B':g==='C'?'Grupo C':g==='D'?'Grupo D':g==='E'?'Grupo E':g==='F'?'Grupo F':g==='G'?'Grupo G':g==='H'?'Grupo H':g==='I'?'Grupo I':g==='J'?'Grupo J':g==='K'?'Grupo K':'Grupo L'));
  });
  main.appendChild(gb);

  const grpTeams = GROUPS[activeGrp];
  const grpInfo = el('div',{style:{color:'var(--muted)',fontSize:'.78rem',margin:'.5rem 0'}});
  grpInfo.appendChild(document.createTextNode('Grupo '+activeGrp+' — '));
  grpTeams.forEach((t,i)=>{ if(i>0) grpInfo.appendChild(document.createTextNode(' · ')); grpInfo.appendChild(el('span',{},FLAGS[t]||'',t)); });
  main.appendChild(grpInfo);

  MATCHES.filter(m=>m.group===activeGrp)
    .sort((a,b)=>(MATCH_DATES[a.num]||'').localeCompare(MATCH_DATES[b.num]||''))
    .forEach(m=>{
    const p=matchPreds[m.num]||{}, r=realScores[m.num];
    const hasResult = r?.is_finished && r.real_score1!==undefined;
    const canBetNow = canBet(m.num);
    const locked = !canBetNow;
    const hasPred2 = matchPreds[m.num] && matchPreds[m.num].s1 !== undefined;
    _dbg(`[BUILD] Jogo #${m.num}: canBetNow=${canBetNow}, hasPred2=${hasPred2}, s1=${matchPreds[m.num]?.s1}, s2=${matchPreds[m.num]?.s2}`);
    const pts = (hasResult && p.s1!==undefined)
      ? calcPts(p.s1, p.s2||0, r.real_score1, r.real_score2) : 0;
    const ptsCls = pts===10?'p10':pts===7?'p7':pts===5?'p5':pts===2?'p2':'p0';
    // pts-badge para atualização em tempo real
    const dateStr2 = MATCH_DATES[m.num];
    const dateLabel = dateStr2 ? (() => {
      const dt = new Date(dateStr2 + ':00-03:00');
      const datePart = dt.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
      const timePart = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      return datePart + ' · ' + timePart;
    })() : '';

    const mc = el('div',{class:'mc'+(hasResult?' fin':'')+(locked&&!hasResult?' locked':'')});

    // Date row — centralizada
    if(dateLabel) mc.appendChild(el('div',{style:{textAlign:'center',fontSize:'.62rem',color:'var(--muted)',fontWeight:'600',marginBottom:'.3rem'}},dateLabel));

    // Teams row
    const teamsRow = el('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginBottom:'.4rem'}});
    teamsRow.appendChild(el('span',{style:{fontSize:'.95rem'}},FLAGS[m.t1]||'🏳'));
    teamsRow.appendChild(el('span',{style:{fontSize:'.72rem',fontWeight:'600',flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},m.t1));
    teamsRow.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.7rem',fontWeight:'700',flexShrink:'0'}},' × '));
    teamsRow.appendChild(el('span',{style:{fontSize:'.72rem',fontWeight:'600',flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'right'}},m.t2));
    teamsRow.appendChild(el('span',{style:{fontSize:'.95rem'}},FLAGS[m.t2]||'🏳'));
    mc.appendChild(teamsRow);

    // Score row
    const v1=hasPred2?p.s1:null, v2=hasPred2?p.s2:null;
    if(canBetNow) {
      const scoreRow = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'4px',marginBottom:'.3rem'}});
      scoreRow.appendChild(makeMatchCtrl(v1, v=>{ matchPreds[m.num]={...(matchPreds[m.num]||{}),s1:v,s2:matchPreds[m.num]?.s2??0}; }));
      scoreRow.appendChild(el('span',{style:{color:'var(--muted)',fontWeight:'700',fontSize:'.9rem',margin:'0 3px'}},'×'));
      scoreRow.appendChild(makeMatchCtrl(v2, v=>{ matchPreds[m.num]={...(matchPreds[m.num]||{}),s2:v,s1:matchPreds[m.num]?.s1??0}; }));
      mc.appendChild(scoreRow);
      if(hasResult) {
        const curPts = p.s1!==undefined ? calcPts(p.s1,p.s2||0,r.real_score1,r.real_score2) : 0;
        const curCls = curPts===10?'p10':curPts===7?'p7':curPts===5?'p5':curPts===2?'p2':'p0';
        const realRow = el('div',{style:{textAlign:'center',fontSize:'.7rem',color:'var(--muted)',marginBottom:'.2rem'}});
        realRow.appendChild(document.createTextNode('Resultado real: '));
        realRow.appendChild(el('span',{style:{color:'var(--gold)',fontWeight:'700',fontFamily:"'Bebas Neue',cursive",fontSize:'.9rem'}},r.real_score1+' — '+r.real_score2));
        realRow.appendChild(el('span',{class:'pp '+curCls,style:{marginLeft:'4px',fontSize:'.65rem'}},curPts+'pts'));
        mc.appendChild(realRow);
      }
    } else {
      const lockRow = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',marginBottom:'.3rem'}});
      if(hasResult) {
        lockRow.appendChild(el('span',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:'1.3rem',color:'var(--gold)'}},r.real_score1+' — '+r.real_score2));
      } else {
        lockRow.appendChild(el('span',{style:{fontSize:'.8rem',color:'var(--muted)'}},'🔒 Prazo encerrado'));
      }
      mc.appendChild(lockRow);
    }

    // Pred row - only show when locked (past deadline)
    if(locked) {
      const sep = el('div',{style:{borderTop:'1px solid rgba(45,55,72,.5)',marginTop:'.3rem',paddingTop:'.3rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px',flexWrap:'wrap'}});
      sep.appendChild(el('span',{style:{fontSize:'.65rem',color:'var(--muted)'}},'Meu palpite:'));
      if(p.s1!==undefined) {
        sep.appendChild(el('span',{style:{fontSize:'.75rem',color:'#94A3B8',fontWeight:'600'}},p.s1+' × '+p.s2));
        if(hasResult) sep.appendChild(el('span',{class:'pp '+ptsCls,style:{fontSize:'.65rem'}},pts+'pts'));
      } else {
        sep.appendChild(el('span',{style:{fontSize:'.7rem',color:'var(--muted)'}},'Sem palpite'));
        if(hasResult) sep.appendChild(el('span',{class:'pp p0',style:{fontSize:'.65rem'}},'0pts'));
      }
      mc.appendChild(sep);
    }
    main.appendChild(mc);
  });
  updateSaveBar();
}

function updateSaveBar(){
  let sb=document.getElementById('savebar-matches');
  if(!sb){ sb=el('div',{class:'sbar',id:'savebar-matches'}); document.body.appendChild(sb); }
  // Esconder a KO savebar se existir
  const sbko=document.getElementById('savebar-ko');
  if(sbko) sbko.style.display='none';
  sb.innerHTML='';
  if(!matchDirty){ sb.style.display='none'; return; }
  sb.style.display='flex';
  const inn=el('div',{class:'sbar-in'});
  inn.appendChild(el('span',{style:{color:'var(--muted)',fontSize:'.82rem'}},'Alterações não salvas'));
  inn.appendChild(el('button',{class:'btn btn-p',onclick:saveMatches},'💾 Salvar Palpites'));
  sb.appendChild(inn);
}
async function saveMatches(){
  // Buscar resultados reais frescos do banco antes de calcular pontos
  try{
    const freshReal = await dbQ('group_matches',{},'match_number,real_score1,real_score2,is_finished');
    (freshReal||[]).forEach(r=>{ realScores[r.match_number]=r; });
  } catch(e){ /* usa realScores em memória */ }

  const rows=[];
  MATCHES.forEach(m=>{
    const p=matchPreds[m.num];
    if(p&&p.s1!==undefined&&p.s2!==undefined){
      const r=realScores[m.num];
      const pts=r?.is_finished?calcPts(p.s1,p.s2,r.real_score1,r.real_score2):(p.pts||0);
      rows.push({user_id:STATE.profile.id,match_number:m.num,predicted_score1:p.s1,predicted_score2:p.s2,points:pts});
    }
  });
  try{
    await upsertWithReplicate('match_predictions',rows);
    matchDirty=false;
    showToast('✅ Palpites salvos e pontos calculados!'+(REPLICATE_ALL&&MY_BOLAOS.length>1?' (em todos os bolões)':''));
    updateSaveBar();
    // Recarregar via setState para garantir página correta
    setState({page:'matches'});
  }
  catch(e){ showToast(e.message,'err'); }
}
